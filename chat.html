<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  /* iOS Messages palette */
  --imsg-blue:#0A84FF;        /* outgoing (user) bubble — iOS blue */
  --imsg-blue-grad:#0A84FF;
  --imsg-grey:#E9E9EB;        /* incoming (bot) bubble — iOS light grey */
  --imsg-grey-txt:#000000;
  --bg:#FFFFFF;               /* chat background — Messages is plain white */
  --hdr-bg:rgba(248,248,248,0.92);
  --hdr-border:rgba(0,0,0,0.12);
  --tint:#0A84FF;             /* iOS system tint for buttons/links */
  --field-bg:#FFFFFF;
  --field-border:#D1D1D6;
  --muted:#8E8E93;            /* iOS secondary label */
  --av-grad-a:#C9A84C; --av-grad-b:#DDB96A; /* keep gold avatar as brand touch */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro","Helvetica Neue",Helvetica,Arial,sans-serif;
  background:#000;color:#000;
  min-height:100dvh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  -webkit-font-smoothing:antialiased;
}
.shell{
  position:relative;z-index:1;width:100%;max-width:440px;height:100dvh;max-height:900px;
  background:var(--bg);display:flex;flex-direction:column;overflow:hidden;
}
@media(min-width:480px){ .shell{border-radius:22px;height:94dvh;box-shadow:0 20px 60px rgba(0,0,0,0.45)} }

/* ---- header (iOS Messages contact bar) ---- */
.hdr{
  flex-shrink:0;background:var(--hdr-bg);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  padding:8px 16px 10px;padding-top:calc(8px + env(safe-area-inset-top));
  border-bottom:0.5px solid var(--hdr-border);position:relative;
}
.hdr .back{position:absolute;left:10px;top:50%;transform:translateY(-30%);color:var(--tint);font-size:26px;line-height:1;font-weight:300}
.av{
  width:50px;height:50px;border-radius:50%;flex-shrink:0;overflow:hidden;
  background:#FFFFFF;border:0.5px solid var(--hdr-border);
  display:flex;align-items:center;justify-content:center;margin-bottom:1px;
}
.av img{width:78%;height:78%;object-fit:contain;display:block}
.hd-name{font-size:13px;color:#000;font-weight:600;letter-spacing:0;line-height:1.1;display:flex;align-items:center;gap:3px}
.hd-name .chev{color:var(--muted);font-size:11px;font-weight:600}
.hd-sub{font-size:11px;color:var(--muted);margin-top:0}

/* ---- chat area ---- */
.body{
  flex:1;overflow-y:auto;padding:14px 12px 8px;display:flex;flex-direction:column;gap:2px;
  scroll-behavior:smooth;background:var(--bg);
  -webkit-overflow-scrolling:touch;
}
.body::-webkit-scrollbar{width:0}

.row{display:flex;margin-top:2px;animation:rise .32s cubic-bezier(.2,.7,.3,1) both}
.row.left{justify-content:flex-start}
.row.right{justify-content:flex-end}
/* group spacing: more gap when sender changes */
.row.turn{margin-top:10px}
@keyframes rise{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.bub{
  max-width:78%;padding:8px 13px 9px;border-radius:19px;font-size:16px;line-height:1.32;
  position:relative;word-wrap:break-word;
}
.bub.bot{background:var(--imsg-grey);color:var(--imsg-grey-txt);border-bottom-left-radius:5px}
.bub.usr{background:var(--imsg-blue);color:#fff;border-bottom-right-radius:5px}
/* iOS tail */
.bub.bot::before{content:'';position:absolute;left:-6px;bottom:0;width:14px;height:18px;background:var(--imsg-grey);border-bottom-right-radius:16px;z-index:-1}
.bub.bot::after{content:'';position:absolute;left:-9px;bottom:0;width:12px;height:18px;background:var(--bg);border-bottom-right-radius:14px}
.bub.usr::before{content:'';position:absolute;right:-6px;bottom:0;width:14px;height:18px;background:var(--imsg-blue);border-bottom-left-radius:16px;z-index:-1}
.bub.usr::after{content:'';position:absolute;right:-9px;bottom:0;width:12px;height:18px;background:var(--bg);border-bottom-left-radius:14px}
.bub .lead-em{display:block;margin-bottom:2px;font-size:16px;line-height:1.32}

/* timestamp / status read receipt — sits OUTSIDE bubble, iOS style */
.stamp{font-size:11px;color:var(--muted);padding:1px 6px 6px;text-align:right;animation:rise .3s both}
.stamp.left{text-align:left}
.stamp .read{font-weight:600;color:var(--muted)}

/* day divider like iOS */
.daydiv{align-self:center;font-size:11px;color:var(--muted);font-weight:600;padding:8px 0 6px;letter-spacing:.2px}
.daydiv b{color:#000;font-weight:600}

.typing{display:inline-flex;gap:4px;padding:13px 15px;background:var(--imsg-grey);border-radius:19px;border-bottom-left-radius:5px;position:relative}
.typing::before{content:'';position:absolute;left:-6px;bottom:0;width:14px;height:18px;background:var(--imsg-grey);border-bottom-right-radius:16px;z-index:-1}
.typing::after{content:'';position:absolute;left:-9px;bottom:0;width:12px;height:18px;background:var(--bg);border-bottom-right-radius:14px}
.typing span{width:8px;height:8px;border-radius:50%;background:#9E9EA3;animation:bounce 1.3s infinite}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.45}30%{transform:translateY(-5px);opacity:1}}

/* ---- input dock ---- */
.foot{flex-shrink:0;background:var(--hdr-bg);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:0.5px solid var(--hdr-border);padding:9px 12px calc(9px + env(safe-area-inset-bottom));min-height:60px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  appearance:none;border:1px solid var(--tint);background:var(--bg);color:var(--tint);
  font-size:15px;font-weight:400;padding:9px 16px;
  border-radius:18px;cursor:pointer;transition:all .14s;display:inline-flex;align-items:center;gap:6px;
}
.chip:active{transform:scale(.95);background:rgba(10,132,255,0.08)}
.chip.sel{background:var(--tint);border-color:var(--tint);color:#fff;font-weight:500}
.chip .em{font-size:16px}
.chip.lang{flex:1;justify-content:center}

.field{display:flex;gap:8px;align-items:flex-end}
.field input{
  flex:1;border:1px solid var(--field-border);background:var(--field-bg);border-radius:18px;
  padding:9px 16px;font-size:16px;color:#000;outline:none;transition:border-color .14s;
  min-width:0;-webkit-appearance:none;line-height:1.25;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
}
.field input:focus{border-color:var(--tint)}
.send{flex-shrink:0;width:34px;height:34px;border:none;border-radius:50%;background:var(--tint);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .14s}
.send:active{transform:scale(.9);opacity:.85}
.send svg{width:18px;height:18px}
.donebar{display:flex;flex-direction:column;gap:8px}
.cta{width:100%;border:none;border-radius:18px;background:var(--tint);color:#fff;font-size:16px;font-weight:500;padding:12px;cursor:pointer;transition:all .14s}
.cta:active{transform:scale(.98);opacity:.9}
.cta.navy{background:#E9E9EB;color:var(--tint)}
.err{font-size:13px;color:#FF3B30;margin-top:7px;text-align:center}

/* ---- final card ---- */
.done-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 32px;background:linear-gradient(160deg,#1B2B4B,#13203A);animation:rise .6s both}
.crest{width:76px;height:76px;border-radius:50%;border:2px solid var(--av-grad-a);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:22px;animation:pop .6s cubic-bezier(.2,1.3,.4,1) both}
@keyframes pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.done-wrap h2{font-family:'Cinzel',serif;font-size:20px;color:#fff;font-weight:500;letter-spacing:.5px;margin-bottom:12px}
.done-wrap p{font-size:15px;line-height:1.6;color:rgba(255,255,255,0.78);max-width:300px}
.done-wrap .when{margin-top:18px;background:rgba(201,168,76,0.15);border:1px solid var(--av-grad-a);border-radius:10px;padding:10px 18px;font-size:13.5px;color:var(--av-grad-b);font-weight:600}
.done-wrap .quote{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--av-grad-a);margin-top:26px;letter-spacing:.3px}
</style>
</head>

/* Firebase config — copy these values from the CRM's _FBCFG constant

/* Anonymous sign-in: gives us auth!=null so the locked /leadintake rule accepts the write.
   _authReady resolves with an ID token (or null if auth failed). */
var _authToken = null;
var _authReady = new Promise(function(resolve){
  try {
    firebase.initializeApp(_FBCFG);
    firebase.auth().signInAnonymously()
      .then(function(){ return firebase.auth().currentUser.getIdToken(); })
      .then(function(tok){ _authToken = tok; resolve(tok); })
      .catch(function(e){ console.error('Anon auth failed:', e); resolve(null); });
  } catch(e){ console.error('Firebase init failed:', e); resolve(null); }
});

var chat = document.getElementById('chat');
var foot = document.getElementById('foot');

function el(tag,cls,html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function scrollDown(){ setTimeout(function(){ chat.scrollTop = chat.scrollHeight; }, 40); }
function nowTime(){ var d=new Date(); var h=d.getHours(); var m=d.getMinutes(); var ap=h>=12?'PM':'AM'; var hh=h%12; if(hh===0)hh=12; return hh+':'+(m<10?'0':'')+m+' '+ap; }

function botSay(lines, cb){
  removeReadStamp();
  var trow = el('div','row left turn'); var t = el('div','typing','<span></span><span></span><span></span>');
  trow.appendChild(t); chat.appendChild(trow); scrollDown();
  setTimeout(function(){
    chat.removeChild(trow);
    var arr = Array.isArray(lines) ? lines : [lines];
    var inner;
    if(arr.length>1){ inner = '<span class="lead-em">'+arr[0]+'</span>'+arr.slice(1).join('<br/>'); }
    else { inner = arr[0]; }
    var row = el('div','row left turn');
    var b = el('div','bub bot', inner);
    row.appendChild(b); chat.appendChild(row); scrollDown();
    if(cb) setTimeout(cb, 240);
  }, 560);
}
function userEcho(text){
  removeReadStamp();
  var row = el('div','row right turn');
  var b = el('div','bub usr', text);
  row.appendChild(b); chat.appendChild(row);
  /* iOS-style read receipt under the latest sent message */
  var s = el('div','stamp','Delivered');
  s.id='_readStamp'; chat.appendChild(s); scrollDown();
  /* flip Delivered -> Read shortly after, as the "contact" sees it */
  setTimeout(function(){ var st=document.getElementById('_readStamp'); if(st){ st.innerHTML='Read <span class="read">'+nowTime()+'</span>'; } }, 900);
}
function removeReadStamp(){ var s=document.getElementById('_readStamp'); if(s&&s.parentNode) s.parentNode.removeChild(s); }
function clearFoot(){ foot.innerHTML=''; }

function normPhone(raw){
  if(!raw) return '';
  var digits = String(raw).replace(/\D/g,'');
  if(!digits) return '';
  if(digits.length>=11 && digits[0]!=='0') return digits;
  if(digits[0]==='0') return '94'+digits.slice(1);
  if(digits.length===9) return '94'+digits;
  return digits;
}
function validPhone(raw){ var n=normPhone(raw); return n.length>=11 && n.slice(0,2)==='94'; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function sendBtn(){ return el('button','send','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>'); }
function fmtDate(iso){ try{ return new Date(iso+'T00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }catch(e){ return iso; } }
function fmtTime(hhmm){ try{ var p=hhmm.split(':'); var h=parseInt(p[0]); var m=p[1]; var ap=h>=12?'PM':'AM'; var hh=h%12; if(hh===0)hh=12; return hh+':'+m+' '+ap; }catch(e){ return hhmm; } }

/* exact-time -> next occurrence of that time (today if still ahead, else tomorrow) */
function exactToISO(hhmm){
  var p=hhmm.split(':'); var d=new Date(); d.setHours(parseInt(p[0]),parseInt(p[1]||0),0,0);
  if(d.getTime() <= Date.now()) d.setDate(d.getDate()+1);
  return d.toISOString();
}
/* band -> concrete time */
function bandToISO(band){
  var hourMap = { morning:9, afternoon:13, evening:16, any:10 };
  var h = hourMap[band]!=null ? hourMap[band] : 10;
  var d = new Date();
  if(d.getHours() >= h){ d.setDate(d.getDate()+1); }
  d.setHours(h,0,0,0);
  return d.toISOString();
}

/* ---------------- FLOW ---------------- */
function start(){
  /* iOS-style day divider */
  var dd = el('div','daydiv','<b>Today</b> '+nowTime());
  chat.appendChild(dd);
  botSay(['Every queen deserves to be seen. \ud83d\udc51','Please select your language.','\u0DC3\u0DD2\u0D82\u0DC4\u0DBD\u0DD9\u0DB1\u0DCA \u0D9A\u0DAD\u0DCF \u0D9A\u0DBBමු \ud83d\ude4f'], function(){
    clearFoot();
    var box = el('div','chips');
    ['en','si','sg'].forEach(function(code){
      var b = el('button','chip lang', L[code].name);
      b.onclick = function(){ pickLang(code); };
      box.appendChild(b);
    });
    foot.appendChild(box);
  });
}
function pickLang(code){
  S.lang = code; userEcho(L[code].name); clearFoot(); askPhone();
}
/* Step 1 — phone */
function askPhone(){
  var t = L[S.lang];
  botSay(t.s1, function(){
    clearFoot();
    var wrap = el('div','field');
    var inp = el('input'); inp.type='tel'; inp.placeholder=t.s1ph; inp.autocomplete='tel';
    var btn = sendBtn(); var errEl=null;
    function go(){
      var v=inp.value.trim();
      if(!validPhone(v)){ if(!errEl){ errEl=el('div','err',t.s1err); foot.appendChild(errEl);} inp.focus(); return; }
      S.data.phone = normPhone(v); userEcho(v); clearFoot(); askDate();
    }
    btn.onclick=go; inp.addEventListener('keydown',function(e){ if(e.key==='Enter') go(); });
    wrap.appendChild(inp); wrap.appendChild(btn); foot.appendChild(wrap); inp.focus();
  });
}
/* Step 2 — date */
function askDate(){
  var t = L[S.lang];
  botSay(t.s2, function(){
    clearFoot();
    var wrap = el('div','field');
    var inp = el('input'); inp.type='date';
    var today = new Date().toISOString().slice(0,10); inp.min=today; inp.value=today;
    var btn = sendBtn();
    btn.onclick=function(){ var v=inp.value; if(!v){ inp.focus(); return; } S.data.weddingDate=v; userEcho(fmtDate(v)); clearFoot(); askEvents(); };
    wrap.appendChild(inp); wrap.appendChild(btn); foot.appendChild(wrap);
  });
}
/* Step 3 — events (multi-select) */
function askEvents(){
  var t = L[S.lang];
  botSay(t.s3, function(){
    clearFoot();
    var picked={};
    var box = el('div','chips');
    var emoji = {wedding:'\ud83d\udc92',homecoming:'\ud83c\udfe0',goingAway:'\u2708\ufe0f',engagement:'\ud83d\udc8d'};
    ['wedding','homecoming','goingAway','engagement'].forEach(function(k){
      var b = el('button','chip','<span class="em">'+emoji[k]+'</span>'+t.ev[k]);
      b.onclick=function(){
        picked[k]=!picked[k]; b.classList.toggle('sel',!!picked[k]);
        var any=false; for(var p in picked){ if(picked[p])any=true; }
        contBtn.style.display = any?'block':'none';
      };
      box.appendChild(b);
    });
    foot.appendChild(box);
    var contBtn = el('button','cta navy',t.cont); contBtn.style.display='none'; contBtn.style.marginTop='10px';
    contBtn.onclick=function(){
      S.data.events=picked;
      var labels=[]; for(var p in picked){ if(picked[p]) labels.push(t.ev[p]); }
      userEcho(labels.join(' \u00b7 ')); clearFoot(); askBand();
    };
    foot.appendChild(contBtn);
  });
}
/* Step 4 — call time */
function askBand(){
  var t = L[S.lang];
  botSay(t.s4, function(){
    clearFoot();
    var box = el('div','chips');
    var emoji = {morning:'\ud83c\udf05',afternoon:'\u2600\ufe0f',evening:'\ud83c\udf06',any:'\ud83d\udd50',exact:'\ud83d\udd50'};
    ['morning','afternoon','evening','any','exact'].forEach(function(k){
      var b = el('button','chip','<span class="em">'+emoji[k]+'</span>'+t.bands[k]);
      b.onclick=function(){
        if(k==='exact'){ openExact(); return; }
        S.data.band=k; S.data.exactTime=''; userEcho(t.bands[k]); clearFoot(); askName();
      };
      box.appendChild(b);
    });
    foot.appendChild(box);
  });
}
function openExact(){
  var t = L[S.lang];
  clearFoot();
  var wrap = el('div','field');
  var inp = el('input'); inp.type='time'; inp.value='10:00';
  var btn = sendBtn();
  btn.onclick=function(){
    var v=inp.value; if(!v){ inp.focus(); return; }
    S.data.band='exact'; S.data.exactTime=v; userEcho(fmtTime(v)); clearFoot(); askName();
  };
  wrap.appendChild(inp); wrap.appendChild(btn); foot.appendChild(wrap);
}
/* Step 5 — name */
function askName(){
  var t = L[S.lang];
  botSay(t.s5, function(){
    clearFoot();
    var wrap = el('div','field');
    var inp = el('input'); inp.type='text'; inp.placeholder=t.s5ph; inp.autocomplete='name';
    var btn = sendBtn();
    function go(){ var v=inp.value.trim(); if(!v){ inp.focus(); return; } S.data.name=v; userEcho(v); clearFoot(); submitLead(); }
    btn.onclick=go; inp.addEventListener('keydown',function(e){ if(e.key==='Enter') go(); });
    wrap.appendChild(inp); wrap.appendChild(btn); foot.appendChild(wrap); inp.focus();
  });
}
/* Step 6 — submit + close */
function submitLead(){
  var t = L[S.lang];
  botSay(t.sending); clearFoot();
  var nowIso=new Date().toISOString();
  var langName={en:'English',si:'Sinhala',sg:'Singlish'}[S.lang];

  /* compute call-time label (EN for notes) + nextReminderAt */
  var bandEN, whenLabel, nextReminderAt;
  if(S.data.band==='exact'){
    bandEN='Exact time '+fmtTime(S.data.exactTime);
    whenLabel=fmtTime(S.data.exactTime);
    nextReminderAt=exactToISO(S.data.exactTime);
  } else {
    bandEN=L.en.bands[S.data.band];
    whenLabel=t.bands[S.data.band];
    nextReminderAt=bandToISO(S.data.band);
  }

  var events={};
  if(S.data.events.wedding){ events.wedding={enabled:true,date:S.data.weddingDate||''}; }
  if(S.data.events.homecoming){ events.homecoming={enabled:true}; }
  if(S.data.events.goingAway){ events.goingAway={enabled:true,date:S.data.weddingDate||''}; }
  /* engagement: forward-compatible — CRM has no engagement event yet, so write the
     flag AND surface it in notes so nothing is lost until the CRM is updated */
  var engNote='';
  if(S.data.events.engagement){ events.engagement={enabled:true,date:S.data.weddingDate||''}; engNote=' Interested in ENGAGEMENT styling (not yet a CRM event type).'; }

  var attId='att-'+uid(); var brideId='bride-'+uid();
  var record={
    id:brideId, name:S.data.name, phone:S.data.phone, email:'',
    source:LEAD_SOURCE, stage:1, confirmed:false, cancelled:false, lost:false,
    events:events, weddingDate:S.data.weddingDate||'',
    notes:'Self-service lead via chatbot. Preferred call time: '+bandEN+'. Language: '+langName+'.'+engNote,
    nextReminderAt:nextReminderAt, remindersStopped:false,
    contactAttempts:{}, createdAt:nowIso, lastActivity:nowIso,
    quotes:{}, invoices:{}, appointments:{}, notesLog:{}, documents:{}, _history:{}
  };
  record.contactAttempts[attId]={ id:attId, at:nowIso, outcome:'callback_later',
    note:'Customer requested callback ('+bandEN+') via website chatbot. Language: '+langName+'.'+engNote,
    by:'self-service', channel:'whatsapp' };
  record._history['h-'+uid()]={ at:nowIso, action:'contact-attempt', by:'self-service',
    details:{ outcome:'callback_later', source:LEAD_SOURCE } };
  /* intake markers — consumed by the CRM "New Enquiries" accept-UI (separate session) */
  record.intake = true;
  record.intakeAt = nowIso;

  _authReady.then(function(tok){
    var url = FB + INTAKE_PATH + '/' + brideId + '.json' + (tok ? ('?auth=' + tok) : '');
    return fetch(url,{ method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(record) });
  })
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(function(){ showDone(whenLabel); })
    .catch(function(e){ console.error('Lead save failed:',e); showDone(whenLabel); });
}
function showDone(whenLabel){
  var t = L[S.lang];
  var shell=document.querySelector('.shell');
  document.querySelector('.body').style.display='none';
  foot.style.display='none';
  var dw=el('div','done-wrap');
  dw.appendChild(el('div','crest','\ud83d\udc51'));
  dw.appendChild(el('h2',null,t.doneH+S.data.name+t.doneHx));
  dw.appendChild(el('p',null,t.doneP.replace('{t}',whenLabel)));
  dw.appendChild(el('div','when',t.doneWhen+whenLabel));
  dw.appendChild(el('div','quote','\u201C'+t.quote+'\u201D'));
  shell.appendChild(dw);
}
start();
</script>
</body>
