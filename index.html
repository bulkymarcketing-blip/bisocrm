<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Biso CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#1B2B4B;--navy-lt:#243556;--navy-dim:rgba(27,43,75,0.06);--gold:#C9A84C;--gold-lt:#DDB96A;--gold-dim:rgba(201,168,76,0.12);--bg:#F5F6FA;--surf:#FFF;--border:#E4E8F0;--text:#1B2B4B;--text2:#4A5568;--muted:#8896B0;--danger:#E53E3E;--success:#38A169;--warn:#D69E2E;--sh:0 1px 3px rgba(27,43,75,0.08),0 4px 16px rgba(27,43,75,0.06);--sh2:0 4px 24px rgba(27,43,75,0.14)}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{background:var(--surf);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(27,43,75,0.06)}
.content{flex:1;padding:24px;width:100%}
.brand{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:12px}
.brand-logo{width:36px;height:36px;object-fit:contain;filter:brightness(0) invert(1)}
.brand-name{font-family:'Cinzel',serif;font-size:14px;color:#fff;letter-spacing:2px}
.brand-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
.nav{padding:10px 0;flex:1;overflow-y:auto}
.nav-sec{padding:14px 16px 5px;font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1.2px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:rgba(255,255,255,0.6);font-size:13px;font-weight:500;transition:all .15s;border-radius:6px;margin:1px 8px}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.08)}
.nav-item.active{color:#fff;background:rgba(201,168,76,0.2);border-left:3px solid var(--gold)}
.sidebar-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.08)}
.sync-badge{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.06);border-radius:20px;padding:6px 10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
.sync-txt{font-size:11px;color:rgba(255,255,255,0.5)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.page-title{font-family:'Cinzel',serif;font-size:17px;color:var(--navy);letter-spacing:.5px}
.topbar-right{display:flex;align-items:center;gap:10px}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text)}
.sbox{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px 8px 34px;color:var(--text);font-size:13px;width:200px;outline:none;font-family:'Inter',sans-serif}
.sbox:focus{border-color:var(--navy)}
.swrap{position:relative}.sicon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;font-weight:500;white-space:nowrap;transition:all .15s}
.btn-primary{background:var(--navy);color:#fff}.btn-gold{background:var(--gold);color:#fff}
.btn-outline{background:transparent;color:var(--navy);border:1.5px solid var(--border)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-danger{background:transparent;color:var(--danger);border:1.5px solid rgba(229,62,62,0.3)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:6px}.btn-xs{padding:4px 10px;font-size:11px;border-radius:5px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.sc{background:var(--surf);border:1.5px solid var(--border);border-radius:10px;padding:18px 20px;box-shadow:var(--sh)}
.sc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.si{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.ib{background:rgba(27,43,75,0.08)}.ig{background:var(--gold-dim)}.iv{background:rgba(56,161,105,0.1)}.io{background:rgba(214,158,46,0.1)}
.sl{font-size:12px;color:var(--muted);font-weight:500}
.sv{font-size:24px;font-weight:700;color:var(--navy);font-family:'Cinzel',serif;line-height:1.1}
.ss{font-size:11px;color:var(--muted)}
.pipeline{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
.pipeline::-webkit-scrollbar{height:4px}.pipeline::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.stage-col{min-width:200px;flex-shrink:0}
.shdr{padding:10px 14px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between;border:1.5px solid var(--border);border-bottom:none}
.sname{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.scnt{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,0.8)}
.sbdy{background:var(--bg);border-radius:0 0 10px 10px;min-height:100px;padding:8px;display:flex;flex-direction:column;gap:8px;border:1.5px solid var(--border);border-top:none}
.p0{background:#F8F9FA}.p0 .sname{color:#6B7280}
.p1{background:#EFF6FF}.p1 .sname{color:#3B82F6}
.p2{background:#F5F3FF}.p2 .sname{color:#8B5CF6}
.p3{background:#FFF7ED}.p3 .sname{color:#F59E0B}
.p4{background:#FEFCE8}.p4 .sname{color:#CA8A04}
.lcard{background:var(--surf);border:1.5px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s}
.lcard:active{transform:scale(.98)}
.lname{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:3px}
.ldate{font-size:11px;color:var(--muted)}
.ltags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.tw{background:#DCFCE7;color:#15803D}.ti{background:#FCE7F3;color:#BE185D}
.tf{background:var(--gold-dim);color:#92400E}.tr{background:#EDE9FE;color:#6D28D9}.twi{background:#E0F2FE;color:#0369A1}
.td{background:var(--bg);color:var(--muted);border:1px solid var(--border)}.tu{background:#FEE2E2;color:#DC2626}.tq{background:var(--gold-dim);color:#92400E;font-weight:700}
.card{background:var(--surf);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--sh)}
.card-hdr{padding:16px 20px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Cinzel',serif;font-size:13px;color:var(--navy);letter-spacing:.5px}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg)}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:1.5px solid var(--border)}
td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:active td{background:var(--navy-dim)}
.cn{font-size:14px;font-weight:600;color:var(--navy)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bp{background:#DCFCE7;color:#15803D}.bpa{background:#FEF9C3;color:#92400E}
.bu{background:#FEE2E2;color:#DC2626}.bo{background:#EFF6FF;color:#1D4ED8}
.bs{background:#DCFCE7;color:#15803D}.bi{background:#F5F3FF;color:#6D28D9}
.db{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:5px}
.ds{background:#FEE2E2;color:#DC2626}.dn{background:#FEF3C7;color:#D97706}.dok{background:#D1FAE5;color:#059669}
.overlay{position:fixed;inset:0;background:rgba(27,43,75,0.5);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surf);border-radius:14px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;box-shadow:var(--sh2)}
.mlg{max-width:820px}.msm{max-width:460px}
.mhd{padding:20px 24px 16px;border-bottom:1.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--surf);z-index:5;border-radius:14px 14px 0 0}
.mt{font-family:'Cinzel',serif;font-size:16px;color:var(--navy)}
.msb{font-size:12px;color:var(--muted);margin-top:2px}
.mc{background:var(--bg);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;font-size:20px;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.mbdy{padding:24px}
.mft{padding:16px 24px;border-top:1.5px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--bg);border-radius:0 0 14px 14px;flex-wrap:wrap}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fi{display:flex;flex-direction:column;gap:5px}
.s2{grid-column:span 2}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
input,select,textarea{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--navy);background:#fff}
textarea{resize:vertical;min-height:80px}
.stitle{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1.5px solid var(--border)}
.tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 14px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.di{background:var(--bg);border-radius:8px;padding:10px 12px}
.dl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-bottom:3px}
.dv{font-size:13px;font-weight:500}.dv.hi{color:var(--navy);font-weight:700}
.pb{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--navy),var(--gold));border-radius:3px;transition:width .4s}
.qs{background:var(--surf);border:1.5px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.qsh{padding:13px 18px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.qst{font-size:13px;font-weight:600;color:var(--navy)}
.qrow{display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer}
.qrow:last-child{border-bottom:none}
.qrow:active{background:var(--navy-dim)}
.qrl{font-size:13px;color:var(--text2);font-weight:500;flex:1}
.qrv{font-size:13px;color:var(--navy);font-weight:600}.qrv.m{color:var(--muted);font-weight:400}
.qcsel{display:flex;align-items:center;gap:12px;padding:13px 18px}
.qav{width:40px;height:40px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.ql{border-bottom:1px solid var(--border);padding:12px 18px}
.qln{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:1px}
.qls{font-size:11px;color:var(--muted);margin-bottom:7px}
.qli{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.qi{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);outline:none}
.qi:focus{border-color:var(--navy)}
.qcl{display:flex;flex-direction:column;gap:3px}
.qcll{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase}
.qla{font-size:13px;font-weight:700;color:var(--gold);margin-left:auto;align-self:flex-end;padding-bottom:7px}
.qdel{background:#fee2e2;border:1.5px solid #fecaca;border-radius:6px;color:#dc2626;cursor:pointer;font-size:13px;padding:7px 10px;align-self:flex-end}
.qadd{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;border-top:1.5px dashed var(--border)}
.qadd:active{background:var(--navy-dim)}
.qac{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.qgt{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--gold)}
.sov{position:fixed;inset:0;background:rgba(27,43,75,0.5);backdrop-filter:blur(4px);z-index:2000;opacity:0;pointer-events:none;transition:opacity .2s}
.sov.open{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-radius:20px 20px 0 0;z-index:2001;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:88vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0)}
.sheet.open{transform:translateY(0)}
.shdl{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.shd{padding:13px 20px 11px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sht{font-family:'Cinzel',serif;font-size:15px;color:var(--navy)}
.shc{background:var(--bg);border:1.5px solid var(--border);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text2);line-height:1}
.ssw{position:relative;padding:11px 20px;border-bottom:1.5px solid var(--border);flex-shrink:0}
.ss{width:100%;padding:10px 14px 10px 36px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text);outline:none}
.ss:focus{border-color:var(--navy)}
.ssi{position:absolute;left:32px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.sl{overflow-y:auto;flex:1}
.si{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border);cursor:pointer}
.si:active{background:var(--navy-dim)}
.sin{font-size:13px;font-weight:600;color:var(--navy)}
.sim{font-size:11px;color:var(--muted);margin-top:2px}
.sip{font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0}
.sadd{display:flex;align-items:center;gap:10px;padding:13px 20px;background:var(--bg);border-top:1.5px solid var(--border);cursor:pointer}
.to{display:flex;align-items:center;padding:15px 20px;border-bottom:1px solid var(--border);cursor:pointer}
.to:active{background:var(--navy-dim)}
.tr2{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);margin-right:14px;flex-shrink:0}
.tl{font-size:14px;font-weight:500;color:var(--navy)}
.ci{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer}
.ci:active{background:var(--navy-dim)}
.cn2{display:flex;align-items:center;gap:12px;padding:13px 20px;background:var(--bg);cursor:pointer;border-top:1.5px solid var(--border)}
.cn2:active{background:var(--navy-dim)}
.cni{width:38px;height:38px;border-radius:50%;background:var(--gold-dim);border:2px dashed rgba(201,168,76,0.4);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--gold)}
.lr{padding:17px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.lr:active{background:var(--navy-dim)}
.lr:last-child{border-bottom:none}
.lrn{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:2px}
.lrm{font-size:12px;color:var(--muted)}
.lra{font-size:16px;font-weight:700;color:var(--navy)}
.lrc{font-size:18px;color:var(--muted);margin-left:8px}
.dh{text-align:center;padding:22px 20px 14px;background:var(--bg);border-radius:10px;margin-bottom:18px}
.dha{font-size:28px;font-weight:700;color:var(--navy)}
.dhn{font-size:14px;color:var(--muted);margin-top:3px}
.dhm{font-size:12px;color:var(--muted);margin-top:2px}
.da{display:grid;gap:10px;margin-bottom:20px}
.dab{background:var(--surf);border:1.5px solid var(--border);border-radius:10px;padding:13px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--navy)}
.dab:active{background:var(--navy-dim)}
.dab.pr{background:var(--navy);border-color:var(--navy);color:#fff}
.dai{font-size:20px}
.ic{background:var(--surf);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.ir{padding:13px 16px;display:flex;justify-content:space-between;align-items:flex-start}
.in{font-size:14px;font-weight:600;color:var(--navy);flex:1;margin-right:10px}
.im{font-size:12px;color:var(--muted);margin-top:2px}
.ia{font-size:14px;font-weight:700;color:var(--navy);flex-shrink:0}
.ifoot{padding:11px 16px;background:var(--bg);border-top:1.5px solid var(--border)}
.ifr{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
.nc{background:var(--surf);border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px}
.nl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.nt{font-size:13px;color:var(--text2);line-height:1.7}
.appt{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;margin-bottom:7px}
.ad{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px}
.cph{background:var(--navy);border-radius:12px;padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.cpav{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.15);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.cpn{font-family:'Cinzel',serif;font-size:15px;color:#fff;margin-bottom:2px}
.cps{font-size:12px;color:rgba(255,255,255,0.6)}
#LS{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltl{font-family:'Cinzel',serif;color:var(--navy);font-size:12px;letter-spacing:2px}
#lerr{display:none;text-align:center;padding:0 24px;margin-top:6px}
.lm{font-size:13px;color:var(--danger);margin-bottom:10px}
.notif{position:fixed;bottom:20px;right:20px;background:var(--navy);border-radius:10px;padding:12px 16px;font-size:13px;color:#fff;z-index:9999;transform:translateY(16px);opacity:0;transition:all .3s;pointer-events:none;max-width:280px;box-shadow:var(--sh2)}
.notif.show{transform:translateY(0);opacity:1}

  document.getElementById('lerr').style.display='none';

    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),10000);
    const r=await fetch(FB+'/leads.json',{signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok)throw new Error('HTTP '+r.status);

    document.getElementById('APP').style.display='block';

function notif(msg){var el=document.getElementById('NF');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},3000);}
function stab(el,id){el.closest('.mbdy').querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');el.closest('.mbdy').querySelectorAll('[id^="tb-"],[id^="ct-"]').forEach(function(t){t.style.display='none';});var t=document.getElementById(id);if(t)t.style.display='';}
function dBadge(d){if(d===null)return '';var c=d<30?'ds':d<90?'dn':'dok';return '<span class="db '+c+'">'+d+'d</span>';}
function gSet(){try{return JSON.parse(localStorage.getItem('biso_s')||'{}');}catch(e){return {};}}
function sSet(s){localStorage.setItem('biso_s',JSON.stringify(s));}
function defNotes(){return gSet().defaultNotes||'An additional Venue Dressing Fee will apply if the bride wishes to be dressed at her chosen location.\n\nBespeaking fee of Rs 50,000 is due upon reception of the quotation. It is non-refundable and deducted from the final bill.\n\nFinal payment is due on the day of service.';}
function svcP(desc){var lp=gSet().linePrices||{};if(lp[desc]>0)return lp[desc];var s=SVCS.find(function(x){return x.d===desc;});return s?s.b:0;}
function smartP(desc){
  var sp=svcP(desc);if(sp>0)return sp;
  var hB=QB.items.some(function(i){return i.cat==='Bridal';});
  var hH=QB.items.some(function(i){return i.cat==='Homecoming';});
  var bmC=QB.items.filter(function(i){return i.desc==='Bridesmaid';}).reduce(function(s,i){return s+(i.qty||1);},0);
  if(desc==='Homecoming')return hB?95000:125000;
  if(desc==='Going Away')return(hB&&hH&&bmC>=2)?60000:65000;
  if(desc==='Bridesmaid')return(hB&&hH)?35000:38000;
  var s=SVCS.find(function(x){return x.d===desc;});return s?s.b:0;
}
function applyDisc(){
  QB.items=QB.items.filter(function(i){return !i.auto;});
  var hB=QB.items.some(function(i){return i.cat==='Bridal';});
  var hH=QB.items.some(function(i){return i.cat==='Homecoming';});
  if(hB&&hH)QB.items.push({desc:'Homecoming Package Discount',unit:-30000,qty:1,disc:0,cat:'Discount',auto:true,key:'disc-hc'});
}
function rPipeline(){
  var all=lA();

function lCard(l){
  var age=dS(l.createdAt);
  var src=SRC[l.source]||SRC.form;var tc=src[0];var tl=src[1];
  var dt=age>7?'<span class="tag tu">'+age+'d old</span>':'<span class="tag td">'+age+'d</span>';
  var qt=Object.keys(l.quotations||{}).length>0?'<span class="tag tq">Quoted</span>':'';
  var pkg=l.package?'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+l.package+'</div>':'';
  return '<div class="lcard" onclick="openDetail(\''+l.id+'\')">'
    +'<div class="lname">'+l.name+'</div>'
    +'<div class="ldate">'+(l.weddingDate?'Wedding: '+fmt(l.weddingDate):'Date TBD')+'</div>'
    +pkg
    +'<div class="ltags"><span class="tag '+tc+'">'+tl+'</span>'+qt+dt+'</div>'
    +'</div>';
}

  var allQ=[];
  lA().forEach(function(l){Object.values(l.quotations||{}).forEach(function(qt){if(!qt.convertedToInvoice)allQ.push(Object.assign({},qt,{sN:l.name,sId:l.id,src:'lead'}));});});
  cA().forEach(function(c){Object.values(c.quotes||{}).forEach(function(qt){if(!qt.convertedToInvoice)allQ.push(Object.assign({},qt,{sN:c.name,sId:c.id,src:'cust'}));});});

  var ih='';
  items.forEach(function(it,i){
    var line=cLine(it);var bb=i<items.length-1?'border-bottom:1px solid var(--border);':'';

  document.getElementById('doc-b').innerHTML=
    '<div class="dh"><div class="dha">LKR '+Number(tot).toLocaleString()+'.00</div><div class="dhn">'+obj.name+'</div><div class="dhm">'+fmt(qt.date)+'</div>'+sb+'</div>'
    +'<div class="da" style="grid-template-columns:repeat(4,1fr)">'

    +nh;
  document.getElementById('doc-f').innerHTML='<button class="btn btn-ghost" onclick="CM(\'doc-modal\')">Close</button>';
  OM('doc-modal');

function moreQ(src,sId,qId,sent){if(!sent){if(confirm('Mark as sent to client?'))markSent(src,sId,qId);}else notif('Already marked as sent.');}
async function markSent(src,sId,qId){
  var path=src==='lead'?'/leads/'+sId+'/quotations/'+qId:'/customers/'+sId+'/quotes/'+qId;
  try{
    await fbP(path,{sent:true});
    if(src==='lead'&&leads[sId]&&(leads[sId].quotations||{})[qId])leads[sId].quotations[qId].sent=true;
    if(src==='cust'&&custs[sId]&&(custs[sId].quotes||{})[qId])custs[sId].quotes[qId].sent=true;
    notif('Marked as sent');CM('doc-modal');rQuotations();
  }catch(e){notif('Error: '+e.message);}
}
function openIDoc(src,sId,iId){
  var obj=src==='lead'?leads[sId]:custs[sId];if(!obj)return;
  var inv=(obj.invoices||{})[iId];if(!inv)return;
  var tot=qTot(inv.items);var bp=inv.advance||0;
  var pays=Object.values(inv.payments||{});
  var paySum=pays.reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);
  var paid=bp+paySum;
  var bal=tot-paid;
  var items=Object.values(inv.items||{});
  var pct=tot>0?Math.round(paid/tot*100):0;
  var sc=pct>=100?'var(--success)':pct>0?'var(--warn)':'var(--danger)';
  var sl=pct>=100?'PAID':pct>0?'PARTIAL':'UNPAID';
  document.getElementById('doc-t').textContent=inv.id;
  var ih='';
  items.forEach(function(it,i){
    var line=cLine(it);var bb=i<items.length-1?'border-bottom:1px solid var(--border);':'';
    ih+='<div class="ir" style="'+bb+'"><div><div class="in">'+it.desc+'</div><div class="im">'+it.qty+' x '+Number(it.unit).toLocaleString()+'</div></div><div class="ia">LKR '+Number(line).toLocaleString()+'.00</div></div>';
  });
  var bpr=bp>0?'<div class="ifr"><span style="color:var(--muted)">Bespeaking Fee</span><span style="color:var(--success)">(LKR '+Number(bp).toLocaleString()+'.00)</span></div>':'';
  var ph='';
  pays.forEach(function(p){ph+='<div class="ifr"><span style="color:var(--muted)">Payment '+fmt(p.date)+(p.method?' · '+p.method:'')+'</span><span style="color:var(--success)">(LKR '+Number(p.amount).toLocaleString()+'.00)</span></div>';});
  var payLog='';
  if(pays.length){
    var pr='';
    pays.sort(function(a,b){return new Date(b.date)-new Date(a.date);}).forEach(function(p){
      pr+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+fmt(p.date)+(p.method?' · '+p.method:'')+'</div>'+(p.note?'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+p.note+'</div>':'')+'</div><div style="display:flex;align-items:center;gap:8px"><div style="font-size:13px;font-weight:700;color:var(--success)">'+fR(p.amount)+'</div><button onclick="delPay(\''+src+'\',\''+sId+'\',\''+iId+'\',\''+p.id+'\')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px">x</button></div></div>';
    });
    payLog='<div class="ic" style="margin-top:14px"><div style="padding:11px 14px;background:var(--bg);border-bottom:1.5px solid var(--border);font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.5px;text-transform:uppercase">Payments Log</div>'+pr+'</div>';
  }
  var nh=inv.notes?'<div class="nc"><div class="nl">Notes</div><div class="nt">'+inv.notes.replace(/\n/g,'<br/>')+'</div></div>':'';
  document.getElementById('doc-b').innerHTML=
    '<div class="dh"><div class="dha">LKR '+Number(tot).toLocaleString()+'.00</div><div class="dhn">'+obj.name+'</div><div class="dhm">'+fmt(inv.date)+'</div><div style="margin-top:6px"><span style="background:'+sc+'22;color:'+sc+';font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px">'+sl+'</span></div></div>'
    +'<div class="da" style="grid-template-columns:1fr 1fr 1fr">'
    +'<button class="dab pr" onclick="openAddPay(\''+src+'\',\''+sId+'\',\''+iId+'\')" ><span class="dai">+</span>Add Payment</button>'
    +'<button class="dab" onclick="viewPDF(\'I\',\''+src+'\',\''+sId+'\',\''+iId+'\')" ><span class="dai">PDF</span>PDF</button>'
    +'<button class="dab" onclick="openEInv(\''+src+'\',\''+sId+'\',\''+iId+'\')" ><span class="dai">Edit</span>Notes</button>'
    +'</div>'
    +'<div class="ic">'+ih+'<div class="ifoot"><div class="ifr"><span style="color:var(--muted)">Sub Total</span><span>LKR '+Number(tot).toLocaleString()+'.00</span></div>'+bpr+ph+'<div class="ifr" style="font-size:15px;font-weight:700;color:var(--navy);border-top:1px solid var(--border);padding-top:5px;margin-top:3px"><span>Balance Due</span><span>LKR '+Number(Math.max(0,bal)).toLocaleString()+'.00</span></div></div></div>'
    +payLog
    +nh;
  document.getElementById('doc-f').innerHTML='<button class="btn btn-ghost" onclick="CM(\'doc-modal\')">Close</button>';
  OM('doc-modal');
}
function openAddPay(src,sId,iId){
  var obj=src==='lead'?leads[sId]:custs[sId];if(!obj)return;
  var inv=(obj.invoices||{})[iId];if(!inv)return;
  var tot=qTot(inv.items);var bp=inv.advance||0;
  var paySum=Object.values(inv.payments||{}).reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);
  var bal=Math.max(0,tot-bp-paySum);
  document.getElementById('pay-s').textContent=obj.name+' · '+iId;

async function addPay(src,sId,iId){
  var amt=parseFloat((document.getElementById('pay-amt')||{}).value)||0;
  if(amt<=0){notif('Enter a valid amount.');return;}
  var date=(document.getElementById('pay-date')||{}).value||new Date().toISOString().slice(0,10);
  var method=(document.getElementById('pay-method')||{}).value||'';
  var note=(document.getElementById('pay-note')||{}).value||'';
  var pid='p-'+uid();
  var pay={id:pid,amount:amt,date:date,method:method,note:note,createdAt:new Date().toISOString()};
  var path=src==='lead'?'/leads/'+sId+'/invoices/'+iId+'/payments':'/customers/'+sId+'/invoices/'+iId+'/payments';
  try{
    await fbP(path,{[pid]:pay});
    var obj=src==='lead'?leads[sId]:custs[sId];
    if(obj&&obj.invoices&&obj.invoices[iId]){
      obj.invoices[iId].payments=obj.invoices[iId].payments||{};
      obj.invoices[iId].payments[pid]=pay;
    }
    // Update lead balance if lead-attached
    if(src==='lead'&&leads[sId]){
      var newBal=Math.max(0,(leads[sId].balance||0)-amt);
      var newAdv=(leads[sId].advance||0)+amt;
      await fbP('/leads/'+sId,{advance:newAdv,balance:newBal});
      leads[sId].advance=newAdv;leads[sId].balance=newBal;
    }
    CM('pay-modal');notif('Payment recorded!');openIDoc(src,sId,iId);render();
  }catch(e){notif('Error: '+e.message);}
}

async function convInv(src,sId,qId){
  var obj=src==='lead'?leads[sId]:custs[sId];if(!obj)return;
  var qt=src==='lead'?(obj.quotations||{})[qId]:(obj.quotes||{})[qId];if(!qt)return;
  var bp=parseFloat((document.getElementById('adv-amt')||{}).value)||0;
  var notes=(document.getElementById('adv-notes')||{}).value||'';
  var date=(document.getElementById('adv-date')||{}).value||new Date().toISOString().slice(0,10);
  var items=Object.assign({},qt.items);var tot=qTot(items);
  var inv={id:iNum(),date:date,items:items,advance:bp,notes:notes};
  try{
    if(src==='lead'){
      var patch={};
      patch['quotations/'+qId+'/convertedToInvoice']=true;
      patch['invoices/'+inv.id]=inv;
      patch['advance']=bp;patch['balance']=tot-bp;patch['confirmed']=true;patch['stage']=5;
      await fbP('/leads/'+sId,patch);
      if(!leads[sId])leads[sId]={};

      if(leads[sId].quotations&&leads[sId].quotations[qId])leads[sId].quotations[qId].convertedToInvoice=true;
      leads[sId].invoices=leads[sId].invoices||{};leads[sId].invoices[inv.id]=inv;
    }else{
      var cp={};cp['quotes/'+qId+'/convertedToInvoice']=true;cp['invoices/'+inv.id]=inv;
      await fbP('/customers/'+sId,cp);
      if(custs[sId]&&custs[sId].quotes&&custs[sId].quotes[qId])custs[sId].quotes[qId].convertedToInvoice=true;
      custs[sId].invoices=custs[sId].invoices||{};custs[sId].invoices[inv.id]=inv;
    }

      exC.invoices=exC.invoices||{};exC.invoices[inv.id]=inv;if(wDate)exC.anniversary=wDate;

      nc.quotes[qId]=qObj;nc.invoices[inv.id]=inv;

function OS(t){

function filterSvcs(sq){
  var s=sq.toLowerCase().trim();

  var h='';
  f.forEach(function(sv){
    var lp=svcP(sv.d);
    var pl=(sv.aA&&lp===sv.b)?'From '+fR(sv.b):fR(lp||sv.b);
    h+='<div class="si" onclick="selSvc(\''+sv.d.replace(/\'/g,"\\'")+'\',' +sv.b+',\''+sv.c+'\','+sv.aT+','+sv.aA+')" ><div><div class="sin">'+sv.d+'</div><div class="sim">'+sv.c+'</div></div><div class="sip">'+pl+'</div></div>';
  });
  h+='<div class="sadd" onclick="addCustom(\''+sq.replace(/\'/g,"\\'")+'\')"><span style="color:var(--gold);font-weight:600;font-size:13px">+ Add custom line</span></div>';

function selSvc(desc,base,cat,aT,aA){
  CS('svc');
  var price=svcP(desc);var sp=smartP(desc);
  if(aA&&price===base){
    QB.psvc={desc:desc,unit:base,cat:cat,aT:aT};
    document.getElementById('amt-t').textContent=desc;
    document.getElementById('amt-h').textContent='Starting from '+fR(base);
    document.getElementById('amt-i').value=base;
    setTimeout(function(){OS('amt');},200);return;
  }
  var fu=price>0?price:sp;

    document.getElementById('thm-t').textContent='Theme for '+cat;
    document.getElementById('thm-l').innerHTML=THEMES.map(function(t){return '<div class="to" onclick="selTheme(\''+t+'\')" ><div class="tr2"></div><div class="tl">'+t+'</div></div>';}).join('');
    setTimeout(function(){OS('thm');},200);
  }else{
    QB.items.push({desc:desc,unit:fu,qty:1,disc:0,cat:cat,key:uid()});applyDisc();renderQB();
  }
}

async function saveQB(){
  var n=document.getElementById('qb-n');if(n)QB.notes=n.value;
  if(!QB.cid&&!QB.lid){notif('Please select a customer.');return;}
  if(!QB.items.length){notif('Add at least one service.');return;}
  var items={};QB.items.forEach(function(it){var k=it.key||uid();items[k]=Object.assign({},it,{key:k});});
  var qt={id:qNum(),date:new Date().toISOString().slice(0,10),expiry:expD(),items:items,notes:QB.notes,convertedToInvoice:false,sent:false};
  try{
    if(QB.cid){await fbP('/customers/'+QB.cid+'/quotes',{[qt.id]:qt});if(!custs[QB.cid])custs[QB.cid]={};custs[QB.cid].quotes=custs[QB.cid].quotes||{};custs[QB.cid].quotes[qt.id]=qt;}
    if(QB.lid){
      await fbP('/leads/'+QB.lid+'/quotations',{[qt.id]:qt});
      leads[QB.lid].quotations=leads[QB.lid].quotations||{};leads[QB.lid].quotations[qt.id]=qt;
      if((leads[QB.lid].stage||0)<4){await fbP('/leads/'+QB.lid,{stage:4});leads[QB.lid].stage=4;}
    }else if(QB.cid){
      var cc=custs[QB.cid];
      var ex=lA().find(function(l){return l.phone&&cc&&l.phone===cc.phone&&!l.confirmed;});
      if(ex){await fbP('/leads/'+ex.id+'/quotations',{[qt.id]:qt});ex.quotations=ex.quotations||{};ex.quotations[qt.id]=qt;await fbP('/leads/'+ex.id,{stage:4});ex.stage=4;}
      else if(cc){var nid=uid();var nl={id:nid,name:cc.name,phone:cc.phone||'',email:cc.email||'',source:'walk-in',stage:4,weddingDate:cc.weddingDate||'',package:'Custom',notes:'Auto from quote '+qt.id,bridesmaids:cc.bridesmaids||0,createdAt:new Date().toISOString(),confirmed:false,advance:0,balance:0,venue:cc.venue||'',appointments:{},quotations:{},invoices:{}};nl.quotations[qt.id]=qt;await fbS('/leads/'+nid,nl);leads[nid]=nl;}
    }
    CM('quot-modal');notif('Quotation saved!');if(QB.lid)openDetail(QB.lid);render();
  }catch(e){notif('Error: '+e.message);}
}
async function updQB(){

  var path=src==='lead'?'/leads/'+sId+'/quotations/'+qId:'/customers/'+sId+'/quotes/'+qId;

  try{await fbS('/leads/'+lead.id,lead);leads[lead.id]=lead;CM('lead-modal');notif('Lead added!');render();}catch(e){notif('Error: '+e.message);}
}
function openCust(id){
  var c=custs[id];if(!c)return;
  document.getElementById('cm-t').textContent=c.name;
  document.getElementById('cm-s').textContent=c.phone||'';
  var qts=Object.values(c.quotes||{});var invs=Object.values(c.invoices||{});
  var qr='';
  qts.forEach(function(qt){qr+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:8px 0;font-size:11px;color:var(--muted);font-weight:600">'+qt.id+'</td><td style="font-size:12px;padding:8px 4px">'+fmt(qt.date)+'</td><td style="color:var(--gold);font-weight:700">'+fR(qTot(qt.items))+'</td><td style="text-align:right"><button class="btn btn-outline btn-xs" onclick="openQDoc(\'cust\',\''+id+'\',\''+qt.id+'\')" >View</button></td></tr>';});
  var ir='';
  invs.forEach(function(inv){ir+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:8px 0;font-size:11px;color:var(--muted);font-weight:600">'+inv.id+'</td><td style="font-size:12px;padding:8px 4px">'+fmt(inv.date)+'</td><td style="color:var(--gold);font-weight:700">'+fR(qTot(inv.items))+'</td><td style="color:var(--success);font-size:12px">'+fR(inv.advance||0)+' paid</td><td style="text-align:right"><button class="btn btn-outline btn-xs" onclick="openIDoc(\'cust\',\''+id+'\',\''+inv.id+'\')" >View</button></td></tr>';});
  document.getElementById('cm-b').innerHTML=
    '<div class="cph"><div class="cpav">'+inits(c.name)+'</div><div><div class="cpn">'+c.name+'</div><div class="cps">'+(c.phone||'—')+'</div>'+(c.email?'<div class="cps">'+c.email+'</div>':'')+'</div></div>'
    +'<div class="tabs"><div class="tab active" onclick="stab(this,\'ct-info\')">Details</div><div class="tab" onclick="stab(this,\'ct-hist\')">History</div></div>'
    +'<div id="ct-info">'
    +'<div class="fg"><div class="fi"><label>Name</label><input type="text" value="'+(c.name||'')+'" onchange="updC(\''+id+'\',{name:this.value})"/></div><div class="fi"><label>WhatsApp</label><input type="text" value="'+(c.phone||'')+'" onchange="updC(\''+id+'\',{phone:this.value})"/></div><div class="fi"><label>Email</label><input type="email" value="'+(c.email||'')+'" onchange="updC(\''+id+'\',{email:this.value})"/></div><div class="fi"><label>Wedding Date</label><input type="date" value="'+(c.weddingDate||'')+'" onchange="updC(\''+id+'\',{weddingDate:this.value})"/></div><div class="fi"><label>Anniversary</label><input type="date" value="'+(c.anniversary||'')+'" onchange="updC(\''+id+'\',{anniversary:this.value})"/></div><div class="fi"><label>Venue</label><input type="text" value="'+(c.venue||'')+'" onchange="updC(\''+id+'\',{venue:this.value})"/></div><div class="fi"><label>Bridesmaids</label><input type="number" value="'+(c.bridesmaids||0)+'" min="0" onchange="updC(\''+id+'\',{bridesmaids:parseInt(this.value)||0})"/></div><div class="fi s2"><label>Notes</label><textarea onchange="updC(\''+id+'\',{notes:this.value})">'+(c.notes||'')+'</textarea></div></div>'
    +'</div>'
    +'<div id="ct-hist" style="display:none">'
    +'<div class="stitle">Quotations</div>'+(qr?'<table style="width:100%;border-collapse:collapse;margin-bottom:14px"><tbody>'+qr+'</tbody></table>':'<div style="font-size:13px;color:var(--muted);font-style:italic;margin-bottom:12px">No quotations</div>')
    +'<div class="stitle">Invoices</div>'+(ir?'<table style="width:100%;border-collapse:collapse"><tbody>'+ir+'</tbody></table>':'<div style="font-size:13px;color:var(--muted);font-style:italic">No invoices</div>')
    +'<div style="margin-top:14px"><button class="btn btn-primary btn-sm" onclick="CM(\'cust-modal\');openQM(null,\''+id+'\')" >+ Create Quotation</button></div>'
    +'</div>';
  document.getElementById('cm-f').innerHTML='<button class="btn btn-ghost" onclick="CM(\'cust-modal\')">Close</button>';
  OM('cust-modal');
}
async function updC(id,data){try{await fbP('/customers/'+id,data);custs[id]=Object.assign({},custs[id],data);}catch(e){notif('Error: '+e.message);}}
function openNC(){['nc-n','nc-p','nc-e','nc-v','nc-nt'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});var bm=document.getElementById('nc-b');if(bm)bm.value='0';var w=document.getElementById('nc-w');if(w)w.value='';OM('ncust-modal');}
async function saveNC(){
  var name=(document.getElementById('nc-n')?document.getElementById('nc-n').value:'').trim();
  var phone=(document.getElementById('nc-p')?document.getElementById('nc-p').value:'').trim();
  if(!name||!phone){notif('Name and WhatsApp required.');return;}
  var id='cust-'+uid();
  var nc={id:id,name:name,phone:phone,email:(document.getElementById('nc-e')?document.getElementById('nc-e').value:'').trim(),weddingDate:(document.getElementById('nc-w')?document.getElementById('nc-w').value:''),venue:(document.getElementById('nc-v')?document.getElementById('nc-v').value:'').trim(),bridesmaids:parseInt((document.getElementById('nc-b')?document.getElementById('nc-b').value:'0')),notes:(document.getElementById('nc-nt')?document.getElementById('nc-nt').value:'').trim(),anniversary:'',createdAt:new Date().toISOString(),quotes:{},invoices:{}};
  try{await fbS('/customers/'+id,nc);custs[id]=nc;CM('ncust-modal');notif('Customer created!');if(_cb){_cb(nc);_cb=null;}render();}catch(e){notif('Error: '+e.message);}
}
function rFinance(){
  var allI=[];
  lA().forEach(function(l){Object.values(l.invoices||{}).forEach(function(inv){allI.push(Object.assign({},inv,{cn:l.name}));});});
  cA().forEach(function(c){Object.values(c.invoices||{}).forEach(function(inv){allI.push(Object.assign({},inv,{cn:c.name}));});});
  allI.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
  var tR=allI.reduce(function(s,i){return s+qTot(i.items);},0);
  var tC=allI.reduce(function(s,i){return s+(i.advance||0);},0);
  var cnt=allI.length;
  var mo={};
  allI.forEach(function(i){var m=i.date?i.date.slice(0,7):'?';if(!mo[m])mo[m]={r:0,c:0,n:0};mo[m].r+=qTot(i.items);mo[m].c+=(i.advance||0);mo[m].n++;});
  var mos=Object.keys(mo).sort();
  var mr='';
  mos.forEach(function(m){var x=mo[m];var p=x.r>0?Math.round(x.c/x.r*100):0;var lb=new Date(m+'-01').toLocaleDateString('en-GB',{month:'short',year:'numeric'});mr+='<tr><td style="font-weight:600">'+lb+'</td><td style="text-align:center">'+x.n+'</td><td style="color:var(--gold);font-weight:600">'+fR(x.r)+'</td><td><div style="display:flex;align-items:center;gap:5px"><div style="flex:1;height:4px;background:var(--border);border-radius:2px"><div style="width:'+p+'%;height:100%;background:var(--success);border-radius:2px"></div></div><span style="font-size:11px;color:var(--success);font-weight:600;min-width:28px">'+p+'%</span></div></td></tr>';});
  var out=allI.filter(function(i){return qTot(i.items)-(i.advance||0)>0;}).sort(function(a,b){return(qTot(b.items)-(b.advance||0))-(qTot(a.items)-(a.advance||0));}).slice(0,8);
  var or='';out.forEach(function(i){var b=qTot(i.items)-(i.advance||0);or+='<tr><td><div style="font-weight:600;font-size:13px">'+i.cn+'</div></td><td style="font-size:11px;color:var(--muted)">'+i.id+'</td><td style="font-weight:700;color:var(--warn)">'+fR(b)+'</td></tr>';});
  var lr='';
  allI.slice().reverse().forEach(function(i){var t=qTot(i.items);var b=i.advance||0;var bal=t-b;var p=t>0?Math.round(b/t*100):0;var sc=p>=100?'var(--success)':p>0?'var(--warn)':'var(--danger)';var sl=p>=100?'Paid':p>0?'Partial':'Unpaid';lr+='<tr><td style="font-size:12px">'+fmt(i.date)+'</td><td class="cn">'+i.cn+'</td><td style="font-size:11px;color:var(--muted)">'+i.id+'</td><td style="font-weight:700;color:var(--gold)">'+fR(t)+'</td><td style="color:var(--success);font-weight:600">'+fR(b)+'</td><td style="font-weight:600">'+fR(Math.max(0,bal))+'</td><td><span class="badge" style="background:'+sc+'22;color:'+sc+'">'+sl+'</span></td></tr>';});
  document.getElementById('MC').innerHTML=
    '<div class="sg">'
    +sCard('Total Revenue',fR(tR),cnt+' invoices','ig')
    +sCard('Collected',fR(tC),(tR>0?Math.round(tC/tR*100):0)+'% of total','iv')
    +sCard('Balance Due',fR(tR-tC),'Outstanding','io')
    +sCard('Avg Invoice',cnt>0?fR(Math.round(tR/cnt)):'Rs 0','Per client','ib')
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px">'
    +'<div class="card"><div class="card-hdr"><div class="card-title">Monthly Revenue</div></div>'+(mos.length?'<table><thead><tr><th>Month</th><th>Count</th><th>Revenue</th><th>Collected</th></tr></thead><tbody>'+mr+'</tbody></table>':'<div class="empty" style="padding:40px"><div class="et">No data</div></div>')+'</div>'
    +'<div class="card"><div class="card-hdr"><div class="card-title">Outstanding</div></div>'+(out.length?'<table><thead><tr><th>Client</th><th>Invoice</th><th>Balance</th></tr></thead><tbody>'+or+'</tbody></table>':'<div class="empty" style="padding:40px"><div class="et">All paid up</div></div>')+'</div>'
    +'</div>'
    +'<div class="card"><div class="card-hdr"><div class="card-title">Invoice Ledger</div><div style="font-size:12px;color:var(--muted)">'+cnt+' total</div></div>'+(cnt?'<div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Client</th><th>Invoice</th><th>Total</th><th>Bespeaking</th><th>Balance</th><th>Status</th></tr></thead><tbody>'+lr+'</tbody></table></div>':'<div class="empty" style="padding:60px"><div class="et">No invoices yet</div></div>')+'</div>';
}
function rSettings(tab){
  var s=gSet();var at=tab||'invoice';var lp=s.linePrices||{};
  var pi='';
  SVCS.filter(function(sv){return sv.aA||sv.b>0;}).forEach(function(sv){
    var pid='p-'+sv.d.replace(/[^a-z0-9]/gi,'_');
    pi+='<div style="display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 13px"><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--navy)">'+sv.d+'</div><div style="font-size:11px;color:var(--muted)">'+sv.c+' · Default Rs '+sv.b.toLocaleString()+'</div></div><input type="number" id="'+pid+'" value="'+(lp[sv.d]||'')+'" placeholder="'+sv.b+'" style="width:110px;text-align:right;background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:6px 9px;font-size:13px;font-family:Inter,sans-serif;color:var(--text);outline:none"/></div>';
  });
  var it='<div class="fi" style="margin-bottom:18px"><label>Default Notes / Terms</label><textarea id="s-notes" style="min-height:130px">'+(s.defaultNotes||defNotes()).replace(/</g,'&lt;')+'</textarea></div><div class="fi" style="margin-bottom:18px"><label>Company Logo URL</label><input type="text" id="s-logo" value="'+(s.logoUrl||'')+'" placeholder="https://... image URL"/></div><button class="btn btn-primary" onclick="saveInvS()">Save Invoice Settings</button>';
  var pt='<div style="margin-bottom:12px;font-size:13px;color:var(--muted)">Override defaults. Leave blank to use default.</div><div style="display:flex;flex-direction:column;gap:8px">'+pi+'</div><button class="btn btn-primary" style="margin-top:14px" onclick="savePriceS()">Save Prices</button>';
  var dt='<div style="background:#FEF2F2;border:1.5px solid #FECACA;border-radius:10px;padding:18px"><div style="font-size:14px;font-weight:600;color:var(--danger);margin-bottom:7px">Clear Test Data</div><div style="font-size:13px;color:var(--text2);margin-bottom:14px">Permanently deletes all leads, customers, quotations and invoices. Settings and prices are kept.</div><button class="btn btn-danger" onclick="clearData()">Delete All Test Data</button></div>';
  document.getElementById('MC').innerHTML=
    '<div style="max-width:620px">'
    +'<div class="tabs" style="margin-bottom:18px">'
    +'<div class="tab '+(at==='invoice'?'active':'')+'" onclick="rSettings(\'invoice\')">Invoice Settings</div>'
    +'<div class="tab '+(at==='prices'?'active':'')+'" onclick="rSettings(\'prices\')">Line Item Prices</div>'
    +'<div class="tab '+(at==='data'?'active':'')+'" onclick="rSettings(\'data\')">Test Data</div>'
    +'</div>'
    +'<div class="card"><div class="mbdy">'+(at==='invoice'?it:at==='prices'?pt:dt)+'</div></div>'
    +'</div>';
}
function saveInvS(){var notes=document.getElementById('s-notes')?document.getElementById('s-notes').value:'';var logo=document.getElementById('s-logo')?document.getElementById('s-logo').value:'';sSet(Object.assign({},gSet(),{defaultNotes:notes,logoUrl:logo}));notif('Saved!');}
function savePriceS(){var s=gSet();var lp=s.linePrices||{};SVCS.filter(function(sv){return sv.aA||sv.b>0;}).forEach(function(sv){var pid='p-'+sv.d.replace(/[^a-z0-9]/gi,'_');var el=document.getElementById(pid);if(el&&el.value&&parseFloat(el.value)>0)lp[sv.d]=parseFloat(el.value);else delete lp[sv.d];});sSet(Object.assign({},s,{linePrices:lp}));notif('Prices saved!');}
async function clearData(){if(!confirm('DELETE ALL test data?'))return;if(!confirm('Are you sure?'))return;try{await fbS('/leads',null);await fbS('/customers',null);leads={};custs={};notif('Cleared.');render();}catch(e){notif('Error: '+e.message);}}
(function(){
  function chk(){var b=document.getElementById('MSB');if(b)b.style.display=window.innerWidth<=900?'flex':'none';}
  chk();window.addEventListener('resize',chk);
  window.onerror=function(msg,src,line){
    document.getElementById('lerr').style.display='block';
    document.getElementById('lm').textContent='Error: '+msg+' (line '+line+')';
    document.getElementById('LS').style.display='flex';
    document.getElementById('APP').style.display='none';
  };
  loadData();
})();
</script>
