  }

  if(!body){
    if(searching) body = _briefEmpty('No matches in today’s view');
    else if(f !== 'all') body = _briefEmpty('Nothing under '+({leads:'Leads',quotes:'Quotes',visits:'Visits'}[f]||f)+' today');
  }

  html += body;
  document.getElementById('MC').innerHTML = html;
}



// ============================================================
// TODAY'S ACTIONS WIDGET
// Grouped, deduplicated, action-required-within-24h
// ============================================================

// Quiet mode (manually pauses all action surfacing for today)
function isQuietMode(){
  var s = gSet();
  if(!s.quietUntil) return false;
  return new Date(s.quietUntil) > new Date();
}

function setQuietMode(hoursFromNow){
  var s = gSet();
  if(hoursFromNow > 0){
    var until = new Date(); until.setHours(until.getHours() + hoursFromNow);
    s.quietUntil = until.toISOString();
  } else {
    delete s.quietUntil;
  }
  sSet(s);
}

// Compute today's actionable items, grouped by type
function computeTodaysActions(){
  var now = new Date();
  var todayEnd = new Date(); todayEnd.setHours(23,59,59,999);
  
  // 1. Follow-ups (overdue or due today)
  var followUps = [];
  Object.values(brides).forEach(function(b){
    if(b.confirmed || b.cancelled || b.lost || b.remindersStopped) return;
    if(!b.nextReminderAt) return;
    if(new Date(b.nextReminderAt) <= todayEnd){
      followUps.push({
        id:b.id, name:b.name||'(no name)',
        phone:b.phone||'',
        at:b.nextReminderAt,
        overdue: new Date(b.nextReminderAt) < now
      });
    }
  });
  followUps.sort(function(a,b){return new Date(a.at)-new Date(b.at);});
  
  // 2. Appointments today + tomorrow (to confirm with bride)
  // Compare on day-level (not datetime) so an appointment scheduled today still shows after its time has passed
  var todayStr = now.toISOString().slice(0,10);
  var tomorrowStr = new Date(now.getTime() + 86400000).toISOString().slice(0,10);
  var appts = [];
  Object.values(brides).forEach(function(b){
    if(b.lost || b.cancelled) return;
    Object.values(b.appointments||{}).forEach(function(a){
      if(a.cancelled || a.done) return;
      if(!a.date) return;
      var apptDay = a.date.slice(0,10);
      var isToday = apptDay === todayStr;
      var isTomorrow = apptDay === tomorrowStr;
      if(isToday || isTomorrow){
        appts.push({
          brideId:b.id, brideName:b.name||'(no name)',
          phone:b.phone||'',
          apptKey:a.key,
          date:a.date, time:a.time||'',
          reason:a.reason||'Appointment',
          isToday: isToday
        });
      }
    });
  });
  appts.sort(function(a,b){return new Date(a.date+'T'+(a.time||'00:00')) - new Date(b.date+'T'+(b.time||'00:00'));});
  
  // 3. Quotes due (stage 3 = Consultation Done, no quote sent yet, consultation 2+ days ago)
  var quotesDue = [];
  Object.values(brides).forEach(function(b){
    if(b.confirmed || b.cancelled || b.lost) return;
    if(Number(b.stage||0) !== 3) return;
    var hasQuote = b.quotes && Object.keys(b.quotes).length > 0;
    if(hasQuote) return;
    // Find consultation done date (most recent done consultation)
    var consults = Object.values(b.appointments||{}).filter(function(a){return a.reason==='Consultation' && a.done && !a.cancelled;});
    if(consults.length === 0){
      // No marked-done consultation but stage is 3 - use lastActivity as fallback
      var since = b.lastActivity ? (now - new Date(b.lastActivity))/86400000 : 999;
      if(since >= 2){
        quotesDue.push({id:b.id, name:b.name||'(no name)', phone:b.phone||'', daysSince:Math.round(since)});
      }
    } else {
      consults.sort(function(a,b){return new Date(b.doneAt||0) - new Date(a.doneAt||0);});
      var lastDone = consults[0];
      var daysSince = (now - new Date(lastDone.doneAt || lastDone.date)) / 86400000;
      if(daysSince >= 2){
        quotesDue.push({id:b.id, name:b.name||'(no name)', phone:b.phone||'', daysSince:Math.round(daysSince)});
      }
    }
  });
  quotesDue.sort(function(a,b){return b.daysSince - a.daysSince;}); // oldest first
  
  // 4. Urgent payments: confirmed brides with wedding in <=14 days AND balance > 0
  //    OVERDUE = wedding already happened (daysToWed < 0) AND balance still > 0 - never let these slip
  var urgentPayments = [];
  Object.values(brides).forEach(function(b){
    if(!b.confirmed || b.cancelled) return;
    if(!b.weddingDate) return;
    var dToWed = dU(b.weddingDate);
    if(dToWed === null) return;
    if(dToWed > 14) return; // future weddings >14 days away — not urgent yet
    // Compute balance
    var totalDue = 0, totalPaid = 0;
    Object.values(b.invoices||{}).forEach(function(inv){
      totalDue += qTot(inv.items);
      totalPaid += invPaid(inv);
    });
    var balance = totalDue - totalPaid;
    if(balance > 0){
      urgentPayments.push({
        id:b.id, name:b.name||'(no name)',
        phone:b.phone||'',
        daysToWed: dToWed,        // can be negative (overdue)
        balance: balance,
        overdue: dToWed < 0
      });
    }
  });
  urgentPayments.sort(function(a,b){return a.daysToWed - b.daysToWed;}); // overdue first (most negative first)
  
  return {
    followUps: followUps,
    appts: appts,
    quotesDue: quotesDue,
    urgentPayments: urgentPayments,
    quietMode: isQuietMode()
  };
}

  window._expandedActions[key] = !window._expandedActions[key];

// Summarise the events the lead ticked (wedding/homecoming/goingAway/engagement).
function _intakeEvents(b){

// Dismiss: confirm, then delete the intake record (no bride created).
async function dismissIntake(id){
  var rec=INTAKE&&INTAKE[id];
  if(!rec){notif('That enquiry is no longer available.');return;}
  var res=await showConfirm({
    title:'Dismiss enquiry?',
    msg:'This will permanently remove the enquiry from '+(rec.name||'this lead')+'. No bride record will be created.',
    yesText:'Dismiss',
    dangerous:true
  });
  if(!res.ok)return;
  if(window._busy)return; window._busy=true;

}
// Helper: HTML-escape user-provided strings to prevent injection
function escHtml(s){
  if(s===undefined||s===null)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
// Helper: JS-string escape for values embedded inside onclick="fn('...')" attributes.
// HTML escaping alone is NOT enough in JS context - a single quote breaks the handler.
function escAttr(s){
  if(s===undefined||s===null)return '';
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,'\\u0027').replace(/"/g,'\\u0022').replace(/</g,'\\u003C').replace(/>/g,'\\u003E').replace(/\r?\n/g,' ');
}
// Helper: escape user-provided multi-line notes for HTML display, preserving line breaks.
function escHtmlMultiline(s){
  if(s===undefined||s===null)return '';
  return escHtml(s).replace(/\r?\n/g,'<br/>');
}
// Helper: relative time. Best-effort, falls back to date.
function timeAgo(iso){
  try{
    var t=new Date(iso).getTime();
    var now=Date.now();
    var diff=Math.max(0,Math.floor((now-t)/1000));
    if(diff<60)return 'just now';
    if(diff<3600)return Math.floor(diff/60)+'m ago';
    if(diff<86400)return Math.floor(diff/3600)+'h ago';
    if(diff<7*86400)return Math.floor(diff/86400)+'d ago';
    return fmt(iso);
  }catch(e){return iso||'';}
}

    var rows = ap.map(function(a){
      var ph = (a.phone||'').replace(/\D/g,'');

  if(qd.length > 0 && (filter==='all'||filter==='quotes')){

      var cta = '<button class="bact" onclick="event.stopPropagation();openOverviewForm(\''+escAttr(qq.id)+'\',{intent:\'quote\'})">Create quote</button>';

    });

  }

  // Payments (red — genuine act-now) — Open CTA.
  if(up.length > 0 && filter==='all'){

  }

  return html;
}

// DISPOSITION MODAL - Log contact attempt outcomes
// ============================================================
var DISP = {brideId:null, outcome:null, draft:{}};

function openDisp(brideId){
  var l = leads[brideId]; if(!l) return;
  DISP = {brideId:brideId, outcome:null, draft:{}};
  document.getElementById('disp-sub').textContent = l.name + (l.phone?' · '+fmtPhone(l.phone):'');
  renderDisp();
  OM('disp-modal');
}

  DISP = {brideId:null, outcome:null, draft:{}};
  CM('disp-modal');
}

function renderDisp(){
  var l = leads[DISP.brideId]; if(!l) return;
  var atts = Object.values(l.contactAttempts||{});
  var attCount = atts.length;
  // Step 1: pick outcome (if not chosen)
  if(!DISP.outcome){
    var historyTxt = attCount===0 ? 'First contact attempt' : attCount+' previous attempt'+(attCount!==1?'s':'');
    var historyDetail = '';
    if(attCount>0){
      var lastAtt = atts.slice().sort(function(a,b){return new Date(b.at)-new Date(a.at);})[0];
      var lastLabel = {no_answer:'No answer',callback_later:'Reached - call back later',consult_booked:'Booked consultation',not_interested:'Not interested'}[lastAtt.outcome] || lastAtt.outcome;
      historyDetail = '<div style="font-size:11px;color:var(--muted);margin-bottom:14px">Last: '+escHtml(lastLabel)+' on '+fmt(lastAtt.at)+(lastAtt.note?' — "'+escHtml(lastAtt.note)+'"':'')+'</div>';

      '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px">'+historyTxt+'</div>'
      +historyDetail

      +'<div style="display:flex;flex-direction:column;gap:8px">'
      +'<button class="btn btn-outline" style="justify-content:flex-start;padding:14px;text-align:left" onclick="pickDisp(\'no_answer\')">📵 No answer</button>'
      +'<button class="btn btn-outline" style="justify-content:flex-start;padding:14px;text-align:left" onclick="pickDisp(\'callback_later\')">📞 Reached — call back later</button>'
      +'<button class="btn btn-outline" style="justify-content:flex-start;padding:14px;text-align:left" onclick="pickDisp(\'consult_booked\')">📅 Reached — book consultation</button>'
      +'<button class="btn btn-outline" style="justify-content:flex-start;padding:14px;text-align:left;color:var(--danger);border-color:rgba(229,62,62,0.3)" onclick="pickDisp(\'not_interested\')">❌ Reached — not interested</button>'

async function saveDisp(){
  var l = leads[DISP.brideId]; if(!l) return;
  var brideId = DISP.brideId;
  var note = (document.getElementById('disp-note')||{}).value || '';
  var nowIso = new Date().toISOString();
  var attId = 'att-'+uid();
  // Build the complete attempt object FIRST (no nested patches)
  var attempt = {id:attId, at:nowIso, outcome:DISP.outcome, note:note, by:'user'};
  // Outcome-specific fields go ON the attempt object (not as separate patch keys)
  if(DISP.outcome === 'no_answer'){
    var channel = (document.getElementById('disp-channel')||{}).value || 'whatsapp';
    attempt.channel = channel;
  }
  // Outcome-specific patches
  var patch = {};
  patch['contactAttempts/'+attId] = attempt;  // Single write per attempt — no sub-key conflicts
  patch['lastActivity'] = nowIso;
  // Track for save-confirmation message
  var savedNextReminderAt = null;
  if(DISP.outcome === 'no_answer'){
    // Advance stage from 0 -> 1 (Contacted) on first attempt only if not already advanced
    if(Number(l.stage||0) === 0){
      patch['stage'] = 1;
    }
    // Compute next reminder
    var atts = Object.values(l.contactAttempts||{});
    var attNum = atts.length + 1;
    if(attNum >= 3){
      // Final attempt - no next reminder, will auto-Lost after 14d
      patch['nextReminderAt'] = null;
      patch['remindersStopped'] = false; // not stopped, just no scheduled next
    } else {
      var remChoice = (document.querySelector('input[name="disp-rem"]:checked')||{}).value || 'default';
      var next = null;
      if(remChoice === 'default'){
        var defD = attNum===1 ? 2 : 4;
        var nd = new Date(); nd.setDate(nd.getDate()+defD); nd.setHours(9,0,0,0);
        next = nd.toISOString();
      } else if(remChoice === 'custom'){
        var cv = (document.getElementById('disp-rem-custom')||{}).value;
        if(cv) next = new Date(cv).toISOString();
      } else if(remChoice === 'snooze'){
        var sd = parseInt((document.getElementById('disp-rem-snooze')||{}).value || 7);
        var nd2 = new Date(); nd2.setDate(nd2.getDate()+sd); nd2.setHours(9,0,0,0);
        next = nd2.toISOString();
      } else if(remChoice === 'stop'){
        patch['remindersStopped'] = true;
        next = null;
      }
      patch['nextReminderAt'] = next;
      savedNextReminderAt = next;
    }
  } else if(DISP.outcome === 'callback_later'){
    var cbChoice = (document.querySelector('input[name="disp-cb"]:checked')||{}).value || 'specific';
    var next2 = null;
    if(cbChoice === 'specific'){
      var ct = (document.getElementById('disp-cb-time')||{}).value;
      if(!ct){notif('Please pick a callback time.');return;}
      next2 = new Date(ct).toISOString();
    } else {
      var nd3 = new Date(); nd3.setDate(nd3.getDate()+3); nd3.setHours(9,0,0,0);
      next2 = nd3.toISOString();
    }
    patch['nextReminderAt'] = next2;
    savedNextReminderAt = next2;
    if(Number(l.stage||0) === 0){
      patch['stage'] = 1;
    }
  } else if(DISP.outcome === 'consult_booked'){
    var csDate = (document.getElementById('disp-cs-date')||{}).value;
    var csTime = (document.getElementById('disp-cs-time')||{}).value || '';
    if(!csDate){notif('Consultation date is required.');return;}
    // Create the consultation appointment
    var apptKey = 'a-'+uid();
    var appt = {key:apptKey, date:csDate, time:csTime, reason:'Consultation', note:note, cancelled:false, createdAt:nowIso};
    patch['appointments/'+apptKey] = appt;
    patch['stage'] = 2;
    patch['nextReminderAt'] = null;
    patch['remindersStopped'] = true; // stage 2+ = no more contact reminders
  } else if(DISP.outcome === 'not_interested'){
    var reason = (document.getElementById('disp-lost-reason')||{}).value;
    if(!reason){notif('Please pick a reason.');return;}
    var otherTxt = '';
    if(reason === 'other'){
      otherTxt = (document.getElementById('disp-lost-other')||{}).value.trim();
      if(!otherTxt){notif('Please specify the reason.');return;}
    }
    patch['lost'] = true;
    patch['lostReason'] = reason;
    patch['lostReasonNote'] = otherTxt;
    patch['lostAt'] = nowIso;
    patch['nextReminderAt'] = null;
    patch['remindersStopped'] = true;
  }
  window._saving = true;
  try {
    await fbP('/brides/'+brideId, patch);
    // Update local
    if(!brides[brideId]) brides[brideId] = {};
    brides[brideId].contactAttempts = brides[brideId].contactAttempts || {};
    brides[brideId].contactAttempts[attId] = attempt;
    Object.keys(patch).forEach(function(k){
      if(k.indexOf('/') === -1){
        brides[brideId][k] = patch[k];
      }
    });
    if(DISP.outcome === 'consult_booked'){
      brides[brideId].appointments = brides[brideId].appointments || {};
      brides[brideId].appointments[apptKey] = appt;
    }
    projectViews();
    try { await logHistory(brideId, 'contact-attempt', {outcome:DISP.outcome, attempt:attNum||1}); } catch(e){}
    // Save-confirmation message — be explicit about when the next action will surface
    var msg;
    if(DISP.outcome === 'no_answer'){
      if(savedNextReminderAt){
        msg = 'Attempt logged · Next reminder '+fmtReminderTime(savedNextReminderAt);
      } else {
        msg = 'Final attempt logged · Auto-closes in 14 days if no reply';
      }
    } else if(DISP.outcome === 'callback_later'){
      msg = 'Callback scheduled for '+fmtReminderTime(savedNextReminderAt);
    } else if(DISP.outcome === 'consult_booked'){
      msg = 'Consultation booked.';
    } else {
      msg = 'Lead closed.';
    }
    notif(msg);
    closeDisp();
    render();
  } catch(e) {
    notif('Error: '+e.message);
  } finally {
    window._saving = false;
  }
}

// Format a reminder timestamp as a friendly relative or absolute label
function fmtReminderTime(iso){
  if(!iso) return '';
  var d = new Date(iso);
  if(isNaN(d.getTime())) return '';
  var now = new Date();
  var today = new Date(); today.setHours(0,0,0,0);
  var dDay = new Date(d); dDay.setHours(0,0,0,0);
  var daysAway = Math.round((dDay - today) / 86400000);
  var timeStr = d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(daysAway === 0) return 'today at '+timeStr;
  if(daysAway === 1) return 'tomorrow at '+timeStr;
  if(daysAway > 1 && daysAway <= 6){
    return d.toLocaleDateString('en-GB',{weekday:'long'})+' at '+timeStr;
  }
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' at '+timeStr;
}

// Auto-Lost daily check: brides with 3+ no_answer attempts where the 3rd was 14+ days ago
async function checkAutoLost(){
  var todayKey = new Date().toISOString().slice(0,10);
  var lastRun = localStorage.getItem('biso_autoLostLastRun');
  if(lastRun === todayKey) return; // only run once per calendar day
  var closed = 0;
  var brideIds = Object.keys(brides);
  for(var i = 0; i < brideIds.length; i++){
    var b = brides[brideIds[i]];
    if(!b || b.lost || b.confirmed || b.cancelled) continue;
    var atts = Object.values(b.contactAttempts||{});
    var noAnswerAtts = atts.filter(function(a){return a.outcome === 'no_answer';})
      .sort(function(a,b){return new Date(a.at) - new Date(b.at);});
    if(noAnswerAtts.length < 3) continue;
    var thirdAttDate = new Date(noAnswerAtts[2].at);
    var daysSince = (Date.now() - thirdAttDate.getTime()) / 86400000;
    if(daysSince < 14) continue;
    // Check no contact attempts at all since 3rd
    var anyLater = atts.some(function(a){return new Date(a.at) > thirdAttDate;});
    if(anyLater) continue;
    // Auto-close
    try {
      await fbP('/brides/'+b.id, {lost:true, lostReason:'unresponsive', lostAt:new Date().toISOString(), remindersStopped:true});
      b.lost = true; b.lostReason = 'unresponsive'; b.lostAt = new Date().toISOString(); b.remindersStopped = true;
      try { await logHistory(b.id, 'auto-lost', {reason:'unresponsive', daysSince:Math.round(daysSince)}); } catch(e){}
      closed++;
    } catch(e){ /* ignore single failure */ }
  }
  localStorage.setItem('biso_autoLostLastRun', todayKey);
  if(closed > 0){
    projectViews();
    notif('Auto-closed '+closed+' unresponsive lead'+(closed!==1?'s':'')+'.');
    if(view === 'pipeline') render();
  }
}

// ===== Phase 1A/1C: Auth lifecycle =====
// authInit() runs at startup. Auth is MANDATORY (Phase 1C): it initialises Firebase
// Auth and shows the login screen whenever no user is signed in. Fails closed.
function authInit(){
  return new Promise(function(resolve){
    try{
      // Phase 1C: auth is now ALWAYS required. The ?auth=1 opt-in flag has been removed.
      window._auth.enabled=true;
      if(typeof firebase==='undefined'||!firebase.initializeApp){
        // SDK didn't load - FAIL CLOSED. Without auth we must not open the CRM.
        window._auth.enabled=true;
        resolve({needLogin:true,sdkFailed:true});
        return;
      }
      try{firebase.initializeApp(_FBCFG);}catch(e){/* already initialised */}
      // Persistence: LOCAL so the session survives reload/close
      try{firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);}catch(e){}
      // Wait for first auth-state event so we know if user is already logged in.
      var settled=false;
      var unsub=firebase.auth().onAuthStateChanged(function(u){
        if(settled)return;
        settled=true;
        unsub();
        window._auth.user=u||null;
        window._auth.ready=true;
        resolve({needLogin:!u});
      });
      // Safety: if onAuthStateChanged never fires (network issue), don't hang forever
      setTimeout(function(){
        if(settled)return;
        settled=true;
        window._auth.ready=true;
        resolve({needLogin:true});
      },8000);
    }catch(e){
      // Fail CLOSED: on any error, require login rather than opening the CRM.
      window._auth.enabled=true;
      resolve({needLogin:true,err:e.message});
    }
  });
}
function authMapErr(code){
  // Friendly error messages - Firebase codes are technical
  if(!code)return 'Sign-in failed. Please try again.';
  var m={
    'auth/wrong-password':'Wrong password.',
    'auth/invalid-credential':'Email or password is incorrect.',
    'auth/invalid-login-credentials':'Email or password is incorrect.',
    'auth/user-not-found':'No account found for that email.',
    'auth/invalid-email':'That doesn\'t look like a valid email.',
    'auth/too-many-requests':'Too many tries. Wait a minute and try again.',
    'auth/network-request-failed':'Network error. Check your connection.',
    'auth/user-disabled':'This account has been disabled.'
  };
  return m[code]||'Sign-in failed. Please try again.';
}

function initials(s){
  if(!s)return '··';
  // If it looks like an email, take the part before @; otherwise use as-is (a name).
  var base=s.indexOf('@')!==-1?(s.split('@')[0]||''):s;
  // Two-word name like "Dinushi Fernando" -> "DF"
  var parts=base.trim().split(/\s+/).filter(Boolean);
  if(parts.length>=2){
    var a=parts[0].replace(/[^a-zA-Z]/g,'');
    var b=parts[1].replace(/[^a-zA-Z]/g,'');
    if(a&&b)return (a.charAt(0)+b.charAt(0)).toUpperCase();
  }
  // Single word: first two letters
  var letters=base.replace(/[^a-zA-Z]/g,'');
  if(!letters)return (s.charAt(0)||'·').toUpperCase()+'·';
  if(letters.length===1)return letters.toUpperCase()+'·';
  return (letters.charAt(0)+letters.charAt(1)).toUpperCase();
}

// Self-editable, non-privilege fields live at /profiles/<uid>. Role stays in /roles
// (owner-seeded, NEVER written here) so the privilege boundary holds under C1 rules.
async function loadProfile(){
  if(!window._auth||!window._auth.user)return;

async function saveMyProfile(){
  if(window._saving)return;
  if(!window._auth||!window._auth.user){notif('Sign in first.');return;}
  var inp=document.getElementById('ma-name');var nm=inp?inp.value.trim():'';
  if(!nm){notif('Enter a display name.');return;}
  window._saving=true;
  try{
    await fbP('/profiles/'+window._auth.user.uid,{name:nm,updatedAt:new Date().toISOString()});
    window._auth.profile=window._auth.profile||{};window._auth.profile.name=nm;

async function changeMyPassword(){
  if(!window._auth||!window._auth.user){notif('Sign in first.');return;}
  var cur=document.getElementById('ma-pw-cur');var nw=document.getElementById('ma-pw-new');var nw2=document.getElementById('ma-pw-new2');
  var curV=cur?cur.value:'';var nwV=nw?nw.value:'';var nw2V=nw2?nw2.value:'';
  if(!curV||!nwV){notif('Enter your current and new password.');return;}
  if(nwV.length<6){notif('New password must be at least 6 characters.');return;}
  if(nwV!==nw2V){notif('New passwords do not match.');return;}
  try{
    var user=firebase.auth().currentUser;
    var cred=firebase.auth.EmailAuthProvider.credential(user.email,curV);
    await user.reauthenticateWithCredential(cred);
    await user.updatePassword(nwV);
    if(cur)cur.value='';if(nw)nw.value='';if(nw2)nw2.value='';
    notif('Password updated.');
  }catch(e){
    var msg='Could not update password.';
    if(e&&(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'))msg='Current password is incorrect.';
    else if(e&&e.code==='auth/weak-password')msg='New password is too weak.';
    else if(e&&e.code==='auth/too-many-requests')msg='Too many attempts — try again later.';
    else if(e&&e.message)msg='Could not update password: '+e.message;
    notif(msg);
  }
}
async function sendMyReset(){

/* ===== Push transport (Phase B: service worker + FCM token registration) =====
   Registers the messaging service worker and mints/stores an FCM token so
   Phase C's Cloud Functions can deliver lock-screen pushes. Degrades gracefully:
   if the SW or VAPID key isn't ready, enablePush() (Phase A) just keeps the
   toggle off with a clear message. */

// Paste the Web Push certificate "Key pair" from Firebase Console →
// Project settings → Cloud Messaging → Web configuration → Web Push certificates.
// Until this is filled, push token registration is skipped (in-app feed still works).
var FCM_VAPID_KEY = "BMqwusLX9NNjwoZblRW6AotdliXuFCTFNXiXJfyPtgbApSBPAoRBJrxabu3UrHS50C_3lLN2kcOPJls_3hPVqgA";

window._fcm = { sw: null, messaging: null };
window._fcmReady = false;

async function initPushTransport(){
  try{
    if(!('serviceWorker' in navigator)){console.log('[push] no service worker support');return;}
    if(typeof firebase==='undefined'||!firebase.messaging){console.log('[push] messaging SDK absent');return;}
    if(!firebase.messaging.isSupported||!firebase.messaging.isSupported()){
      console.log('[push] messaging not supported on this browser');return;
    }
    var reg=await navigator.serviceWorker.register('firebase-messaging-sw.js');
    window._fcm.sw=reg;
    window._fcm.messaging=firebase.messaging();
    // Foreground messages: app is open → drop into the in-app feed + toast.
    try{
      window._fcm.messaging.onMessage(function(payload){
        var d=(payload&&payload.data)||{};
        var u=notifUid();
        if(u){
          var id=uid();
          var entry={type:d.type||'push',title:d.title||'Biso CRM',body:d.body||'',brideId:d.brideId||'',read:false,at:new Date().toISOString()};
          window._notif.items[id]=entry;renderNotifBadge();
          try{fbP('/notifications/'+u+'/'+id,entry);}catch(e){}
        }
        if(d.title)notif(d.title+(d.body?' — '+d.body:''));
      });
    }catch(e){console.log('[push] onMessage wire failed:',e.message);}
    // Ready only when we can actually mint a token (needs the VAPID key).
    window._fcmReady=!!FCM_VAPID_KEY;
    console.log('[push] transport ready; token mint '+(window._fcmReady?'ENABLED':'pending VAPID key'));
  }catch(e){console.log('[push] init failed:',e.message);}
}

async function registerFcmToken(){
  if(!window._fcm.messaging||!window._fcm.sw)throw new Error('Push transport not ready');
  if(!FCM_VAPID_KEY)throw new Error('Push not configured yet');
  var token=await window._fcm.messaging.getToken({vapidKey:FCM_VAPID_KEY,serviceWorkerRegistration:window._fcm.sw});
  if(!token)throw new Error('No token returned');
  var u=notifUid();if(!u)throw new Error('Not signed in');
  // Store under the user's uid. Key is the token itself (one entry per device).
  var safe=token.replace(/[.#$\[\]\/]/g,'_');
  await fbP('/fcmTokens/'+u+'/'+safe,{token:token,ua:(navigator.userAgent||'').slice(0,180),at:new Date().toISOString()});
  return token;
}


/* ===== Notifications (Phase A: in-app feed + per-user prefs + push scaffolding) =====
   Feed entries and push are both written by Cloud Functions in Phase C.
   This module renders the bell, the feed, and per-user preferences, and holds
   the token-registration entry point (enablePush) that Phase C will activate. */
window._notif={items:{},prefs:null,_iv:null};
function notifUid(){
  if(!window._auth||!window._auth.enabled||!window._auth.user)return null;
  return window._auth.user.uid||null;
}
function notifDefaults(){
  var owner=(window._auth&&window._auth.role==='owner');
  return {push:false,newLead:true,apptReminders:!!owner};
}
function notifAgo(iso){
  if(!iso)return '';
  var t=new Date(iso).getTime();if(isNaN(t))return '';
  var s=Math.floor((Date.now()-t)/1000);
  if(s<60)return 'just now';
  var m=Math.floor(s/60);if(m<60)return m+'m ago';
  var h=Math.floor(m/60);if(h<24)return h+'h ago';
  var d=Math.floor(h/24);if(d===1)return 'yesterday';
  if(d<7)return d+'d ago';
  return fmt(iso);
}
function notifIcon(type){
  if(type==='new_lead')return '\uD83D\uDC70';
  if(type==='appt_reminder')return '\uD83D\uDCC5';
  if(type==='test')return '\uD83D\uDD14';
  return '\u2022';
}
async function loadNotifPrefs(){
  var u=notifUid();var def=notifDefaults();
  if(!u){window._notif.prefs=def;return;}
  try{
    var p=await fbG('/notificationPrefs/'+u);
    if(p&&typeof p==='object'){
      window._notif.prefs={
        push:p.push===true,
        newLead:p.newLead!==false,
        apptReminders:(p.apptReminders!==undefined)?(p.apptReminders===true):def.apptReminders
      };
    }else{window._notif.prefs=def;}
  }catch(e){window._notif.prefs=def;}
}
async function saveNotifPref(key,val){
  var u=notifUid();if(!u)return;
  window._notif.prefs=window._notif.prefs||notifDefaults();
  window._notif.prefs[key]=val;
  try{
    var patch={};patch[key]=val;patch.updatedAt=new Date().toISOString();
    await fbP('/notificationPrefs/'+u,patch);
  }catch(e){notif('Could not save setting: '+e.message);}
}
async function refreshNotifs(){
  var u=notifUid();if(!u)return;
  try{
    var data=await fbG('/notifications/'+u);
    window._notif.items=(data&&typeof data==='object')?data:{};
  }catch(e){/* best-effort; keep last-known items */}
  renderNotifBadge();
  var panel=document.getElementById('NT-m');
  if(panel&&panel.classList.contains('show'))renderNotifList();
}
function notifUnreadCount(){
  var items=window._notif.items||{};var c=0;
  Object.keys(items).forEach(function(k){var n=items[k];if(n&&n.read!==true)c++;});
  return c;
}
function renderNotifBadge(){
  var dot=document.getElementById('NT-dot');if(!dot)return;

  if(c>0){dot.textContent=c>9?'9+':String(c);dot.classList.add('show');}
  else{dot.textContent='';dot.classList.remove('show');}
}
function notifSorted(){
  var items=window._notif.items||{};
  return Object.keys(items).map(function(k){return Object.assign({_id:k},items[k]);})
    .filter(function(n){return n&&typeof n==='object';})
    .sort(function(a,b){return new Date(b.at||0)-new Date(a.at||0);});
}
function renderNotifList(){
  var box=document.getElementById('NT-list');if(!box)return;
  var list=notifSorted();
  if(!list.length){box.innerHTML='<div class="nt-empty">No notifications yet.</div>';return;}
  var h='';
  list.forEach(function(n){
    var unread=n.read!==true;
    var bid=n.brideId?escAttr(n.brideId):'';
    h+='<button class="nt-item'+(unread?' unread':'')+'" onclick="onNotifTap(\''+escAttr(n._id)+'\',\''+bid+'\')">';
    h+='<span class="nt-ic">'+notifIcon(n.type)+'</span>';
    h+='<span class="nt-bd"><span class="nt-t">'+escHtml(n.title||'Notification')+'</span>';
    if(n.body)h+='<span class="nt-m">'+escHtml(n.body)+'</span>';
    h+='<span class="nt-tm">'+escHtml(notifAgo(n.at))+'</span></span></button>';
  });
  box.innerHTML=h;
}

async function markAllNotifsRead(){

  if(!any)return;

    var patch={};Object.keys(items).forEach(function(k){patch[k+'/read']=true;});
    await fbP('/notifications/'+u,patch);

function toggleNotifPanel(ev){
  if(ev)ev.stopPropagation();

function prefSwitch(key,on){
  return '<button class="nt-sw'+(on?' on':'')+'" onclick="onPrefToggle(\''+escAttr(key)+'\',this)" aria-label="toggle"></button>';
}
function renderNotifPrefs(bodyId){
  var body=document.getElementById(bodyId||'NTP-body');if(!body)return;
  var p=window._notif.prefs||notifDefaults();
  var owner=(window._auth&&window._auth.role==='owner');
  var h='';
  h+='<div class="nt-prow"><div class="nt-pl"><div class="nt-pt">Push notifications</div><div class="nt-ps">Lock-screen alerts. Add the CRM to your Home Screen and open it from that icon first.</div></div>'+prefSwitch('push',p.push)+'</div>';
  h+='<div class="nt-prow"><div class="nt-pl"><div class="nt-pt">New lead alerts</div><div class="nt-ps">When an online enquiry arrives.</div></div>'+prefSwitch('newLead',p.newLead)+'</div>';
  if(owner){
    h+='<div class="nt-prow"><div class="nt-pl"><div class="nt-pt">Appointment reminders</div><div class="nt-ps">Evening before and morning of each appointment.</div></div>'+prefSwitch('apptReminders',p.apptReminders)+'</div>';
    h+='<button class="nt-pbtn" onclick="sendTestNotif()">Send test notification</button>';
  }
  body.innerHTML=h;

async function onPrefToggle(key,btn){
  var p=window._notif.prefs||notifDefaults();
  var newVal=!(p[key]===true);
  if(key==='push'&&newVal){
    var ok=await enablePush();
    if(!ok)return; // leave toggle off until push is actually wired (Phase C)
  }
  if(btn){if(newVal)btn.classList.add('on');else btn.classList.remove('on');}
  await saveNotifPref(key,newVal);
}
async function enablePush(){
  // Phase A scaffolding. Real FCM token registration is wired in Phase C
  // (needs the service worker from Phase B + the Blaze Cloud Functions).
  if(!('Notification' in window)){
    notif('This device does not support web notifications.');return false;
  }
  // Standalone = launched from the Home Screen. iOS only allows push from there.
  var nav = (typeof navigator!=='undefined') ? navigator : (window.navigator||{});
  var standalone = (nav.standalone===true) || (window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches);
  if(!standalone){
    notif('To turn on push, first add the CRM to your Home Screen and open it from that icon.');
    return false;
  }
  if(!window._fcmReady||typeof registerFcmToken!=='function'){
    notif('Push isn\u2019t fully switched on yet — it goes live once setup is complete.');
    return false;
  }
  try{
    var perm=await Notification.requestPermission();
    if(perm!=='granted'){notif('Notifications were not allowed.');return false;}
    await registerFcmToken();
    notif('Push notifications enabled on this device.');
    return true;
  }catch(e){notif('Could not enable push: '+e.message);return false;}
}
async function sendTestNotif(){
  var u=notifUid();if(!u){notif('Sign in first.');return;}
  var id=uid();
  var entry={type:'test',title:'Test notification',body:'If you can see this, the in-app feed is working.',read:false,at:new Date().toISOString()};
  try{
    await fbP('/notifications/'+u+'/'+id,entry);
    window._notif.items[id]=entry;
    renderNotifBadge();
    notif('Test notification added — open the bell to see it.');

async function startNotifications(){
  var u=notifUid();if(!u)return;
  await loadNotifPrefs();
  await refreshNotifs();
  if(window._notif._iv)clearInterval(window._notif._iv);
  window._notif._iv=setInterval(function(){refreshNotifs();},25000);
}
async function startAfterAuth(){
  // Called after successful login (or if already logged in at boot in auth mode).
  // Order matters: resolve role BEFORE loading data so the right nav is built.
  // But: never let role-loading block the UI showing user info. Show UI defensively first.
  if(window._auth.user)console.log('[auth] startAfterAuth for',window._auth.user.email);
  // Show user chip immediately (with default role) so it's never missing even if loadRole hangs
  updateAuthUI();
  try{
    // Cap loadRole at 12s — mobile first-calls after wake/token-refresh can be slow.
    await Promise.race([
      loadRole(),
      new Promise(function(_,rej){setTimeout(function(){rej(new Error('loadRole timeout'));},12000);})
    ]);
  }catch(e){
    // Do NOT lock in 'manager' here. roleResolved stays false; we retry below
    // once loadData proves the network is healthy. This prevents the owner from
    // being silently shown the manager view on a slow/returning session.
    console.error('[auth] loadRole failed or timed out (will retry after data):',e.message);
  }
  // Re-update UI now that we (may) know the role
  try{await loadProfile();}catch(e){console.error('[profile] load failed:',e.message);}
  updateAuthUI();
  await loadData();
  // If the role never truly resolved, retry now — the network is clearly up
  // (loadData succeeded). Rebuild nav + re-render if the role actually changes.
  ensureRoleResolved();
  // Load approval requests (Phase 1B-2). Best-effort - don't block on failure.
  try{await loadRequests();}catch(e){console.error('[req] initial load failed:',e.message);}
  try{startNotifications();}catch(e){console.error('[notif] start failed:',e.message);}
  try{initPushTransport();}catch(e){console.error('[push] start failed:',e.message);}
  setTimeout(function(){ checkAutoLost().catch(function(e){console.error('autoLost:',e);}); }, 1500);
  setTimeout(function(){ checkNoShows().catch(function(e){console.error('noShows:',e);}); }, 2500);
}
// Background retry: if the role wasn't confirmed-read yet, keep trying (network is up
// by now). On a successful resolve that changes the role, rebuild nav + re-render so
// the correct pages appear without a manual reload. Bounded to a few attempts.
function ensureRoleResolved(attempt){
  attempt=attempt||0;
  if(!window._auth||!window._auth.enabled||!window._auth.user)return;
  if(window._auth.roleResolved)return; // already confirmed — nothing to do
  if(attempt>=4){
    console.error('[role] still unresolved after retries; staying on safe default (manager)');
    return;
  }
  var before=window._auth.role;
  loadRole().then(function(){
    if(window._auth.roleResolved){
      if(window._auth.role!==before){
        console.log('[role] retry resolved role change',before,'->',window._auth.role);
        updateAuthUI();
        buildNav();
        render();
      }
    }else{
      setTimeout(function(){ensureRoleResolved(attempt+1);}, 2000);
    }
  }).catch(function(){
    setTimeout(function(){ensureRoleResolved(attempt+1);}, 2000);
  });
}

(function(){
  try {
    function chk(){var b=document.getElementById('MSB');if(b)b.style.display=window.innerWidth<=900?'flex':'none';}
    chk();
    window.addEventListener('resize',chk);
    window.onerror=function(msg,src,line){
      console.error('Error:', msg, 'at line', line);
      return false;
    };
    authInit().then(function(authRes){
      // Phase 1C: auth is always enabled. If the SDK failed to load, show the
      // login screen with an error rather than opening the CRM unauthenticated.
      if(authRes.sdkFailed){
        showAuthScreen();
        var ae=document.getElementById('auth-err');
        if(ae){ae.textContent='Could not load sign-in. Check your connection and reload.';ae.classList.add('show');}
        return;
      }
      if(authRes.needLogin){
        // Not logged in - show login screen, wait for user to sign in
        showAuthScreen();
        return;
      }
      // Already logged in from a previous session
      return startAfterAuth();
    }).catch(function(e){
      var lerr=document.getElementById('lerr'),lm=document.getElementById('lm');
      if(lerr&&lm){lerr.style.display='block';lm.textContent='Load failed: '+e.message;}
    });
  } catch(initErr) {
    console.error('IIFE crash:', initErr);
  }
