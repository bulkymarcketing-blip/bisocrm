// Phone normalization: takes any input, returns WhatsApp format (digits only, with country code).
// Default country code is +94 (Sri Lanka) if no country code detected.
function normPhone(raw,defaultCC){
  if(!raw)return '';
  defaultCC=defaultCC||'94';
  var digits=String(raw).replace(/\D/g,'');
  if(!digits)return '';
  // Already has country code (starts with non-zero, length 10+)
  if(digits.length>=11&&digits[0]!=='0')return digits;
  // Starts with 0 - strip and prepend default CC
  if(digits[0]==='0')return defaultCC+digits.slice(1);
  // 9 digits without 0 - prepend default CC
  if(digits.length===9)return defaultCC+digits;
  return digits;
}
function fmtPhone(p){
  if(!p)return '';
  // Show as +94 77 123 4567
  var s=String(p).replace(/\D/g,'');
  if(s.length>=11&&s.slice(0,2)==='94')return '+94 '+s.slice(2,4)+' '+s.slice(4,7)+' '+s.slice(7);
  return '+'+s;
}

// Brides storage - canonical
var brides={};

// Migrate leads+customers into brides keyed by normalized phone
function migrateToBrides(leadsObj,custsObj){
  var out={};
  var byPhone={};
  // Process customers first (they often have more info)
  Object.values(custsObj||{}).forEach(function(c){
    var ph=normPhone(c.phone);
    if(!ph)ph='_nocust_'+c.id;
    var b=out[ph]||{};
    Object.assign(b,{
      id:b.id||c.id,
      name:b.name||c.name,
      phone:ph,
      email:b.email||c.email||'',
      weddingDate:b.weddingDate||c.weddingDate||'',
      venue:b.venue||c.venue||'',
      bridesmaids:b.bridesmaids||c.bridesmaids||0,
      notes:b.notes||c.notes||'',
      anniversary:b.anniversary||c.anniversary||'',
      createdAt:b.createdAt||c.createdAt||new Date().toISOString(),
      quotes:Object.assign({},c.quotes||{},b.quotes||{}),
      invoices:Object.assign({},c.invoices||{},b.invoices||{}),
      _customerId:c.id
    });
    out[ph]=b;
    byPhone[ph]=b;
  });
  // Process leads - merge into existing by phone OR add new
  Object.values(leadsObj||{}).forEach(function(l){
    var ph=normPhone(l.phone)||('_nolead_'+l.id);
    var b=out[ph];
    if(!b){
      b={
        id:l.id,
        phone:ph,
        createdAt:l.createdAt||new Date().toISOString(),
        quotes:{},invoices:{}
      };
      out[ph]=b;
    }
    // Merge lead fields - lead takes priority on stage/pipeline fields
    b.id=b.id||l.id;
    b.name=l.name||b.name;
    b.email=l.email||b.email||'';
    b.source=l.source||b.source||'whatsapp';
    b.stage=Number(l.stage||0);
    b.confirmed=!!l.confirmed;
    b.cancelled=!!l.cancelled;
    b.cancelledAt=l.cancelledAt||b.cancelledAt||'';
    b.cancelReason=l.cancelReason||b.cancelReason||'';
    b.refundAmount=l.refundAmount||b.refundAmount||0;
    b.weddingDate=l.weddingDate||b.weddingDate||'';
    b.venue=l.venue||b.venue||'';
    b.bridesmaids=l.bridesmaids||b.bridesmaids||0;
    b.notes=l.notes||b.notes||'';
    b.advance=l.advance||b.advance||0;
    b.balance=l.balance||b.balance||0;
    b.events=l.events||b.events||{};
    b.appointments=Object.assign({},b.appointments||{},l.appointments||{});
    b.quotations=Object.assign({},l.quotations||{});
    // Merge quotes/invoices from lead too
    b.quotes=Object.assign({},b.quotes||{},l.quotations||{});
    b.invoices=Object.assign({},b.invoices||{},l.invoices||{});
    b.notesLog=Object.assign({},b.notesLog||{},l.notesLog||{});
    b.documents=Object.assign({},b.documents||{},l.documents||{});
    b._history=Object.assign({},b._history||{},l._history||{});
    b.lastActivity=l.lastActivity||b.lastActivity||l.createdAt;
    b._leadId=l.id;
  });
  // Ensure defaults
  Object.values(out).forEach(function(b){
    if(!b.id)b.id='bride-'+Math.random().toString(36).slice(2,10);
    if(b.confirmed===undefined)b.confirmed=false;
    if(b.cancelled===undefined)b.cancelled=false;
    if(b.stage===undefined)b.stage=0;
    if(!b.events)b.events={};
    if(!b.quotes)b.quotes={};
    if(!b.invoices)b.invoices={};
    if(!b.appointments)b.appointments={};
    if(!b.notesLog)b.notesLog={};
    if(!b.documents)b.documents={};
  });
  return out;
}

// Project brides back into leads + custs views (for backward compat with existing UI code)
function projectViews(){
  leads={};custs={};
  Object.values(brides).forEach(function(b){
    // leads view: everything that's not just-customer (has stage or quotes that became leads)
    var lead={
      id:b.id,
      name:b.name||'',
      phone:b.phone||'',
      email:b.email||'',
      source:b.source||'whatsapp',
      stage:Number(b.stage||0),
      confirmed:!!b.confirmed,
      cancelled:!!b.cancelled,
      cancelledAt:b.cancelledAt||'',
      cancelReason:b.cancelReason||'',
      refundAmount:b.refundAmount||0,
      weddingDate:b.weddingDate||'',
      venue:b.venue||'',
      bridesmaids:b.bridesmaids||0,
      notes:b.notes||'',
      advance:b.advance||0,
      balance:b.balance||0,
      events:b.events||{},
      appointments:b.appointments||{},
      quotations:b.quotes||{},
      invoices:b.invoices||{},
      notesLog:b.notesLog||{},
      documents:b.documents||{},
      _history:b._history||{},
      createdAt:b.createdAt,
      lastActivity:b.lastActivity||b.createdAt

      email:b.email||'',
      weddingDate:b.weddingDate||'',
      venue:b.venue||'',

      anniversary:b.anniversary||'',
      createdAt:b.createdAt,
      quotes:b.quotes||{},
      invoices:b.invoices||{}
    };
    custs[b.id]=cust;
  });
}

  projectViews();
}

async function loadData(){
  document.getElementById('lerr').style.display='none';
  document.getElementById('LS').style.display='flex';
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),10000);
    var r=await fetch(FB+'/brides.json',{signal:ctrl.signal});
    clearTimeout(t);
    if(!r.ok)throw new Error('HTTP '+r.status);
    brides=(await r.json())||{};
    // If brides empty but legacy data exists, run one-time migration
    if(Object.keys(brides).length===0){
      var [legacyL,legacyC]=await Promise.all([
        fetch(FB+'/leads.json').then(function(r){return r.json();}),
        fetch(FB+'/customers.json').then(function(r){return r.json();})
      ]);
      legacyL=legacyL||{};legacyC=legacyC||{};
      if(Object.keys(legacyL).length>0||Object.keys(legacyC).length>0){
        brides=migrateToBrides(legacyL,legacyC);
        // Write all brides to Firebase
        if(Object.keys(brides).length>0){
          await fbS('/brides',brides);
          notif('Migrated '+Object.keys(brides).length+' bride'+(Object.keys(brides).length!==1?'s':'')+' from old data.');
        }
      }
    }
    projectViews();
    document.getElementById('LS').style.display='none';
    document.getElementById('APP').style.display='block';
    document.getElementById('ST').textContent='Live sync active';
    buildNav();render();
    setInterval(async function(){
      try{
        var newB=await fbG('/brides');
        brides=newB||{};
        projectViews();
        render();
      }catch(e){}
    },15000);
  }catch(e){
    document.getElementById('lerr').style.display='block';
    document.getElementById('lm').textContent=e.name==='AbortError'?'Connection timed out.':'Failed: '+e.message;
  }
}

var _cfResolve = null;
function showConfirm(opts){
  // opts: {title, msg, yesText, noText, dangerous, input, inputType, inputLabel, inputDefault, note, time, timeDefault}
  return new Promise(function(resolve){
    _cfResolve = resolve;
    document.getElementById('cf-title').textContent = opts.title || 'Confirm';
    document.getElementById('cf-msg').textContent = opts.msg || '';
    document.getElementById('cf-yes').textContent = opts.yesText || 'Confirm';
    document.getElementById('cf-no').textContent = opts.noText || 'Cancel';
    var yesBtn = document.getElementById('cf-yes');
    yesBtn.classList.remove('btn-primary','btn-danger');
    yesBtn.classList.add(opts.dangerous ? 'btn-danger' : 'btn-primary');
    var iw = document.getElementById('cf-input-wrap');
    var inpNum = document.getElementById('cf-input');
    var inpDate = document.getElementById('cf-input-date');
    var inpTime = document.getElementById('cf-input-time');
    // Reset all input visibility
    inpNum.style.display='none';
    inpDate.style.display='none';
    inpTime.style.display='none';
    if(opts.input){
      iw.style.display = '';
      document.getElementById('cf-input-label').textContent = opts.inputLabel || 'Value';
      var t = opts.inputType || 'number';
      if(t==='date'){
        inpDate.style.display='';
        inpDate.value = opts.inputDefault || '';
        if(opts.time){
          inpTime.style.display='';
          inpTime.value = opts.timeDefault || '';
        }
      } else if(t==='text'){
        inpNum.type='text';
        inpNum.style.display='';
        inpNum.value = opts.inputDefault!==undefined ? opts.inputDefault : '';
      } else {
        inpNum.type='number';
        inpNum.style.display='';
        inpNum.value = opts.inputDefault!==undefined ? opts.inputDefault : '';
      }
    } else {
      iw.style.display = 'none';
    }
    var nw = document.getElementById('cf-note-wrap');
    if(opts.note){
      nw.style.display = '';
      document.getElementById('cf-note').value = '';
    } else {
      nw.style.display = 'none';
    }
    OM('cf-modal');
  });
}

// Wedding-date-weighted SLA calculation
function slaThreshold(stage,daysToWed){
  // Base thresholds in hours: 12h, 3d=72h, 2d=48h, 7d=168h
  var base=[12,72,72,48,168];
  var hrs=base[stage]||72;
  if(daysToWed!==null){
    if(daysToWed<14)return hrs*0.1; // always urgent
    if(daysToWed<30)return hrs*0.25;
    if(daysToWed<90)return hrs*0.5;
  }
  return hrs;
}
function isLeadOverdue(l){
  var s=Number(l.stage||0);
  if(s>=5||l.confirmed)return false;
  var lastAct=new Date(l.lastActivity||l.createdAt||0).getTime();
  var hoursSince=(Date.now()-lastAct)/3600000;
  var dw=dU(l.weddingDate);
  return hoursSince>slaThreshold(s,dw);
}

// =========================================================
// Pipeline metrics for the top 6-card widget
// =========================================================
function pipelineMetrics(){
  var all = lA();
  var now = Date.now();
  var weekMs = 7*86400000;
  // 1. New inquiries this week vs last week
  var thisWeek = all.filter(function(l){
    var t = new Date(l.createdAt||0).getTime();
    return t > now - weekMs;
  }).length;
  var lastWeek = all.filter(function(l){
    var t = new Date(l.createdAt||0).getTime();
    return t > now - 2*weekMs && t <= now - weekMs;
  }).length;
  var weekDelta = lastWeek===0 ? (thisWeek>0?100:0) : Math.round(((thisWeek-lastWeek)/lastWeek)*100);
  // 2. Inquiry-to-booking conversion rate
  var leadsWithFinalOutcome = all.filter(function(l){return l.confirmed || l.cancelled || Number(l.stage||0)>=4;});
  var booked = all.filter(function(l){return l.confirmed && !l.cancelled;}).length;
  var convRate = all.length===0 ? 0 : Math.round((booked/all.length)*100);
  // 3. Average response time (hours from createdAt to first stage change/contact)
  var respTimes = [];
  all.forEach(function(l){
    if(Number(l.stage||0)>=1 && l.lastActivity && l.createdAt){
      var hrs = (new Date(l.lastActivity)-new Date(l.createdAt))/3600000;
      if(hrs>=0 && hrs<24*30) respTimes.push(hrs);
    }
  });
  var avgResp = respTimes.length===0 ? null : Math.round(respTimes.reduce(function(a,b){return a+b;},0)/respTimes.length);
  // 4. Average booking value (from invoices on confirmed brides)
  var confirmedTotals = [];
  all.filter(function(l){return l.confirmed && !l.cancelled;}).forEach(function(l){
    var inv = Object.values(l.invoices||{})[0];
    if(inv){
      var t = 0;
      Object.values(inv.items||{}).forEach(function(it){t += (it.q||1)*(it.p||0);});
      if(t>0)confirmedTotals.push(t);
    }
  });
  var avgValue = confirmedTotals.length===0 ? 0 : Math.round(confirmedTotals.reduce(function(a,b){return a+b;},0)/confirmedTotals.length);
  // 5. Pipeline value (sum of all open quotes not yet invoiced)
  var pipelineValue = 0;
  all.filter(function(l){return !l.confirmed && !l.cancelled;}).forEach(function(l){
    Object.values(l.quotations||{}).forEach(function(qt){
      if(qt.convertedToInvoice)return;
      Object.values(qt.items||{}).forEach(function(it){pipelineValue += (it.q||1)*(it.p||0);});
    });
  });
  // 6. Upcoming weddings in next 90 days
  var ninetyMs = 90*86400000;
  var upcoming = all.filter(function(l){
    if(!l.confirmed||l.cancelled||!l.weddingDate)return false;
    var t = new Date(l.weddingDate).getTime();
    return t >= now && t <= now + ninetyMs;
  }).length;
  
  return {
    thisWeek: thisWeek,
    weekDelta: weekDelta,
    convRate: convRate,
    bookedCount: booked,
    leadCount: all.length,
    avgResp: avgResp,
    avgValue: avgValue,
    pipelineValue: pipelineValue,
    upcoming90: upcoming
  };
}

function rSchedule(){
  // Collect ALL upcoming events: wedding dates, homecoming dates, going-away dates, appointments
  // Skip anniversaries entirely. Skip cancelled appointments.
  var allEvents = [];
  var now = new Date();now.setHours(0,0,0,0);
  
  // Color and label per event type
  var typeMeta = {
    'Wedding': {color:'#C8A55B', bg:'#FAF4E5', label:'Wedding'},
    'Homecoming': {color:'#1A2B4A', bg:'#E8ECF3', label:'Homecoming'},
    'Going Away': {color:'#6B4FA0', bg:'#EFE9F7', label:'Going Away'},
    'Consultation': {color:'#2563EB', bg:'#E0EBFE', label:'Consultation'},
    'Trial': {color:'#EA580C', bg:'#FFEDD5', label:'Trial'},
    'Final Trial': {color:'#DC2626', bg:'#FEE2E2', label:'Final Trial'},
    'Fabric Appointment': {color:'#0D9488', bg:'#CCFBF1', label:'Fabric'},
    'Pickup': {color:'#6B7280', bg:'#F3F4F6', label:'Pickup'},
    'Other': {color:'#6B7280', bg:'#F3F4F6', label:'Other'}
  };
  
  // First pass: collect every event from every bride
  lA().forEach(function(b){
    if(b.cancelled)return; // skip cancelled bookings
    if(q && !(b.name||'').toLowerCase().includes(q))return;
    var ev = b.events || {};
    var weddingDate = (ev.wedding && ev.wedding.date) || b.weddingDate || '';
    var homecomingDate = (ev.homecoming && ev.homecoming.enabled) ? ev.homecoming.date : '';
    var goingAwayDate = (ev.goingAway && ev.goingAway.enabled) ? ev.goingAway.date : '';
    // Wedding + Homecoming on same day for same bride -> group as one card
    // For now: each ceremony is a separate card unless same date
    if(weddingDate){
      var d = new Date(weddingDate); d.setHours(0,0,0,0);
      if(d>=now){
        allEvents.push({
          brideId: b.id, brideName: b.name||'(no name)',
          type: 'Wedding',
          date: weddingDate,
          time: (ev.wedding && ev.wedding.startTime) || '',
          venue: (ev.wedding && ev.wedding.venue) || b.venue || '',
          theme: (ev.wedding && ev.wedding.theme) || '',
          extra: {homecomingDate:homecomingDate, goingAwayDate:goingAwayDate}
        });
      }
    }
    if(homecomingDate && homecomingDate !== weddingDate){
      var d = new Date(homecomingDate); d.setHours(0,0,0,0);
      if(d>=now){
        allEvents.push({
          brideId: b.id, brideName: b.name||'(no name)',
          type: 'Homecoming', date: homecomingDate,
          time: ev.homecoming.startTime || '', venue: ev.homecoming.venue || '',
          theme: ev.homecoming.theme || ''
        });
      }
    }
    if(goingAwayDate){
      var d = new Date(goingAwayDate); d.setHours(0,0,0,0);
      if(d>=now){
        allEvents.push({
          brideId: b.id, brideName: b.name||'(no name)',
          type: 'Going Away', date: goingAwayDate,
          time: ev.goingAway.startTime || '', venue: ev.goingAway.venue || '',
          theme: ''
        });
      }
    }
    // Appointments
    Object.values(b.appointments||{}).forEach(function(a){
      if(a.cancelled || !a.date)return;
      var d = new Date(a.date); d.setHours(0,0,0,0);
      if(d>=now){
        var t = a.reason || 'Other';
        if(!typeMeta[t])t='Other';
        allEvents.push({
          brideId: b.id, brideName: b.name||'(no name)',
          type: t, date: a.date, time: a.time||'',
          venue: '', note: a.note||''
        });
      }
    });
  });
  
  // Sort all events ascending by date+time
  allEvents.sort(function(a,b){
    var da = new Date(a.date + 'T' + (a.time||'00:00'));
    var db = new Date(b.date + 'T' + (b.time||'00:00'));
    return da - db;
  });
  
  // Group into: This Week / This Month / Later
  var weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate()+7);
  var monthEnd = new Date(now); monthEnd.setMonth(monthEnd.getMonth()+1);
  var weekly = [], monthly = [], later = [];
  allEvents.forEach(function(e){
    var d = new Date(e.date); d.setHours(0,0,0,0);
    if(d < weekEnd) weekly.push(e);
    else if(d < monthEnd) monthly.push(e);
    else later.push(e);
  });
  
  function eventCard(e){
    var meta = typeMeta[e.type] || typeMeta['Other'];
    var d = new Date(e.date);
    var daysAway = Math.ceil((d - now) / 86400000);
    var dateLabel = d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
    var dayBadge = daysAway===0?'Today': daysAway===1?'Tomorrow': daysAway<7?'in '+daysAway+'d' : '';
    var timeLabel = e.time ? ' · '+e.time : '';
    var venueLabel = e.venue ? '<div style="font-size:11px;color:var(--muted);margin-top:2px">📍 '+e.venue+'</div>' : '';
    var themeLabel = e.theme ? '<span style="display:inline-block;background:rgba(0,0,0,0.06);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;color:var(--text2);margin-left:6px">'+e.theme+'</span>' : '';
    var extraLabel = '';
    if(e.extra){
      var extras = [];
      if(e.extra.homecomingDate && e.extra.homecomingDate!==e.date){
        var hd = new Date(e.extra.homecomingDate);
        extras.push('Homecoming '+hd.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}));
      }
      if(e.extra.goingAwayDate){
        var gd = new Date(e.extra.goingAwayDate);
        extras.push('Going Away '+gd.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}));
      }
      if(extras.length) extraLabel = '<div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic">+ '+extras.join(' · ')+'</div>';
    }
    return '<div onclick="openDetail(\'' + e.brideId + '\')" style="background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:transform .1s">'
      +'<div style="width:8px;align-self:stretch;background:'+meta.color+';border-radius:4px;flex-shrink:0"></div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px"><span style="display:inline-block;background:'+meta.bg+';color:'+meta.color+';padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase">'+meta.label+'</span>'+(dayBadge?'<span style="font-size:10px;color:var(--gold);font-weight:700">'+dayBadge+'</span>':'')+themeLabel+'</div>'
      +'<div style="font-weight:700;color:var(--navy);font-size:15px;margin-bottom:2px">'+e.brideName+'</div>'
      +'<div style="font-size:12px;color:var(--text2)">'+dateLabel+timeLabel+'</div>'
      +venueLabel
      +extraLabel
      +(e.note?'<div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic">'+e.note+'</div>':'')
      +'</div>'
      +'</div>';
  }
  
  function section(title, list, sub){
    if(!list.length) return '';
    var subtxt = sub ? '<span style="font-size:11px;color:var(--muted);font-weight:500;margin-left:8px;letter-spacing:0;text-transform:none">'+sub+'</span>' : '';
    return '<div style="margin-bottom:24px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--border)"><div style="font-family:Cinzel,serif;font-size:14px;letter-spacing:1.5px;color:var(--navy);font-weight:600;text-transform:uppercase">'+title+'</div>'+subtxt+'<div style="margin-left:auto;font-size:11px;color:var(--muted);font-weight:600">'+list.length+'</div></div>'+list.map(eventCard).join('')+'</div>';
  }
  
  var body = '';
  if(allEvents.length===0){
    body = '<div class="empty" style="padding:60px"><div class="et">No upcoming events</div><div style="font-size:12px;color:var(--muted);margin-top:6px">Wedding dates, consultations, trials and pickups will appear here</div></div>';
  } else {
    body = section('This Week', weekly, 'next 7 days') 
         + section('This Month', monthly, 'next 30 days')
         + section('Later', later, '');
  }
  
  // Legend (color reference)
  var legendItems = [
    ['Wedding','#C8A55B'], ['Homecoming','#1A2B4A'], ['Going Away','#6B4FA0'],
    ['Consultation','#2563EB'], ['Trial','#EA580C'], ['Final Trial','#DC2626'],
    ['Fabric','#0D9488'], ['Pickup','#6B7280']
  ];
  var legend = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;padding:10px 12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)">';
  legendItems.forEach(function(li){
    legend += '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);font-weight:600"><span style="width:8px;height:8px;background:'+li[1]+';border-radius:50%"></span>'+li[0]+'</div>';
  });
  legend += '</div>';
  
  document.getElementById('MC').innerHTML = legend + body;
}

function openQDoc(src,sId,qId){
  var obj=src==='lead'?leads[sId]:custs[sId];if(!obj)return;
  var qt=src==='lead'?(obj.quotations||{})[qId]:(obj.quotes||{})[qId];if(!qt)return;
  var tot=qTot(qt.items);var items=Object.values(qt.items||{});
  document.getElementById('doc-t').textContent=qt.id;
  var ih='';
  items.forEach(function(it,i){
    var line=cLine(it);var bb=i<items.length-1?'border-bottom:1px solid var(--border);':'';
    ih+='<div class="ir" style="'+bb+'"><div><div class="in">'+it.desc+'</div><div class="im">'+it.qty+' x '+Number(it.unit).toLocaleString()+'</div></div><div class="ia">LKR '+Number(line).toLocaleString()+'.00</div></div>';

async function markSent(src,sId,qId){
  var path=src==='lead'?'/leads/'+sId+'/quotations/'+qId:'/customers/'+sId+'/quotes/'+qId;
  try{
    await fbP(path,{sent:true});
    if(src==='lead'&&leads[sId]&&(leads[sId].quotations||{})[qId])leads[sId].quotations[qId].sent=true;
    if(src==='cust'&&custs[sId]&&(custs[sId].quotes||{})[qId])custs[sId].quotes[qId].sent=true;
    // Advance stage to Quoted (4) when quote is marked as sent
    if(src==='lead'&&leads[sId]&&Number(leads[sId].stage||0)<4){
      await fbP('/leads/'+sId,{stage:4,lastActivity:new Date().toISOString()});
      leads[sId].stage=4;
      if(brides[sId])brides[sId].stage=4;
      try{await logHistory(sId,'stage-change',{to:4,reason:'quote-sent'});}catch(e){}
    }
    notif('Marked as sent. Lead moved to Quoted.');CM('doc-modal');render();
  }catch(e){notif('Error: '+e.message);}
}

async function addPay(src,sId,iId){
  var amt=parseFloat((document.getElementById('pay-amt')||{}).value)||0;
  if(amt<=0){notif('Enter a valid amount.');return;}
  var date=(document.getElementById('pay-date')||{}).value||new Date().toISOString().slice(0,10);
  var method=(document.getElementById('pay-method')||{}).value||'';
  var note=(document.getElementById('pay-note')||{}).value||'';
  var pid='p-'+uid();

  var path=src==='lead'?'/leads/'+sId+'/invoices/'+iId+'/payments':'/customers/'+sId+'/invoices/'+iId+'/payments';
  try{
    await fbP(path,{[pid]:pay});
    var obj=src==='lead'?leads[sId]:custs[sId];
    if(obj&&obj.invoices&&obj.invoices[iId]){
      obj.invoices[iId].payments=obj.invoices[iId].payments||{};

async function convInv(src,sId,qId){
  var obj=src==='lead'?leads[sId]:custs[sId];if(!obj)return;
  var qt=src==='lead'?(obj.quotations||{})[qId]:(obj.quotes||{})[qId];if(!qt)return;

  var items=Object.assign({},qt.items);var tot=qTot(items);

    if(src==='lead'){
      var patch={};
      patch['quotations/'+qId+'/convertedToInvoice']=true;
      patch['invoices/'+inv.id]=inv;
      patch['advance']=bp;patch['balance']=tot-bp;patch['confirmed']=true;patch['stage']=5;
      await fbP('/leads/'+sId,patch);
      if(!leads[sId])leads[sId]={};
      leads[sId].confirmed=true;leads[sId].stage=5;leads[sId].advance=bp;leads[sId].balance=tot-bp;
      if(leads[sId].quotations&&leads[sId].quotations[qId])leads[sId].quotations[qId].convertedToInvoice=true;
      leads[sId].invoices=leads[sId].invoices||{};leads[sId].invoices[inv.id]=inv;
    }else{
      var cp={};cp['quotes/'+qId+'/convertedToInvoice']=true;cp['invoices/'+inv.id]=inv;
      await fbP('/customers/'+sId,cp);
      if(custs[sId]&&custs[sId].quotes&&custs[sId].quotes[qId])custs[sId].quotes[qId].convertedToInvoice=true;
      custs[sId].invoices=custs[sId].invoices||{};custs[sId].invoices[inv.id]=inv;
      // Also find and update the linked lead (created during saveQB for walk-in/customer-source quotes)
      var linkedLead=lA().find(function(l){return l.phone&&custs[sId]&&l.phone===custs[sId].phone;});
      if(linkedLead){
        var lp={};
        if(linkedLead.quotations&&linkedLead.quotations[qId])lp['quotations/'+qId+'/convertedToInvoice']=true;
        lp['invoices/'+inv.id]=inv;
        lp['advance']=bp;lp['balance']=tot-bp;lp['confirmed']=true;lp['stage']=5;
        await fbP('/leads/'+linkedLead.id,lp);
        linkedLead.confirmed=true;linkedLead.stage=5;linkedLead.advance=bp;linkedLead.balance=tot-bp;
        if(linkedLead.quotations&&linkedLead.quotations[qId])linkedLead.quotations[qId].convertedToInvoice=true;
        linkedLead.invoices=linkedLead.invoices||{};linkedLead.invoices[inv.id]=inv;
      }
    }
    var wDate=src==='lead'?(leads[sId]?leads[sId].weddingDate||'':''):(custs[sId]?custs[sId].weddingDate||'':'');
    var exC=cA().find(function(c){return c.phone&&c.phone===obj.phone;});
    if(exC){
      var cp2={};cp2['invoices/'+inv.id]=inv;if(wDate)cp2['anniversary']=wDate;
      await fbP('/customers/'+exC.id,cp2);
      exC.invoices=exC.invoices||{};exC.invoices[inv.id]=inv;if(wDate)exC.anniversary=wDate;
    }else if(src==='lead'){

      nc.quotes[qId]=qObj;nc.invoices[inv.id]=inv;
      await fbS('/customers/'+cid,nc);custs[cid]=nc;

function buildPDF(type,l,doc){

  var s=gSet();
  var logo=s.logoUrl?'<img src="'+s.logoUrl+'" style="height:56px;object-fit:contain" alt="Biso"/>'
    :'<div style="font-weight:700;font-size:15px;color:#1B2B4B;letter-spacing:2px">BISO</div>';
  var ir='';
  items.forEach(function(it,i){
    var line=cLine(it);var isD=it.auto||line<0;
    var rv=isD?'—':Number(it.unit).toLocaleString()+'.00';

async function saveQB(){
  var n=document.getElementById('qb-n');if(n)QB.notes=n.value;
  if(!QB.cid&&!QB.lid){notif('Please select a customer.');return;}
  if(!QB.items.length){notif('Add at least one service.');return;}
  var items={};QB.items.forEach(function(it){var k=it.key||uid();items[k]=Object.assign({},it,{key:k});});
  var qt={id:qNum(),date:new Date().toISOString().slice(0,10),expiry:expD(),items:items,notes:QB.notes,convertedToInvoice:false,sent:false};
  try{
    if(QB.cid){await fbP('/customers/'+QB.cid+'/quotes',{[qt.id]:qt});if(!custs[QB.cid])custs[QB.cid]={};custs[QB.cid].quotes=custs[QB.cid].quotes||{};custs[QB.cid].quotes[qt.id]=qt;}
    if(QB.lid){
      await fbP('/leads/'+QB.lid+'/quotations',{[qt.id]:qt});
      leads[QB.lid].quotations=leads[QB.lid].quotations||{};leads[QB.lid].quotations[qt.id]=qt;
      if((leads[QB.lid].stage||0)<3){await fbP('/leads/'+QB.lid,{stage:3});leads[QB.lid].stage=3;}
    }else if(QB.cid){
      var cc=custs[QB.cid];
      if(!cc){notif('Warning: customer not found.');}
      else{
        var ex=lA().find(function(l){return l.phone&&l.phone===cc.phone&&!l.confirmed;});
        if(ex){
          await fbP('/leads/'+ex.id+'/quotations',{[qt.id]:qt});
          ex.quotations=ex.quotations||{};ex.quotations[qt.id]=qt;
          if((ex.stage||0)<3){await fbP('/leads/'+ex.id,{stage:3});ex.stage=3;}
        }else{
          var nid=uid();
          var nl={id:nid,name:cc.name,phone:cc.phone||'',email:cc.email||'',source:'walk-in',stage:3,weddingDate:cc.weddingDate||'',package:'Custom',notes:'Auto from quote '+qt.id,bridesmaids:cc.bridesmaids||0,createdAt:new Date().toISOString(),confirmed:false,advance:0,balance:0,venue:cc.venue||'',appointments:{},quotations:{}};
          nl.quotations[qt.id]=qt;
          try{
            await fbS('/leads/'+nid,nl);
            leads[nid]=nl;
            notif('Lead auto-created for '+cc.name);
          }catch(err){notif('Lead creation failed: '+err.message);}
        }
      }
    }
    CM('quot-modal');notif('Quotation saved!');if(QB.lid)openDetail(QB.lid);render();
  }catch(e){notif('Error: '+e.message);}
}

function openDetail(id){
  var l=leads[id];if(!l)return;
  var cancelled=!!l.cancelled;
  // Header
  document.getElementById('dm-n').textContent=l.name+(cancelled?' (Cancelled)':'');
  var d=dU(l.weddingDate);
  var subText='';
  if(cancelled){subText='Booking cancelled · '+(l.cancelReason||'No reason given');}
  else if(l.confirmed){subText='Wedding '+fmt(l.weddingDate)+(d!==null?' · '+d+' days away':'');}
  else{var nxt=nextActionLabel(l);subText=nxt;}
  document.getElementById('dm-s').textContent=subText;
  // Compute totals
  var tot=(l.advance||0)+(l.balance||0);
  var pct=tot>0?Math.round(((l.advance||0)/tot)*100):0;
  var quots=Object.values(l.quotations||{});
  var invs=Object.values(l.invoices||{});
  var appts=Object.values(l.appointments||{});
  var notes=Object.values(l.notesLog||{});
  var docs=Object.values(l.documents||{});
  var events=l.events||{wedding:{enabled:true}};
  // Tabs
  // Tab visibility rules:
  // Appointments tab: stage >= 2 (Consultation Booked) OR any appointment exists OR confirmed
  // Payment tab: any quotation/invoice exists OR confirmed
  var showAppt = l.confirmed || Number(l.stage||0) >= 2 || appts.length > 0;
  var showPay = l.confirmed || quots.length > 0 || invs.length > 0;
  var cTabs = '';
  if(showPay) cTabs += '<div class="tab" onclick="stab(this,\'tb-pay\')">Payment</div>';
  if(showAppt) cTabs += '<div class="tab" onclick="stab(this,\'tb-appt\')">Appts</div>';
  // ===== Overview Tab =====
  var ovTab=buildOverviewTab(id,l,cancelled);
  // ===== Payment Tab =====
  var payTab=showPay?buildPaymentTab(id,l,cancelled,quots,invs):'';
  // ===== Appointments Tab =====
  var apptTab=showAppt?buildApptTab(id,l,cancelled,appts):'';
  // ===== Notes Tab =====
  var notesTab=buildNotesTab(id,l,cancelled,notes);
  // ===== Documents Tab =====
  var docsTab=buildDocsTab(id,l,cancelled,docs);
  // Stage CTA (context-sensitive)
  var stageCta=cancelled?'':buildStageCta(id,l);
  document.getElementById('dm-b').innerHTML=
    '<div class="tabs"><div class="tab active" onclick="stab(this,\'tb-ov\')">Overview</div>'+cTabs+'<div class="tab" onclick="stab(this,\'tb-notes\')">Notes</div><div class="tab" onclick="stab(this,\'tb-docs\')">Documents</div></div>'
    +ovTab+payTab+apptTab+notesTab+docsTab;
  // Footer: back button left, delete/cancel + close + stage CTA right
  var leftBtn='<button class="btn btn-ghost btn-sm" onclick="CM(\'detail-modal\')">‹ Back</button>';
  var rightBtns='';
  if(!cancelled){
    if(l.confirmed)rightBtns+='<button class="btn btn-danger btn-sm" onclick="openCancelBooking(\''+id+'\')">Cancel Booking</button>';
    else rightBtns+='<button class="btn btn-danger btn-sm" onclick="delLead(\''+id+'\')">Delete</button>';
  }
  rightBtns+='<button class="btn btn-ghost" onclick="CM(\'detail-modal\')">Close</button>';
  if(stageCta)rightBtns+=stageCta;
  document.getElementById('dm-f').innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;width:100%;gap:8px;flex-wrap:wrap"><div>'+leftBtn+'</div><div style="display:flex;gap:8px;flex-wrap:wrap">'+rightBtns+'</div></div>';
  OM('detail-modal');
}

// ---------- Helpers ----------
function nextActionLabel(l){

  return labels[s]||'';

function evTrue(e){return e&&e.enabled;}
function buildOverviewTab(id,l,cancelled){

  var ev=l.events||{};

  // Source dropdown
  var SRCS=getSources();
  var srcOpts='';SRCS.forEach(function(s){srcOpts+='<option value="'+s.value+'"'+(l.source===s.value?' selected':'')+'>'+s.label+'</option>';});
  // Event checkboxes
  var evHtml='';
  ['wedding','homecoming','goingAway'].forEach(function(k){
    var lbl=k==='wedding'?'Wedding':k==='homecoming'?'Homecoming':'Going Away';
    var e=ev[k]||{};
    var checked=evTrue(e)?'checked':'';
    if(k==='wedding'&&l.confirmed)checked='checked'; // wedding always on if confirmed
    evHtml+='<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:10px">';
    evHtml+='<label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--navy);text-transform:none;letter-spacing:0"><input type="checkbox" '+checked+dis+' onchange="toggleEvent(\''+id+'\',\''+k+'\',this.checked)" style="width:18px;height:18px;cursor:pointer"/> '+lbl+'</label>';
    if(checked){
      evHtml+='<div class="fg" style="margin-top:10px">';
      evHtml+='<div class="fi"><label>Date</label><input type="date"'+dis+' value="'+(e.date||(k==='wedding'?l.weddingDate||'':''))+'" onchange="updEvent(\''+id+'\',\''+k+'\',\'date\',this.value)"/></div>';
      evHtml+='<div class="fi"><label>Venue</label><input type="text"'+dis+' value="'+(e.venue||'')+'" placeholder="Venue name" onchange="updEvent(\''+id+'\',\''+k+'\',\'venue\',this.value)"/></div>';
      evHtml+='<div class="fi"><label>Start Time</label><input type="time"'+dis+' value="'+(e.startTime||'')+'" onchange="updEvent(\''+id+'\',\''+k+'\',\'startTime\',this.value)"/></div>';
      evHtml+='<div class="fi"><label>End Time</label><input type="time"'+dis+' value="'+(e.endTime||'')+'" onchange="updEvent(\''+id+'\',\''+k+'\',\'endTime\',this.value)"/></div>';
      if(k==='wedding'||k==='homecoming'){
        evHtml+='<div class="fi"><label>Bridesmaids</label><input type="number" min="0"'+dis+' value="'+(e.bridesmaids||0)+'" onchange="updEvent(\''+id+'\',\''+k+'\',\'bridesmaids\',parseInt(this.value)||0)"/></div>';
        evHtml+='<div class="fi"><label>Flower Girls</label><input type="number" min="0"'+dis+' value="'+(e.flowerGirls||0)+'" onchange="updEvent(\''+id+'\',\''+k+'\',\'flowerGirls\',parseInt(this.value)||0)"/></div>';
        evHtml+='<div class="fi s2"><label>Little Maids</label><input type="number" min="0"'+dis+' value="'+(e.littleMaids||0)+'" onchange="updEvent(\''+id+'\',\''+k+'\',\'littleMaids\',parseInt(this.value)||0)"/></div>';
      }
      evHtml+='</div>';
    }
    evHtml+='</div>';
  });
  var editBtn = cancelled ? '' : '<div style="margin-bottom:14px"><button class="btn btn-primary btn-sm" onclick="openOverviewForm(\''+id+'\')" style="width:100%">✎ Edit in Overview Form</button></div>';
  return '<div id="tb-ov">'+lockNote+editBtn
    +'<div class="stitle">Bride Info</div>'
    +'<div class="fg">'
    +'<div class="fi"><label>Full Name</label><input type="text"'+dis+' value="'+(l.name||'')+'" onchange="updL(\''+id+'\',{name:this.value})"/></div>'
    +'<div class="fi"><label>WhatsApp Number</label><input type="text"'+dis+' value="'+(l.phone||'')+'" placeholder="+94 77 000 0000" onchange="updL(\''+id+'\',{phone:this.value})"/></div>'
    +'<div class="fi"><label>Email</label><input type="email"'+dis+' value="'+(l.email||'')+'" onchange="updL(\''+id+'\',{email:this.value})"/></div>'
    +'<div class="fi"><label>Source</label><select'+dis+' onchange="updL(\''+id+'\',{source:this.value})">'+srcOpts+'</select></div>'
    +'</div>'
    +'<div class="stitle" style="margin-top:18px">Events</div>'
    +evHtml
    +'</div>';
}

function buildPaymentTab(id,l,cancelled,quots,invs){
  // Attention cards
  var attention='';
  // Find final trial appointment
  var appts=Object.values(l.appointments||{}).filter(function(a){return !a.cancelled;});
  var ft=appts.find(function(a){return a.reason==='Final Trial';});
  var balance=l.balance||0;
  var dToWed=dU(l.weddingDate);
  // Final payment red card: 14 days before wedding date OR if balance > 0 and ft is scheduled within 14 days
  if(!cancelled&&balance>0&&dToWed!==null&&dToWed<=14){
    var bg='#FEF2F2',bd='#FECACA',col='var(--danger)',label='URGENT';
    if(dToWed<=7){bg='#FEF2F2';bd='#FCA5A5';col='var(--danger)';label='OVERDUE - PAY NOW';}
    else if(dToWed<=14){bg='#FFF7ED';bd='#FED7AA';col='#C2410C';label='DUE SOON';}
    attention+='<div style="background:'+bg+';border:1.5px solid '+bd+';border-radius:10px;padding:14px;margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:'+col+';letter-spacing:1px;margin-bottom:4px">'+label+'</div><div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:3px">Final payment due</div><div style="font-size:13px;color:var(--text2)">Balance of '+fR(balance)+' is due on or before the final trial date. Wedding is '+dToWed+' days away.</div></div>';
  } else if(!cancelled&&balance>0&&ft&&ft.date){
    var dToFt=dU(ft.date);
    if(dToFt!==null&&dToFt<=14){
      attention+='<div style="background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:10px;padding:14px;margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#C2410C;letter-spacing:1px;margin-bottom:4px">FINAL TRIAL IN '+dToFt+' DAYS</div><div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:3px">Collect final payment</div><div style="font-size:13px;color:var(--text2)">Balance '+fR(balance)+' is due on or before '+fmt(ft.date)+'.</div></div>';
    }
  }
  // Payment summary
  var tot=(l.advance||0)+(l.balance||0);
  var pct=tot>0?Math.round(((l.advance||0)/tot)*100):0;
  var summary='<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase">Total</div><div style="font-size:18px;font-weight:700;color:var(--navy)">'+fR(tot)+'</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase">Balance</div><div style="font-size:18px;font-weight:700;color:'+((l.balance||0)>0?'var(--warn)':'var(--success)')+'">'+fR(l.balance||0)+'</div></div></div><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:var(--muted)">Paid '+pct+'%</span><span style="color:var(--success);font-weight:600">'+fR(l.advance||0)+' collected</span></div><div class="pb"><div class="pf" style="width:'+pct+'%"></div></div></div>';
  // Quotation & Invoice section (moved here from Documents)
  var qiHtml='<div class="stitle">Quotation & Invoice</div>';
  var qRows='';
  quots.forEach(function(qt){
    var badge=qt.convertedToInvoice?'<span class="badge bi">Invoiced</span>':'<span class="badge bo">Open</span>';
    qRows+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px" onclick="openQDoc(\'lead\',\''+id+'\',\''+qt.id+'\')"><div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+qt.id+'</div><div style="font-size:11px;color:var(--muted)">'+fmt(qt.date)+' · '+fR(qTot(qt.items))+'</div></div><div>'+badge+'</div></div>';
  });
  if(!qRows)qRows='<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:10px">No quotations</div>';
  qiHtml+=qRows;
  var iRows='';
  invs.forEach(function(inv){
    var t=qTot(inv.items);
    var pSum=(inv.advance||0)+Object.values(inv.payments||{}).reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);
    var b=t-pSum;
    var st=b<=0?'PAID':pSum>0?'PARTIAL':'UNPAID';
    var stc=b<=0?'var(--success)':pSum>0?'var(--warn)':'var(--danger)';
    iRows+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px" onclick="openIDoc(\'lead\',\''+id+'\',\''+inv.id+'\')"><div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+inv.id+'</div><div style="font-size:11px;color:var(--muted)">'+fmt(inv.date)+' · '+fR(t)+' · Bal '+fR(Math.max(0,b))+'</div></div><div><span class="badge" style="background:'+stc+'22;color:'+stc+'">'+st+'</span></div></div>';
  });
  if(!iRows)iRows='<div style="font-size:12px;color:var(--muted);font-style:italic">No invoices</div>';
  qiHtml+=iRows;
  // Quick action: add payment opens the first invoice
  var qa='';
  if(invs.length>0&&!cancelled){
    qa='<button class="btn btn-primary btn-sm" style="margin-bottom:14px;width:100%" onclick="openAddPay(\'lead\',\''+id+'\',\''+invs[0].id+'\')">+ Add Payment</button>';
  }
  return '<div id="tb-pay" style="display:none">'+attention+summary+qa+qiHtml+'</div>';
}

function buildApptTab(id,l,cancelled,appts){
  // Sort: scheduled first by date asc, then cancelled by cancelledAt desc
  var scheduled=appts.filter(function(a){return !a.cancelled;}).sort(function(a,b){return new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00'));});
  var cancelledA=appts.filter(function(a){return a.cancelled;}).sort(function(a,b){return new Date(b.cancelledAt||0)-new Date(a.cancelledAt||0);});
  var schHtml='';
  scheduled.forEach(function(a){
    var dToA=dU(a.date);var dCol=dToA!==null&&dToA<=3?'var(--danger)':dToA!==null&&dToA<=7?'var(--warn)':'var(--text2)';
    schHtml+='<div style="background:var(--surf);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--navy)">'+(a.reason||'Appointment')+'</div>'
      +'<div style="font-size:12px;color:'+dCol+';margin-top:2px">'+fmt(a.date)+(a.time?' at '+a.time:'')+(dToA!==null?' · in '+dToA+'d':'')+'</div>'
      +(a.note?'<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic">'+a.note+'</div>':'')
      +'</div>'
      +(cancelled?'':'<button class="btn btn-ghost btn-xs" onclick="cancelAppt(\''+id+'\',\''+a.key+'\')">Cancel</button>')
      +'</div></div>';
  });
  if(!schHtml)schHtml='<div style="font-size:12px;color:var(--muted);font-style:italic;padding:8px">No upcoming appointments</div>';
  var canHtml='';
  cancelledA.forEach(function(a){
    canHtml+='<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;opacity:.7">'
      +'<div style="font-size:13px;font-weight:600;color:var(--muted);text-decoration:line-through">'+(a.reason||'Appointment')+' · '+fmt(a.date)+(a.time?' at '+a.time:'')+'</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:2px">Cancelled '+(a.cancelledAt?fmt(a.cancelledAt):'')+(a.cancelReason?' · '+a.cancelReason:'')+'</div>'
      +'</div>';
  });
  // Add appointment form
  var addForm='';
  if(!cancelled){
    addForm='<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">'
      +'<div style="font-size:12px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Schedule Appointment</div>'
      +'<div class="fg">'
      +'<div class="fi"><label>Date</label><input type="date" id="ap-d-'+id+'"/></div>'
      +'<div class="fi"><label>Time</label><input type="time" id="ap-t-'+id+'"/></div>'
      +'<div class="fi s2"><label>Reason</label><select id="ap-r-'+id+'"><option value="">— Select reason —</option><option>Consultation</option><option>Trial</option><option>Final Trial</option><option>Fabric Appointment</option><option>Pickup</option><option>Other</option></select></div>'
      +'<div class="fi s2"><label>Note (optional)</label><input type="text" id="ap-n-'+id+'" placeholder="Comments"/></div>'
      +'</div>'
      +'<button class="btn btn-primary btn-sm" style="margin-top:10px;width:100%" onclick="addAppt2(\''+id+'\')">+ Add Appointment</button>'
      +'</div>';
  }
  return '<div id="tb-appt" style="display:none">'+addForm
    +'<div class="stitle">Upcoming</div>'+schHtml
    +(canHtml?'<div class="stitle" style="margin-top:14px">Cancelled (record kept)</div>'+canHtml:'')
    +'</div>';
}

function buildNotesTab(id,l,cancelled,notes){
  notes.sort(function(a,b){return new Date(b.createdAt||0)-new Date(a.createdAt||0);});
  var nHtml='';
  notes.forEach(function(n){
    nHtml+='<div style="background:var(--surf);border:1.5px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px" id="note-'+n.id+'">'
      +'<div id="nv-'+n.id+'">'
      +'<div style="font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.5">'+(n.body||'').replace(/</g,'&lt;')+'</div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">'
      +'<div style="font-size:10px;color:var(--muted)">'+(n.createdAt?fmt(n.createdAt):'')+(n.editedAt?' · edited '+fmt(n.editedAt):'')+'</div>'
      +(cancelled?'':'<div style="display:flex;gap:6px"><button class="btn btn-ghost btn-xs" onclick="editNote(\''+id+'\',\''+n.id+'\')">Edit</button><button class="btn btn-ghost btn-xs" style="color:var(--danger)" onclick="delNote(\''+id+'\',\''+n.id+'\')">Delete</button></div>')
      +'</div>'
      +'</div>'
      +'<div id="ne-'+n.id+'" style="display:none">'
      +'<textarea id="ne-t-'+n.id+'" style="min-height:80px">'+(n.body||'').replace(/</g,'&lt;')+'</textarea>'
      +'<div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px"><button class="btn btn-ghost btn-xs" onclick="cancelEditNote(\''+n.id+'\')">Cancel</button><button class="btn btn-primary btn-xs" onclick="saveNote(\''+id+'\',\''+n.id+'\')">Save</button></div>'
      +'</div>'
      +'</div>';
  });
  if(!nHtml)nHtml='<div style="font-size:12px;color:var(--muted);font-style:italic;padding:8px">No notes yet</div>';
  var addBox=cancelled?'':'<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:14px">'
    +'<textarea id="newNote-'+id+'" placeholder="Add a note..." style="min-height:60px"></textarea>'
    +'<div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px"><button class="btn btn-ghost btn-xs" onclick="document.getElementById(\'newNote-'+id+'\').value=\'\'">Clear</button><button class="btn btn-primary btn-xs" onclick="addNote(\''+id+'\')">+ Add Note</button></div>'
    +'</div>';
  return '<div id="tb-notes" style="display:none">'+addBox+nHtml+'</div>';

function buildDocsTab(id,l,cancelled,docs){
  docs.sort(function(a,b){return new Date(b.uploadedAt||0)-new Date(a.uploadedAt||0);});
  var dh='';
  docs.forEach(function(doc){
    var icon=doc.type==='application/pdf'?'PDF':doc.type&&doc.type.indexOf('image')>-1?'IMG':'FILE';
    dh+='<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surf);border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px">'
      +'<div style="width:36px;height:36px;background:var(--navy);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">'+icon+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+doc.name+'</div><div style="font-size:11px;color:var(--muted)">'+(doc.uploadedAt?fmt(doc.uploadedAt):'')+' · '+Math.round((doc.size||0)/1024)+' KB'+(doc.category?' · '+doc.category:'')+'</div></div>'
      +'<button class="btn btn-ghost btn-xs" onclick="viewDoc(\''+id+'\',\''+doc.id+'\')">View</button>'
      +(cancelled?'':'<button class="btn btn-ghost btn-xs" style="color:var(--danger)" onclick="delDoc(\''+id+'\',\''+doc.id+'\')">Delete</button>')
      +'</div>';
  });
  if(!dh)dh='<div style="font-size:12px;color:var(--muted);font-style:italic;padding:8px">No documents uploaded</div>';
  var upBox=cancelled?'':'<div style="background:var(--bg);border:1.5px dashed var(--border);border-radius:10px;padding:14px;margin-bottom:14px;text-align:center">'
    +'<input type="file" id="docFile-'+id+'" accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png" style="display:none" onchange="handleDocUpload(\''+id+'\',this)"/>'
    +'<button class="btn btn-primary btn-sm" onclick="document.getElementById(\'docFile-'+id+'\').click()">Choose File</button>'
    +'<div style="font-size:11px;color:var(--muted);margin-top:8px">PDF, JPG, PNG · Max 2 MB</div>'
    +'</div>';
  return '<div id="tb-docs" style="display:none">'+upBox+dh+'</div>';
}

function buildStageCta(id,l){
  var s=Number(l.stage||0);
  if(l.confirmed)return '';
  if(s===0){
    var ph=(l.phone||'').replace(/[^0-9]/g,'');
    var btns='';
    if(ph)btns+='<button class="btn btn-gold btn-sm" onclick="window.open(\'https://wa.me/'+ph+'\',\'_blank\');advStage(\''+id+'\',1)">WhatsApp</button>';
    if(ph)btns+='<button class="btn btn-outline btn-sm" onclick="window.open(\'tel:+'+ph+'\');advStage(\''+id+'\',1)">Call</button>';
    if(l.email)btns+='<button class="btn btn-outline btn-sm" onclick="window.open(\'mailto:'+l.email+'\');advStage(\''+id+'\',1)">Email</button>';
    return btns||'<button class="btn btn-primary btn-sm" onclick="advStage(\''+id+'\',1)">Mark Contacted</button>';
  }
  if(s===1)return '<button class="btn btn-primary btn-sm" onclick="advStage(\''+id+'\',2)">Book Consultation</button>';
  if(s===2)return '<button class="btn btn-primary btn-sm" onclick="advStage(\''+id+'\',3)">Mark Consultation Done</button>';
  if(s===3)return '<button class="btn btn-primary btn-sm" onclick="CM(\'detail-modal\');openQM(\''+id+'\',null)">Create Quotation</button>';
  if(s===4){
    var q=Object.values(l.quotations||{}).find(function(qt){return !qt.convertedToInvoice;});

async function handleDocUpload(id,inp){
  var f=inp.files[0];if(!f)return;
  if(f.size>2*1024*1024){notif('File too large. Max 2 MB.');inp.value='';return;}
  var allowed=['application/pdf','image/jpeg','image/png','image/jpg'];
  if(allowed.indexOf(f.type)===-1){notif('Only PDF, JPG, PNG allowed.');inp.value='';return;}
  var r=await showConfirm({title:'Tag this document',msg:'Choose a category (or leave blank).',yesText:'Upload',input:true,inputLabel:'Category (e.g. Contract, Receipt)',inputDefault:''});
  if(!r.ok){inp.value='';return;}
  var reader=new FileReader();
  reader.onload=async function(e){
    var docId='d-'+uid();
    var doc={id:docId,name:f.name,type:f.type,size:f.size,data:e.target.result,uploadedAt:new Date().toISOString(),category:r.value||''};
    try{
      var p={};p[docId]=doc;
      await fbP('/leads/'+id+'/documents',p);
      leads[id].documents=leads[id].documents||{};leads[id].documents[docId]=doc;
      await logHistory(id,'doc-upload',{name:f.name});
      notif('Document uploaded.');
      inp.value='';
      openDetail(id);
    }catch(err){notif('Upload failed: '+err.message);}
  };
  reader.readAsDataURL(f);
}
function viewDoc(id,docId){
  var doc=leads[id].documents[docId];if(!doc)return;
  var w=window.open();
  if(doc.type==='application/pdf'){
    w.document.write('<iframe src="'+doc.data+'" style="width:100%;height:100vh;border:0"></iframe>');
  } else {
    w.document.write('<img src="'+doc.data+'" style="max-width:100%;height:auto"/>');
  }
}

async function openCancelBooking(id){
  var l=leads[id];if(!l)return;
  var r=await showConfirm({
    title:'Cancel booking',
    msg:'This will mark '+l.name+'\'s booking as cancelled. The record will be kept (locked, read-only) under Confirmed. Enter refund amount if any.',
    yesText:'Cancel booking',
    dangerous:true,
    input:true,
    inputLabel:'Refund amount (Rs)',
    inputDefault:'0',
    note:true
  });
  if(!r.ok)return;
  var refund=parseFloat(r.value)||0;
  var reason=r.note||'';
  var now=new Date().toISOString();
  try{
    var patch={cancelled:true,cancelledAt:now,cancelReason:reason,refundAmount:refund};
    // If refund > 0, log as negative payment on first invoice
    var firstInv=Object.values(l.invoices||{})[0];
    if(refund>0&&firstInv){
      var pid='p-'+uid();
      var pay={id:pid,amount:-refund,date:now.slice(0,10),method:'Refund',note:'Cancellation refund: '+reason,createdAt:now};
      var pp={};pp[pid]=pay;
      await fbP('/leads/'+id+'/invoices/'+firstInv.id+'/payments',pp);
      l.invoices[firstInv.id].payments=l.invoices[firstInv.id].payments||{};
      l.invoices[firstInv.id].payments[pid]=pay;
      patch.advance=Math.max(0,(l.advance||0)-refund);
      patch.balance=(l.balance||0)+refund;
    }
    await fbP('/leads/'+id,patch);
    Object.assign(l,patch);
    await logHistory(id,'cancel-booking',{reason:reason,refund:refund});
    notif('Booking cancelled.');
    openDetail(id);
    render();
  }catch(e){notif('Error: '+e.message);}
}

var _iti=null;
function initPhoneInput(){
  var input=document.getElementById('of-phone');
  if(!input||typeof window.intlTelInput!=='function')return;
  // Reset any prior instance
  if(_iti){try{_iti.destroy();}catch(e){}_iti=null;}
  _iti=window.intlTelInput(input,{
    initialCountry:'lk',
    preferredCountries:['lk','in','ae','sa','gb','us','au','qa','kw','om','bh','sg','my'],
    separateDialCode:true,
    nationalMode:true,
    autoPlaceholder:'aggressive',
    formatOnDisplay:true,
    utilsScript:'https://cdn.jsdelivr.net/npm/intl-tel-input@23.8.2/build/js/utils.js'
  });
  // Initialize country from existing phone if editing
  if(OF.draft.phone){
    try{_iti.setNumber('+'+OF.draft.phone);}catch(e){}
  }
  input.addEventListener('blur',ofPhoneBlur);
  input.addEventListener('countrychange',ofPhoneBlur);
  input.addEventListener('input',function(){OF.dirty=true;});
}

function ofSetTheme(key,val){
  ofMark();
  OF.draft.events=OF.draft.events||{};
  OF.draft.events[key]=OF.draft.events[key]||{};
  if(val==='Other'){
    // Keep existing custom theme or empty
    var cur = OF.draft.events[key].theme;
    if(!cur || ['Kandyan','Modern Kandyan','Indian','Lehenga','Western'].indexOf(cur)!==-1){
      OF.draft.events[key].theme='';
    }
    renderOverviewForm();
  } else if(val===''){
    OF.draft.events[key].theme='';
  } else {
    OF.draft.events[key].theme=val;
    // Remove "Other" text field if it was shown
    renderOverviewForm();
  }
}

function ofPhoneBlur(){
  var inp=document.getElementById('of-phone');
  if(!inp||!_iti)return;
  var msg=document.getElementById('of-phone-msg');
  if(!msg)return;
  var raw=inp.value.trim();
  if(!raw){msg.innerHTML='';OF.draft.phone='';return;}
  var isValid=_iti.isValidNumber();
  if(!isValid){
    var errCode=_iti.getValidationError();
    var errMsgs=['Invalid number','Invalid country code','Number too short','Number too long','Invalid number'];
    msg.innerHTML='✗ '+(errMsgs[errCode]||'Invalid number for selected country');
    msg.style.color='var(--danger)';
    msg.style.cursor='default';
    msg.onclick=null;
    inp.classList.add('iti-tel-error');
    OF.draft.phone='';
    return;
  }
  inp.classList.remove('iti-tel-error');
  // Get E.164 format and strip the +
  var e164=_iti.getNumber(); // e.g. +94771234567
  var full=e164.replace(/^\+/,'');
  OF.draft.phone=full;
  // Check duplicate
  var existing=Object.values(brides).find(function(b){return b.phone===full&&b.id!==OF.draft.id;});
  if(existing){
    msg.innerHTML='⚠ This number belongs to <strong>'+existing.name+'</strong>. <a href="#" onclick="openExistingBride(\''+existing.id+'\');return false;" style="color:var(--danger);text-decoration:underline;font-weight:600">Click here</a> to open.';
    msg.style.color='var(--danger)';
  } else {
    msg.innerHTML='✓ Saved as '+e164;
    msg.style.color='var(--success)';
    msg.style.cursor='default';
    msg.onclick=null;
  }
}

function openExistingBride(id){

// Validate the form before save
function ofValidate(){
  var errs=[];
  var b=OF.draft;
  // Name
  var nameInp=document.getElementById('of-name');
  if(nameInp)b.name=nameInp.value.trim();
  if(!b.name)errs.push('Bride name is required.');
  // Phone - using intl-tel-input validation
  var phInp=document.getElementById('of-phone');
  if(phInp){
    var raw=phInp.value.trim();
    if(!raw){errs.push('Phone number is required.');}
    else if(_iti&&!_iti.isValidNumber()){errs.push('Phone number is not valid for the selected country.');}
    else if(_iti){
      var e164=_iti.getNumber();
      if(e164)b.phone=e164.replace(/^\+/,'');
    }
  }
  // Duplicate phone
  if(b.phone){
    var dup=Object.values(brides).find(function(x){return x.phone===b.phone&&x.id!==b.id;});
    if(dup)errs.push('Phone number already exists for '+dup.name+'.');
  }
  // At least one event with a date
  var events=b.events||{};
  var enabledEvents=['wedding','homecoming','goingAway'].filter(function(k){return events[k]&&events[k].enabled;});
  if(enabledEvents.length===0){
    errs.push('Tick at least one event (Wedding, Homecoming, or Going Away).');
  } else {
    enabledEvents.forEach(function(k){
      var lbl=k==='wedding'?'Wedding':k==='homecoming'?'Homecoming':'Going Away';
      if(!events[k].date){
        errs.push(lbl+' is ticked but has no date. Either set a date or untick.');
      }
      // Theme required for Wedding and Homecoming, not Going Away
      if((k==='wedding'||k==='homecoming') && !events[k].theme){
        errs.push(lbl+' needs a theme. Pick one (or choose Other to type your own).');
      }
    });
  }
  return errs;
}

async function ofSave(){
  var notesEl=document.getElementById('of-notes');
  if(notesEl)OF.draft.notes=notesEl.value;
  var errs=ofValidate();
  if(errs.length>0){
    var box=document.getElementById('of-validation');
    if(box){
      box.innerHTML='<div style="background:#FEF2F2;border:1.5px solid #FECACA;border-radius:8px;padding:12px;font-size:13px;color:var(--danger)"><div style="font-weight:700;margin-bottom:6px">Cannot save:</div>'+errs.map(function(e){return '• '+e;}).join('<br/>')+'</div>';
      box.scrollIntoView({behavior:'smooth',block:'center'});
    }
    return;
  }
  // Set weddingDate top-level from events.wedding.date
  if(OF.draft.events&&OF.draft.events.wedding&&OF.draft.events.wedding.date){
    OF.draft.weddingDate=OF.draft.events.wedding.date;
  } else if(OF.draft.events&&OF.draft.events.homecoming&&OF.draft.events.homecoming.date){
    OF.draft.weddingDate=OF.draft.events.homecoming.date;
  }
  OF.draft.lastActivity=new Date().toISOString();
  // Add to history
  OF.draft._history=OF.draft._history||{};
  var hid='h-'+Math.random().toString(36).slice(2,10);
  OF.draft._history[hid]={at:new Date().toISOString(),action:OF.isNew?'created':'updated',by:'system'};
  try{
    await saveBride(OF.draft);
    OF.dirty=false;
    notif(OF.isNew?'Bride created!':'Saved.');
    CM('lead-modal');
    render();
  }catch(e){
    notif('Error: '+e.message);
  }
}

async function backfillLeads(){
  var _cr = await showConfirm({title:'Backfill & repair leads',msg:'Create or repair lead records for customers with quotes/invoices.',yesText:'Run'});if(!_cr.ok)return;
  var created=0,repaired=0,skipped=0;
  try{
    var allCusts=cA();
    for(var i=0;i<allCusts.length;i++){
      var c=allCusts[i];
      var hasQuotes=Object.keys(c.quotes||{}).length>0;
      var hasInvoices=Object.keys(c.invoices||{}).length>0;
      if(!hasQuotes&&!hasInvoices){skipped++;continue;}
      var existingLead=lA().find(function(l){return l.phone&&c.phone&&l.phone===c.phone;});
      // Compute expected state
      var hasConvertedQuote=Object.values(c.quotes||{}).some(function(qt){return qt.convertedToInvoice;});
      var isConfirmed=hasInvoices||hasConvertedQuote;
      var totals=0;
      Object.values(c.invoices||{}).forEach(function(inv){totals+=qTot(inv.items);});
      var advances=0;
      Object.values(c.invoices||{}).forEach(function(inv){
        advances+=(inv.advance||0);
        Object.values(inv.payments||{}).forEach(function(p){advances+=(parseFloat(p.amount)||0);});
      });
      if(existingLead){
        // Repair the existing lead's stage/confirmed/payment state
        var repair={};
        if(existingLead.confirmed!==isConfirmed)repair.confirmed=isConfirmed;
        if(Number(existingLead.stage||0)!==(isConfirmed?5:4))repair.stage=isConfirmed?5:4;
        if((existingLead.advance||0)!==advances)repair.advance=advances;
        if((existingLead.balance||0)!==Math.max(0,totals-advances))repair.balance=Math.max(0,totals-advances);
        // Sync quotes/invoices references onto the lead so it shows in detail view
        if(hasQuotes&&!existingLead.quotations)repair.quotations=c.quotes||{};
        if(hasInvoices&&!existingLead.invoices)repair.invoices=c.invoices||{};
        if(Object.keys(repair).length>0){
          await fbP('/leads/'+existingLead.id,repair);
          Object.assign(existingLead,repair);
          repaired++;
        } else {
          skipped++;
        }
        continue;
      }
      var nid=uid();
      var hasConvertedQuote=Object.values(c.quotes||{}).some(function(qt){return qt.convertedToInvoice;});
      var isConfirmed=hasInvoices||hasConvertedQuote;
      var totals=0;
      Object.values(c.invoices||{}).forEach(function(inv){totals+=qTot(inv.items);});
      var advances=0;
      Object.values(c.invoices||{}).forEach(function(inv){
        advances+=(inv.advance||0);
        Object.values(inv.payments||{}).forEach(function(p){advances+=(parseFloat(p.amount)||0);});
      });
      var nl={
        id:nid,name:c.name,phone:c.phone||'',email:c.email||'',
        source:'walk-in',stage:isConfirmed?5:4,
        weddingDate:c.weddingDate||'',package:'Custom',
        notes:'Backfilled from customer profile',
        bridesmaids:c.bridesmaids||0,
        createdAt:c.createdAt||new Date().toISOString(),
        confirmed:isConfirmed,
        advance:advances,balance:Math.max(0,totals-advances),
        venue:c.venue||'',
        appointments:{},
        quotations:c.quotes||{},
        invoices:c.invoices||{}
      };
      await fbS('/leads/'+nid,nl);
      leads[nid]=nl;
      created++;
    }
    notif('Done: '+created+' created, '+repaired+' repaired, '+skipped+' skipped.');
    render();
  }catch(e){notif('Error: '+e.message);}
}
async function clearData(){
  var _r1 = await showConfirm({title:'Clear all data',msg:'This will permanently delete ALL brides (leads + customers + quotes + invoices). Settings will be kept.',yesText:'Continue',dangerous:true});
  if(!_r1.ok)return;
  var _r2 = await showConfirm({title:'Final confirmation',msg:'Are you absolutely sure? This cannot be undone.',yesText:'Yes, delete everything',dangerous:true});
  if(!_r2.ok)return;
  try{
    await fetch(FB+'/brides.json',{method:'DELETE'});
    await fetch(FB+'/leads.json',{method:'DELETE'});
    await fetch(FB+'/customers.json',{method:'DELETE'});
    brides={};leads={};custs={};
    notif('All data cleared.');
    render();
  }catch(e){notif('Error: '+e.message);}
}
