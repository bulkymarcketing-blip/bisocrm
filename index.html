// ---------- Cancellation ----------
async function openCancelBooking(id){
  var l=leads[id];if(!l)return;
  if(needsApproval('refund')){
    // Manager: must request approval for cancellation+refund
    var rr=await showRequestApprovalConfirm({
      title:'Request: Cancel booking',
      msg:'You are asking the owner to cancel '+l.name+'\u2019s booking. Enter refund amount (0 if no refund) and a reason. The owner will see this and decide.',
      reasonRequired:true,
      input:true,
      inputType:'number',
      inputLabel:'Refund amount (Rs)',
      money:true,
      inputDefault:'0'
    });
    if(!rr.ok)return;
    var refundReq=parseFloat(rr.value)||0;
    var maxRefundReq=netHeld(l);
    if(refundReq>maxRefundReq){
      notif('Refund of '+fR(refundReq)+' exceeds amount still held ('+fR(maxRefundReq)+'). Request again with '+fR(maxRefundReq)+' or less.');
      return;
    }
    try{
      await createRequest({
        type:'refund',
        targetPath:'/brides/'+id,
        payload:{leadId:id,refund:refundReq,reason:rr.note},
        snapshot:{name:l.name,advance:l.advance||0,balance:l.balance||0,cancelled:l.cancelled||false},
        reason:rr.note
      });
      notif('Request sent to owner for approval.');
      CM('detail-modal'); // close the window once the request is submitted
    }catch(e){notif('Could not submit request: '+e.message);}
    return;
  }
  // Owner: direct cancellation — TWO STEPS
  // Step 1: confirm the cancellation (with reason)
  var r=await showConfirm({
    title:'Cancel booking',
    msg:'This will mark '+l.name+'\'s booking as cancelled. The record is kept (locked, read-only). This is the only point where a refund can be issued.',
    yesText:'Continue',
    dangerous:true,
    note:true
  });
  if(!r.ok)return;
  var reason=r.note||'';
  // Step 2: ask the refund amount (capped at collected). Default 0.
  var maxRefund=netHeld(l);
  var r2=await showConfirm({
    title:'Refund amount',
    msg:'Amount collected so far: '+fR(maxRefund)+'. Enter how much to refund (0 for none). This is final \u2014 no further refunds after.',
    yesText:'Confirm cancellation',
    dangerous:true,
    input:true,
    inputType:'number',
    inputLabel:'Refund amount (Rs)',
    money:true,
    inputDefault:'0'
  });
  if(!r2.ok)return;
  var refund=parseFloat(r2.value)||0;
  if(refund>maxRefund){
    notif('Refund of '+fR(refund)+' exceeds amount collected ('+fR(maxRefund)+'). Cancel again with '+fR(maxRefund)+' or less.');
    return;
  }
  var now=new Date().toISOString();
  if(window._busy)return; window._busy=true;
  try{
    var patch={cancelled:true,cancelledAt:now,cancelReason:reason,refundAmount:refund};
    // If refund > 0, log as negative payment on first invoice
    var firstInv=Object.values(l.invoices||{})[0];
    if(refund>0&&firstInv){
      var pid='p-'+uid();
      var pay={id:pid,amount:-refund,date:now.slice(0,10),method:'Refund',note:'Cancellation refund: '+reason,createdAt:now};
      var pp={};pp[pid]=pay;
      await fbP('/leads/'+id+'/invoices/'+firstInv.id+'/payments',pp);
      l.invoices[firstInv.id].payments=l.invoices[firstInv.id].payments||{};
      l.invoices[firstInv.id].payments[pid]=pay;
      patch.advance=Math.max(0,(l.advance||0)-refund);
      patch.balance=(l.balance||0)+refund;
    }
    await fbP('/leads/'+id,patch);
    Object.assign(l,patch);
    if(brides[id])Object.assign(brides[id],patch); // keep canonical record in sync so balance helpers read the cancelled state immediately
    await logHistory(id,'cancel-booking',{reason:reason,refund:refund});
    notif('Booking cancelled.');
    CM('detail-modal'); // close the window on confirm; the toast still shows and the list refreshes
    render();
  }catch(e){notif('Error: '+e.message);}
  finally{window._busy=false;}
}

async function advStage(id,newStage){
  // Special handling: moving to "Consultation Booked" (stage 2) requires a date+time
  if(newStage===2){
    var r=await showConfirm({
      title:'Book Consultation',
      msg:'When is the consultation?',
      yesText:'Book',
      input:true,
      inputType:'date',
      inputLabel:'Consultation Date',
      inputDefault:new Date().toISOString().slice(0,10),
      time:true,
      timeDefault:'',
      note:true
    });
    if(!r.ok)return;
    if(!r.value){notif('Consultation date is required.');return;}
    // Create the consultation appointment
    var key='a-'+Math.random().toString(36).slice(2,10);
    var appt={key:key,date:r.value,time:r.time||'',reason:'Consultation',note:r.note||'',cancelled:false,createdAt:new Date().toISOString()};
    try{
      var p={};p[key]=appt;
      await fbP('/leads/'+id+'/appointments',p);
      leads[id].appointments=leads[id].appointments||{};leads[id].appointments[key]=appt;
      if(brides[id]){brides[id].appointments=brides[id].appointments||{};brides[id].appointments[key]=appt;}
    }catch(e){notif('Could not save appointment: '+e.message);return;}
  }
  // Auto-mark consultation appointment as done when stage advances to 3 (Consultation Done)
  var autoMarkedAppt = null;
  if(newStage===3 && leads[id] && leads[id].appointments){
    var doneAt = new Date().toISOString();
    var consults = Object.values(leads[id].appointments).filter(function(a){
      return a.reason==='Consultation' && !a.cancelled && !a.done;
    });
    if(consults.length > 0){
      // Mark the most recent (last scheduled date) one as done
      consults.sort(function(a,b){return new Date(b.date) - new Date(a.date);});
      autoMarkedAppt = consults[0];
    }
  }
  window._saving = true;
  try{
    await fbP('/brides/'+id,{stage:newStage,lastActivity:new Date().toISOString()});
    if(brides[id]){brides[id].stage=newStage;brides[id].lastActivity=new Date().toISOString();}
    if(leads[id]){leads[id].stage=newStage;leads[id].lastActivity=new Date().toISOString();}
    // Apply auto-mark-done if applicable
    if(autoMarkedAppt){
      var doneAt = new Date().toISOString();
      try{
        await fbP('/brides/'+id+'/appointments/'+autoMarkedAppt.key,{done:true,doneAt:doneAt});
        if(brides[id] && brides[id].appointments && brides[id].appointments[autoMarkedAppt.key]){
          brides[id].appointments[autoMarkedAppt.key].done = true;
          brides[id].appointments[autoMarkedAppt.key].doneAt = doneAt;
        }
        if(leads[id] && leads[id].appointments && leads[id].appointments[autoMarkedAppt.key]){
          leads[id].appointments[autoMarkedAppt.key].done = true;
          leads[id].appointments[autoMarkedAppt.key].doneAt = doneAt;
        }
        projectViews();
      }catch(amErr){
        // If auto-mark fails, don't fail the whole stage advance
        console.error('Auto-mark consultation done failed:', amErr);
      }
    }
    await logHistory(id,'stage-change',{to:newStage,autoMarked:autoMarkedAppt?autoMarkedAppt.key:null});
    notif(autoMarkedAppt ? 'Stage updated. Consultation marked complete.' : 'Stage updated.');
    if(document.getElementById('detail-modal').classList.contains('open'))openDetail(id);
    render();
  }catch(e){notif('Error: '+e.message);
  }finally{window._saving=false;}
}

// Overview Form - single source of truth
// Used for: new bride creation, lead/confirmed detail overview tab

function countDropdown(id, val){
  var opts = '';
  for(var i = 0; i <= 10; i++){
    opts += '<option value="'+i+'"'+(i==val?' selected':'')+'>'+i+'</option>';
  }
  return '<select id="'+id+'" onchange="ofCountChange(\''+id+'\',this.value)">'+opts+'</select>';
}

var OF = {
  brideId:null,       // existing bride being edited (null for new)
  isNew:true,         // true for new bride creation
  draft:null,         // working copy of bride data
  dirty:false,        // form has unsaved changes
  countryCode:'94',
  intent:null,        // 'lead' | 'quote' | 'invoice' | null
  existingQuoteId:null // id of an existing draft quote being edited
};

// ============================================================
// ENTRY POINT - THE ONLY WAY TO OPEN THE OVERVIEW FORM
// ============================================================
function openOverviewForm(brideId, opts){
  opts = opts || {};
  var intent = opts.intent || null; // 'lead', 'quote', 'invoice', or null (edit)
  OF.intent = intent;
  OF.existingQuoteId = null;
  OF.fromIntake = null; // set below if promoting a chatbot enquiry
  
  if(brideId && brides[brideId]){
    // EDITING EXISTING BRIDE
    OF.brideId = brideId;
    OF.isNew = false;
    OF.draft = JSON.parse(JSON.stringify(brides[brideId]));
    // Resolve country code from phone
    var pAll = String(OF.draft.phone||'').replace(/\D/g,'');
    var match = COUNTRIES.find(function(x){return pAll.indexOf(x.c)===0;});
    OF.countryCode = match ? match.c : '94';
    
    // Load a specific quote (opts.quoteId) or the latest unsent draft, if any
    OF.draft.quoteItems = {};
    OF.draft.quoteSchedule = null;
    var draftQuote = null;
    var quotes = OF.draft.quotes || {};
    if(opts.quoteId && quotes[opts.quoteId]){
      draftQuote = quotes[opts.quoteId];
    } else {
      Object.values(quotes).forEach(function(qt){
        if(!qt.sent && !qt.convertedToInvoice && !draftQuote)draftQuote = qt;
      });
    }
    if(draftQuote && draftQuote.items){
      Object.values(draftQuote.items).forEach(function(it){
        var k = it.key || ('L-'+Math.random().toString(36).slice(2,9));
        var loaded = Object.assign({}, it, {key:k});
        // Infer linkedTo from desc if missing (legacy data compatibility)
        if(!loaded.linkedTo && !loaded.custom && !loaded.isPackage && !loaded.parentKey){
          var d = (loaded.desc||'').toLowerCase();
          if(d.indexOf('bridal')===0)loaded.linkedTo = 'wedding';
          else if(d.indexOf('homecoming package discount')===0)loaded.linkedTo = 'discount';
          else if(d.indexOf('homecoming')===0)loaded.linkedTo = 'homecoming';
          else if(d.indexOf('going away')===0)loaded.linkedTo = 'goingAway';
          else if(d.indexOf('bridesmaid')===0)loaded.linkedTo = 'bridesmaids';
          else if(d.indexOf('flower girl')===0)loaded.linkedTo = 'flowerGirls';
          else if(d.indexOf('little maid')===0)loaded.linkedTo = 'littleMaids';
          else loaded.custom = true;
        }
        OF.draft.quoteItems[k] = loaded;
      });
      OF.existingQuoteId = draftQuote.id;
      OF.draft.quoteSchedule = draftQuote.schedule || null;
    }
    // Dedupe linked items (keep first of each link key)
    var seen = {};
    Object.keys(OF.draft.quoteItems).forEach(function(k){
      var it = OF.draft.quoteItems[k];
      if(it.linkedTo && !it.parentKey && !it.isPackage){
        if(seen[it.linkedTo]){ delete OF.draft.quoteItems[k]; }
        else seen[it.linkedTo] = k;
      }
    });
  } else {
    // NEW BRIDE
    OF.brideId = null;
    OF.isNew = true;
    // Intent-driven initial stage:
    // 'lead' = stage 0 (just capturing inquiry)
    // 'quote' = stage 4 (walk-in skipping pipeline, quote being created)
    // 'invoice' = stage 5 (walk-in confirming with advance) — will also be set after invoice save
    var initStage = intent==='invoice' ? 5 : intent==='quote' ? 4 : 0;
    OF.draft = {
      id: 'bride-'+Math.random().toString(36).slice(2,10),
      name:'', phone:'', email:'',
      source: intent==='quote' || intent==='invoice' ? 'walkin' : 'whatsapp',
      stage: initStage,
      confirmed: false,
      cancelled: false,
      events: {},
      notes: '',
      createdAt: new Date().toISOString(),
      lastActivity: new Date().toISOString(),
      quotes: {},
      invoices: {},
      appointments: {},
      notesLog: {},
      documents: {},
      _history: {},
      quoteItems: {},
      quoteSchedule: null
    };
    OF.countryCode = '94';
  }
  
  // If this form was opened to promote a chatbot enquiry, overlay its captured
  // fields onto the fresh draft. We keep OF.isNew=true so saving writes /brides/{id};
  // ofSave then deletes the matching /leadintake record on success.
  if(OF.isNew && opts.intakeRecord){
    var ir = opts.intakeRecord;
    OF.fromIntake = ir.id || null;
    if(ir.id)OF.draft.id = ir.id; // reuse the intake id so it's traceable
    if(ir.name)OF.draft.name = ir.name;
    if(ir.phone)OF.draft.phone = ir.phone;
    if(ir.email)OF.draft.email = ir.email;
    if(ir.source)OF.draft.source = ir.source;
    if(ir.notes)OF.draft.notes = ir.notes;
    if(ir.weddingDate)OF.draft.weddingDate = ir.weddingDate;
    if(ir.events)OF.draft.events = JSON.parse(JSON.stringify(ir.events));
    // Carry the callback reminder + contact attempt so it lands in Today's Actions as before
    if(ir.nextReminderAt)OF.draft.nextReminderAt = ir.nextReminderAt;
    if(ir.remindersStopped!==undefined)OF.draft.remindersStopped = ir.remindersStopped;
    if(ir.contactAttempts)OF.draft.contactAttempts = JSON.parse(JSON.stringify(ir.contactAttempts));
    if(ir.stage!==undefined)OF.draft.stage = ir.stage;
    // Resolve country code from the carried phone
    var pIn = String(OF.draft.phone||'').replace(/\D/g,'');
    var m2 = COUNTRIES.find(function(x){return pIn.indexOf(x.c)===0;});
    OF.countryCode = m2 ? m2.c : '94';
  }
  
  // Sync quote items from events (important for existing brides with old data)
  syncQuoteItems();
  OF.dirty = false;
  
  renderOverviewForm();
  
  // Set title based on intent
  var titleEl = document.getElementById('of-title');
  if(titleEl){
    if(OF.isNew){
      if(intent==='quote')titleEl.textContent = 'New Quotation';
      else if(intent==='invoice')titleEl.textContent = 'New Invoice';
      else titleEl.textContent = 'New Bride';
    } else {
      titleEl.textContent = OF.draft.name || 'Bride';
    }
  }
  OM('lead-modal');
}

async function closeOverview(){
  if(OF.dirty){
    var r = await showConfirm({
      title:'Discard changes?',
      msg:'You have unsaved changes. Discard them?',
      yesText:'Discard',
      dangerous:true
    });
    if(!r.ok)return;
  }
  OF.intent = null;
  OF.existingQuoteId = null;
  CM('lead-modal');
}

    // Compute date constraints based on other event dates

    var hEv = allEvents.homecoming;

      // and commit it to the model so it's not lost
      dateDefault = minStr;
      if(!e.date){
        e.date = minStr;

      }

    }

      +'<input type="checkbox" '+(enabled?'checked':'')+' onchange="ofToggleEvent(\''+key+'\',this.checked)" style="width:18px;height:18px;cursor:pointer"/> '+label
      +'</label>'

        +bridesmaidsField
        +flowerGirlsField
        +littleMaidsField

    +'</div>'

  else if(showsQuote && OF.draft.quoteItems && Object.keys(OF.draft.quoteItems).length > 0)saveLabel = 'Save Bride & Quote';
  else saveLabel = 'Save';
  
  var footerHtml = '<button class="btn btn-ghost" onclick="closeOverview()">Cancel</button>'
    + '<button class="btn btn-primary" onclick="ofSave()">'+saveLabel+'</button>';

  // Initialize phone input library (if available)

// ============================================================
// PHONE INPUT (with safe fallback if CDN failed)
// ============================================================
var _iti = null;
function initPhoneInput(){
  var input = document.getElementById('of-phone');
  if(!input) return;
  // If intl-tel-input library not loaded, skip silently - the field stays as plain tel input
  if(typeof window.intlTelInput !== 'function') return;
  if(_iti){ try{_iti.destroy();}catch(e){} _iti = null; }
  try {
    _iti = window.intlTelInput(input, {
      initialCountry: 'lk',
      preferredCountries: ['lk','in','ae','sa','gb','us','au','qa','kw','om','bh','sg','my'],
      separateDialCode: true,
      nationalMode: true,
      autoPlaceholder: 'aggressive',
      formatOnDisplay: true,
      utilsScript: 'https://cdn.jsdelivr.net/npm/intl-tel-input@23.8.2/build/js/utils.js'
    });
    if(OF.draft.phone){
      try{ _iti.setNumber('+'+OF.draft.phone); }catch(e){}
    }
    input.addEventListener('blur', ofPhoneBlur);
    input.addEventListener('countrychange', ofPhoneBlur);
    input.addEventListener('input', function(){ OF.dirty = true; });
  } catch(e) {
    // intl-tel-input failed for some reason - fall back to plain input
    _iti = null;
  }
}

// ============================================================
// CHANGE HANDLERS
// ============================================================
function ofMark(){ OF.dirty = true; }

function ofToggleEvent(key, checked){
  ofMark();
  OF.draft.events = OF.draft.events || {};
  OF.draft.events[key] = OF.draft.events[key] || {};
  OF.draft.events[key].enabled = checked;
  // Rule 1: When Going Away is ticked, auto-sync date to Wedding date
  if(key === 'goingAway' && checked){
    var w = OF.draft.events.wedding;
    if(w && w.enabled && w.date){
      OF.draft.events.goingAway.date = w.date;
    }
  }
  syncQuoteItems();
  renderOverviewForm();
}

function ofSetEvent(key, field, val){
  ofMark();
  OF.draft.events = OF.draft.events || {};
  OF.draft.events[key] = OF.draft.events[key] || {};
  OF.draft.events[key][field] = val;
  if(key==='wedding' && field==='date'){
    OF.draft.weddingDate = val;
    // Rule 1: If Going Away is ticked, mirror wedding date
    var g = OF.draft.events.goingAway;
    if(g && g.enabled){
      g.date = val;
    }
    // Rule 2: If Homecoming date is before new Wedding date, clear it
    var h = OF.draft.events.homecoming;
    if(h && h.enabled && h.date && val && h.date <= val){
      // Homecoming must be AFTER wedding - clear if conflict
      h.date = '';
    }
  }
  if(key==='homecoming' && field==='date'){
    // Rule 2: If Homecoming date is on/before Wedding date, that's invalid - reject
    var w = OF.draft.events.wedding;
    if(w && w.enabled && w.date && val && val <= w.date){
      // Don't accept invalid date
      notif('Homecoming must be after the wedding date.');
      OF.draft.events.homecoming.date = '';
      renderOverviewForm();
      return;
    }
  }
  syncQuoteItems();
  if(field === 'date') renderOverviewForm();
}

function ofSetTheme(key, val){
  ofMark();
  OF.draft.events = OF.draft.events || {};
  OF.draft.events[key] = OF.draft.events[key] || {};
  if(val === 'Other'){
    var cur = OF.draft.events[key].theme;
    if(!cur || ['Kandyan','Modern Kandyan','Indian','Lehenga','Western'].indexOf(cur) !== -1){
      OF.draft.events[key].theme = '';
    }
    syncQuoteItems();
    renderOverviewForm();
  } else if(val === ''){
    OF.draft.events[key].theme = '';
    syncQuoteItems();
  } else {
    OF.draft.events[key].theme = val;
    syncQuoteItems();
    renderOverviewForm();
  }
}

function ofSetThemeOther(key, val){
  ofMark();
  OF.draft.events = OF.draft.events || {};
  OF.draft.events[key] = OF.draft.events[key] || {};
  OF.draft.events[key].theme = val.trim();
  syncQuoteItems();
}

function ofCountChange(id, val){
  ofMark();
  var parts = id.split('-');
  var prefix = parts[0], key = parts[1];
  var field = prefix==='bm' ? 'bridesmaids' : prefix==='fg' ? 'flowerGirls' : 'littleMaids';
  OF.draft.events = OF.draft.events || {};
  OF.draft.events[key] = OF.draft.events[key] || {};
  OF.draft.events[key][field] = parseInt(val) || 0;
  syncQuoteItems();
  renderOverviewForm();
}

function ofPhoneInput(){ ofMark(); }

function ofPhoneBlur(){
  var inp = document.getElementById('of-phone');
  if(!inp) return;
  var msg = document.getElementById('of-phone-msg');
  if(!msg) return;
  var raw = inp.value.trim();
  if(!raw){ msg.innerHTML = ''; OF.draft.phone = ''; return; }
  if(_iti){
    var isValid = _iti.isValidNumber();
    if(!isValid){
      var errCode = _iti.getValidationError();
      var errMsgs = ['Invalid number','Invalid country code','Number too short','Number too long','Invalid number'];
      msg.innerHTML = '✗ '+(errMsgs[errCode] || 'Invalid number for selected country');
      msg.style.color = 'var(--danger)';
      inp.classList.add('iti-tel-error');
      OF.draft.phone = '';
      return;
    }
    inp.classList.remove('iti-tel-error');
    var e164 = _iti.getNumber();
    OF.draft.phone = e164.replace(/^\+/,'');
  } else {
    // Fallback: simple validation
    var digits = raw.replace(/\D/g,'');
    if(digits.length < 7){
      msg.innerHTML = '✗ Phone number too short';
      msg.style.color = 'var(--danger)';
      return;
    }
    if(digits.indexOf('94') !== 0 && digits.length === 9){ digits = '94'+digits; }
    OF.draft.phone = digits;
  }
  // Check duplicate
  var existing = Object.values(brides).find(function(b){
    return b.phone === OF.draft.phone && b.id !== OF.draft.id;
  });
  if(existing){
    msg.innerHTML = '⚠ This number belongs to <strong>'+escHtml(existing.name)+'</strong>. <a href="#" onclick="CM(\'lead-modal\');openDetail(\''+existing.id+'\');return false;" style="color:var(--danger);text-decoration:underline;font-weight:600">Click here</a> to open.';
    msg.style.color = 'var(--danger)';
  } else {
    msg.innerHTML = '✓ Valid';
    msg.style.color = 'var(--success)';
  }
}

// ============================================================
// VALIDATION
// ============================================================
function ofValidate(){
  var errs = [];
  var b = OF.draft;
  // Name
  var nameInp = document.getElementById('of-name');
  if(nameInp)b.name = nameInp.value.trim();
  if(!b.name)errs.push('Bride name is required.');
  // Phone
  var phInp = document.getElementById('of-phone');
  if(phInp){
    var raw = phInp.value.trim();
    if(!raw){
      errs.push('Phone number is required.');
    } else if(_iti){
      if(!_iti.isValidNumber()){
        errs.push('Phone number is not valid for the selected country.');
      } else {
        var e164 = _iti.getNumber();
        if(e164)b.phone = e164.replace(/^\+/,'');
      }
    } else {
      // Fallback validation
      var digits = raw.replace(/\D/g,'');
      if(digits.length < 7)errs.push('Phone number is too short.');
      else {
        if(digits.indexOf('94') !== 0 && digits.length === 9){ digits = '94'+digits; }
        b.phone = digits;
      }
    }
  }
  // Duplicate
  if(b.phone){
    var dup = Object.values(brides).find(function(x){return x.phone === b.phone && x.id !== b.id;});
    if(dup)errs.push('Phone number already exists for '+dup.name+'.');
  }
  // At least one event with a date
  var events = b.events || {};
  var enabled = ['wedding','homecoming','goingAway','engagement'].filter(function(k){return events[k] && events[k].enabled;});
  if(enabled.length === 0){
    errs.push('Tick at least one event (Wedding, Homecoming, Going Away, or Engagement).');
  } else {
    var evLabels = {wedding:'Wedding',homecoming:'Homecoming',goingAway:'Going Away',engagement:'Engagement'};
    enabled.forEach(function(k){
      var lbl = evLabels[k] || k;
      if(!events[k].date)errs.push(lbl+' is ticked but has no date. Set a date or untick.');
      if((k==='wedding' || k==='homecoming') && !events[k].theme){
        errs.push(lbl+' theme is required.');
      }
    });
  }
  return errs;
}

// ============================================================
// SAVE - intent-aware
// ============================================================
async function ofSave(){
  // Pull latest values from DOM
  var notesEl = document.getElementById('of-notes');
  if(notesEl)OF.draft.notes = notesEl.value;
  
  // Validate
  var errs = ofValidate();
  if(errs.length > 0){
    var box = document.getElementById('of-validation');
    if(box){
      box.innerHTML = '<div style="background:#FEF2F2;border:1.5px solid #FECACA;border-radius:8px;padding:12px;font-size:13px;color:var(--danger)"><div style="font-weight:700;margin-bottom:6px">Please fix:</div>'+errs.map(function(e){return '• '+escHtml(e);}).join('<br/>')+'</div>';
      box.scrollIntoView({behavior:'smooth',block:'center'});
    }
    return;
  }
  
  // #4: finalise the order-discount line before snapshotting (strips it if empty)
  recomputeOrderDiscount(true);
  // Mirror weddingDate for back-compat
  if(OF.draft.events && OF.draft.events.wedding && OF.draft.events.wedding.date){
    OF.draft.weddingDate = OF.draft.events.wedding.date;
  } else if(OF.draft.events && OF.draft.events.homecoming && OF.draft.events.homecoming.date){
    OF.draft.weddingDate = OF.draft.events.homecoming.date;
  }
  OF.draft.lastActivity = new Date().toISOString();
  
  // History entry
  OF.draft._history = OF.draft._history || {};
  var hid = 'h-'+Math.random().toString(36).slice(2,10);
  OF.draft._history[hid] = {
    at: new Date().toISOString(),
    action: OF.isNew ? 'created' : 'updated',
    by: 'system',
    details: {intent: OF.intent}
  };
  
  // Strip quote-only fields from the bride record we save
  var quoteItems = OF.draft.quoteItems || {};
  var brideClone = Object.assign({}, OF.draft);
  delete brideClone.quoteItems;
  delete brideClone.quoteSchedule;
  // Remove transient fields
  
  // Set saving flag to pause background polling
  if(window._busy)return; window._busy=true;
  window._saving = true;
  var _intakeIdToClear = OF.fromIntake || null;
  try {
    // 1. Save bride
    await saveBride(brideClone);
    
    // 2. Decide whether to save a quote
    var saveQuote = shouldShowQuoteSection() && Object.keys(quoteItems).length > 0;
    var savedQuoteId = null;
    if(saveQuote){
      var quoteId = OF.existingQuoteId || (await mintDocNum('quote'));
      savedQuoteId = quoteId;
      var items = {};
      Object.values(quoteItems).forEach(function(it){
        var k = it.key || ('L-'+Math.random().toString(36).slice(2,9));
        items[k] = Object.assign({}, it, {key:k});
      });
      var qt = {
        id: quoteId,
        date: new Date().toISOString().slice(0,10),
        expiry: expD(),
        items: items,
        notes: defNotes(),
        convertedToInvoice: false,
        sent: false,
        schedule: OF.draft.quoteSchedule || null
      };
      // Single canonical path
      var patch = {};
      patch[quoteId] = qt;
      await fbP('/brides/'+OF.draft.id+'/quotes', patch);
      // Defensive: ensure bride exists locally before updating
      if(!brides[OF.draft.id])brides[OF.draft.id] = brideClone;
      brides[OF.draft.id].quotes = brides[OF.draft.id].quotes || {};
      brides[OF.draft.id].quotes[quoteId] = qt;
      // Advance stage to Quoted (4) if currently below that
      var curStage = Number(brides[OF.draft.id].stage || 0);
      if(curStage < 4 && !brides[OF.draft.id].confirmed){
        await fbP('/brides/'+OF.draft.id, {stage: 4});
        brides[OF.draft.id].stage = 4;
      }
      projectViews();
    }
    
    // 3. If intent is invoice, also create an invoice from the quote
    if(OF.intent === 'invoice' && savedQuoteId){
      // For walk-in invoice creation, immediately convert quote to invoice with no advance
      // This places the bride at stage 5 (Confirmed)
      var invItems = {};
      Object.values(quoteItems).forEach(function(it){
        var k = it.key || ('L-'+Math.random().toString(36).slice(2,9));
        invItems[k] = Object.assign({}, it, {key:k});
      });
      var inv = {
        id: await mintDocNum('invoice'),
        date: new Date().toISOString().slice(0,10),
        items: invItems,
        advance: 0,
        payments: {},
        notes: '',
        schedule: OF.draft.quoteSchedule || null
      };
      var ipatch = {};
      ipatch[inv.id] = inv;
      await fbP('/brides/'+OF.draft.id+'/invoices', ipatch);
      // Mark quote as converted
      await fbP('/brides/'+OF.draft.id+'/quotes/'+savedQuoteId, {convertedToInvoice:true});
      // Update bride stage to confirmed
      await fbP('/brides/'+OF.draft.id, {stage:5, confirmed:true});
      // Defensive: ensure bride exists locally
      if(!brides[OF.draft.id])brides[OF.draft.id] = brideClone;
      brides[OF.draft.id].invoices = brides[OF.draft.id].invoices || {};
      brides[OF.draft.id].invoices[inv.id] = inv;
      if(brides[OF.draft.id].quotes && brides[OF.draft.id].quotes[savedQuoteId]){
        brides[OF.draft.id].quotes[savedQuoteId].convertedToInvoice = true;
      }
      brides[OF.draft.id].stage = 5;
      brides[OF.draft.id].confirmed = true;
      projectViews();
    }
    
    OF.dirty = false;
    OF.intent = null;
    OF.existingQuoteId = null;
    OF.fromIntake = null;
    
    // If this bride was promoted from a chatbot enquiry, remove it from the intake queue.
    if(_intakeIdToClear){
      try{
        await fbD('/leadintake/'+_intakeIdToClear);
        if(INTAKE&&INTAKE[_intakeIdToClear])delete INTAKE[_intakeIdToClear];
      }catch(ie){ console.error('[intake] clear failed:',ie.message); }
    }
    
    // Status messages
    if(OF.intent === 'invoice'){
      notif('Bride, quote and invoice created.');
    } else if(saveQuote){
      notif(OF.isNew ? 'Bride and quote saved.' : 'Saved.');
    } else {
      notif(OF.isNew ? 'Bride created.' : 'Saved.');
    }
    CM('lead-modal');
    render();
  } catch(e) {
    notif('Error: '+e.message);
  } finally {
    window._saving = false;
    window._busy = false;
  }
}

// ============================================================
// QUOTE SECTION HELPERS (two-way binding)
// ============================================================
function findLinked(items, key){
  var ks = Object.keys(items || {});
  for(var i = 0; i < ks.length; i++){
    if(items[ks[i]].linkedTo === key)return ks[i];
  }
  return null;
}

function upsertLinked(linkedTo, desc, qty, unit){
  OF.draft.quoteItems = OF.draft.quoteItems || {};
  var existingKey = findLinked(OF.draft.quoteItems, linkedTo);
  if(existingKey){
    var ex = OF.draft.quoteItems[existingKey];
    ex.desc = desc;
    // Only sync qty for count-driven lines (user can edit qty for bridal/homecoming)
    if(linkedTo === 'bridesmaids' || linkedTo === 'flowerGirls' || linkedTo === 'littleMaids'){
      ex.qty = qty;
    }
    return existingKey;
  }
  var k = 'L-'+Math.random().toString(36).slice(2,9);
  OF.draft.quoteItems[k] = {
    key: k, desc: desc, qty: qty, unit: unit, disc: 0,
    linkedTo: linkedTo, custom: false
  };
  return k;
}

function removeLinked(linkedTo){
  OF.draft.quoteItems = OF.draft.quoteItems || {};
  var existingKey = findLinked(OF.draft.quoteItems, linkedTo);
  if(existingKey){
    delete OF.draft.quoteItems[existingKey];
    return true;
  }
  return false;
}

function syncQuoteItems(){
  OF.draft.quoteItems = OF.draft.quoteItems || {};
  // Gate: if section shouldn't show, clear linked items
  if(!shouldShowQuoteSection()){
    Object.keys(OF.draft.quoteItems).forEach(function(k){
      if(OF.draft.quoteItems[k].linkedTo)delete OF.draft.quoteItems[k];
    });
    return;
  }
  var events = OF.draft.events || {};
  var w = events.wedding || {};
  var h = events.homecoming || {};
  var g = events.goingAway || {};
  var hasW = !!w.enabled;
  var hasH = !!h.enabled;
  var hasG = !!g.enabled;
  var bmCount = parseInt(w.bridesmaids||0) || 0;
  var fgCount = parseInt(w.flowerGirls||0) || 0;
  var lmCount = parseInt(w.littleMaids||0) || 0;
  
  // Wedding
  if(hasW){
    var wDesc = 'Bridal' + (w.theme ? ' — '+w.theme : '');
    upsertLinked('wedding', wDesc, 1, 125000);
  } else removeLinked('wedding');
  // Homecoming
  if(hasH){
    var hDesc = 'Homecoming' + (h.theme ? ' — '+h.theme : '');
    upsertLinked('homecoming', hDesc, 1, 125000);
  } else removeLinked('homecoming');
  // Discount (only when both W+H)
  if(hasW && hasH){
    upsertLinked('discount', 'Homecoming Package Discount', 1, -30000);
  } else removeLinked('discount');
  // Going Away
  if(hasG){
    upsertLinked('goingAway', 'Going Away', 1, 65000);
  } else removeLinked('goingAway');
  // Engagement
  var en = events.engagement || {};
  var hasEn = !!en.enabled;
  if(hasEn){
    upsertLinked('engagement', 'Engagement', 1, 65000);
  } else removeLinked('engagement');
  // Bridesmaids
  if(bmCount > 0)upsertLinked('bridesmaids', 'Bridesmaid', bmCount, 38000);
  else removeLinked('bridesmaids');
  // Flower Girls
  if(fgCount > 0)upsertLinked('flowerGirls', 'Flower Girl', fgCount, 8000);
  else removeLinked('flowerGirls');
  // Little Maids
  if(lmCount > 0)upsertLinked('littleMaids', 'Little Maid', lmCount, 10000);
  else removeLinked('littleMaids');
}

// ===== #4: order-level discount, modelled as a discount LINE so it flows through
// qTot -> Finance -> refund -> invoice (on conversion) -> PDF automatically. Rs or %;
// a % recomputes off the live subtotal. Set on the quote, carries to the invoice. =====
function ofDiscItemKey(){var it=OF.draft.quoteItems||{};var k=null;Object.keys(it).forEach(function(x){if(it[x]&&it[x].orderDiscount)k=x;});return k;}
function ofSubtotalExclDiscount(){var it=OF.draft.quoteItems||{};return Object.values(it).reduce(function(s,x){return (x&&x.orderDiscount)?s:s+cLine(x);},0);}
function recomputeOrderDiscount(strip){
  var items=OF.draft.quoteItems||{};var k=ofDiscItemKey();if(!k)return;
  var it=items[k];var sub=ofSubtotalExclDiscount();var v=parseFloat(it.discValue)||0;
  var amt=(it.discType==='pct')?Math.round(v/100*sub):Math.round(v);
  if(amt>sub)amt=Math.max(0,sub);
  if(amt<0)amt=0;
  it.qty=1;it.disc=0;it.unit=-amt;
  if(strip&&(v<=0||amt<=0))delete items[k]; // strip empty discount on save; keep while editing so the Rs/% toggle persists
}
function ofSetDisc(field,val){
  OF.draft.quoteItems=OF.draft.quoteItems||{};var items=OF.draft.quoteItems;var k=ofDiscItemKey();
  if(!k){k='order-discount';items[k]={orderDiscount:true,desc:'Discount',qty:1,disc:0,unit:0,discType:'rs',discValue:0,custom:false};}
  items[k][field]=val;
  ofMark();recomputeOrderDiscount();renderOverviewForm();
}
function buildQuoteSection(){
  recomputeOrderDiscount();
  var items = OF.draft.quoteItems || {};
  var keys = Object.keys(items);
  var order = ['engagement','wedding','homecoming','discount','goingAway','bridesmaids','flowerGirls','littleMaids'];
  // Top-level lines (not a package parent, not a package child) — sorted as before.
  var topKeys = keys.filter(function(k){return !items[k].isPackage && !items[k].parentKey;});
  topKeys.sort(function(a, b){
    var la = items[a].linkedTo, lb = items[b].linkedTo;
    var ia = la ? order.indexOf(la) : 999;
    var ib = lb ? order.indexOf(lb) : 999;
    if(ia !== -1 && ib !== -1)return ia - ib;
    if(ia === -1)return 1;
    if(ib === -1)return -1;
    return 0;
  });
  var rowsHtml = '';
  var subtotal = 0;
  topKeys.forEach(function(k){
    var it = items[k];
    if(it.orderDiscount)return; // order discount renders as its own control below
    subtotal += (it.qty||1) * (it.unit||0) * (1 - (it.disc||0)/100);
    rowsHtml += _qiRowHtml(k, it, false);
  });
  // Packages: parent header + indented priced sub-lines (package total = sum of sub-lines).
  keys.filter(function(k){return items[k].isPackage;}).forEach(function(pk){
    var p = items[pk];
    var pkgTot = 0; var childRows = '';
    keys.filter(function(ck){return items[ck].parentKey === pk;}).forEach(function(ck){
      var it = items[ck];
      var line = (it.qty||1) * (it.unit||0) * (1 - (it.disc||0)/100);
      subtotal += line; pkgTot += line;
      childRows += _qiRowHtml(ck, it, true);
    });
    rowsHtml += _qiPackageHtml(pk, p, childRows, pkgTot);
  });
  var addCustomBtn = '<div style="margin-top:6px">'
    +'<input type="text" id="qi-search" placeholder="Search a service, or type a custom name…" oninput="qiSearch(this.value)" onfocus="qiSearch(this.value)" style="width:100%;padding:9px 11px;font-size:13px;border:1.5px solid var(--border);border-radius:8px;box-sizing:border-box"/>'
    +'<div id="qi-results" style="margin-top:4px"></div>'
    +'<button class="btn btn-outline btn-sm" onclick="qiAddPackage()" style="margin-top:8px">+ Add package</button>'
    +'</div>';
  var discKey = ofDiscItemKey();
  var dItem = discKey ? items[discKey] : null;
  var dAmt = dItem ? Math.abs(cLine(dItem)) : 0;
  var dType = dItem ? (dItem.discType||'rs') : 'rs';
  var dVal = (dItem && dItem.discValue) ? dItem.discValue : '';
  var grand = subtotal - dAmt;
  var discBlock = '';
  var totalsHtml = '';
  if(keys.length > 0){
    var rsActive = (dType !== 'pct');
    var rsBg = rsActive?'var(--navy)':'#fff', rsCol = rsActive?'#fff':'var(--muted)';
    var pcBg = rsActive?'#fff':'var(--navy)', pcCol = rsActive?'var(--muted)':'#fff';
    discBlock = '<div style="margin-top:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px">'
      +'<div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px">Order Discount</div>'
      +'<div style="display:flex;gap:6px;align-items:center">'
      +'<div style="display:flex;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;flex-shrink:0">'
      +'<button type="button" onclick="ofSetDisc(\'discType\',\'rs\')" style="padding:7px 14px;font-size:13px;font-weight:700;border:none;background:'+rsBg+';color:'+rsCol+'">Rs</button>'
      +'<button type="button" onclick="ofSetDisc(\'discType\',\'pct\')" style="padding:7px 14px;font-size:13px;font-weight:700;border:none;background:'+pcBg+';color:'+pcCol+'">%</button>'
      +'</div>'
      +'<input type="text" inputmode="numeric" value="'+groupMoney(dVal)+'" placeholder="0" onchange="ofSetDisc(\'discValue\',parseMoney(this.value))" style="flex:1;min-width:0;padding:7px 9px;font-size:13px;text-align:right;border:1.5px solid var(--border);border-radius:6px"/>'
      +'</div></div>';
    var rows2 = '<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);padding:2px 0"><span>Subtotal</span><span>Rs '+Math.round(subtotal).toLocaleString()+'</span></div>';
    if(dAmt>0){
      rows2 += '<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--gold);font-weight:600;padding:2px 0"><span>Discount'+(dType==='pct'?' ('+dVal+'%)':'')+'</span><span>− Rs '+Math.round(dAmt).toLocaleString()+'</span></div>';
    }
    totalsHtml = '<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;margin-top:10px">'+rows2+'</div>'
      +'<div style="background:var(--navy);color:#fff;border-radius:10px;padding:12px 16px;margin-top:8px;display:flex;align-items:center;justify-content:space-between"><div style="font-size:11px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;opacity:.85">Total</div><div style="font-size:18px;font-weight:700">Rs '+Math.round(grand).toLocaleString()+'</div></div>';
  }
  var scheduleHtml = (keys.length > 0) ? _qiScheduleHtml(grand) : '';
  return rowsHtml + addCustomBtn + discBlock + totalsHtml + scheduleHtml;
}

function shouldShowQuoteSection(){
  // Gate: show only when stage >= 3 (Consultation Done) OR intent is 'quote'/'invoice'
  var stage = Number(OF.draft.stage || 0);
  var allowedByStage = stage >= 3 || OF.intent === 'quote' || OF.intent === 'invoice';
  if(!allowedByStage)return false;
  var events = OF.draft.events || {};
  return ['wedding','homecoming','goingAway','engagement'].some(function(k){
    var e = events[k];
    return e && e.enabled && e.date;
  });
}

function qiUpdate(key, field, val){
  ofMark();
  OF.draft.quoteItems = OF.draft.quoteItems || {};
  if(!OF.draft.quoteItems[key])return;
  OF.draft.quoteItems[key][field] = val;
  renderOverviewForm();
}

async function qiDelete(key){
  OF.draft.quoteItems = OF.draft.quoteItems || {};
  var it = OF.draft.quoteItems[key];
  if(!it)return;
  if(it.linkedTo){
    var labels = {
      wedding:'Wedding', homecoming:'Homecoming',
      discount:'Homecoming Package Discount', goingAway:'Going Away',
      engagement:'Engagement',
      bridesmaids:'Bridesmaids', flowerGirls:'Flower Girls', littleMaids:'Little Maids'
    };
    var label = labels[it.linkedTo] || it.linkedTo;
    var r = await showConfirm({
      title:'Remove linked line',
      msg:'This line is linked to '+label+'. Removing it will also untick that from the events. Continue?',
      yesText:'Remove',
      dangerous:true
    });
    if(!r.ok)return;
    OF.draft.events = OF.draft.events || {};
    var lt = it.linkedTo;
    if(lt==='wedding' && OF.draft.events.wedding)OF.draft.events.wedding.enabled = false;
    else if(lt==='homecoming' && OF.draft.events.homecoming)OF.draft.events.homecoming.enabled = false;
    else if(lt==='goingAway' && OF.draft.events.goingAway)OF.draft.events.goingAway.enabled = false;
    else if(lt==='engagement' && OF.draft.events.engagement)OF.draft.events.engagement.enabled = false;
    else if(lt==='bridesmaids' && OF.draft.events.wedding)OF.draft.events.wedding.bridesmaids = 0;
    else if(lt==='flowerGirls' && OF.draft.events.wedding)OF.draft.events.wedding.flowerGirls = 0;
    else if(lt==='littleMaids' && OF.draft.events.wedding)OF.draft.events.wedding.littleMaids = 0;
    // discount removal: just allow the user to remove without unticking
    ofMark();
    syncQuoteItems();
    renderOverviewForm();
  } else if(it.isPackage){
    var r = await showConfirm({title:'Remove package',msg:'Remove this package and all of its sub-lines?',yesText:'Remove',dangerous:true});
    if(!r.ok)return;
    Object.keys(OF.draft.quoteItems).forEach(function(ck){if(OF.draft.quoteItems[ck]&&OF.draft.quoteItems[ck].parentKey===key)delete OF.draft.quoteItems[ck];});
    delete OF.draft.quoteItems[key];
    ofMark();
    renderOverviewForm();
  } else {
    delete OF.draft.quoteItems[key];
    ofMark();
    renderOverviewForm();
  }
}

function qiSearch(qstr){
  var box=document.getElementById('qi-results');if(!box)return;
  var s=(qstr||'').toLowerCase().trim();
  var src=allSvcs();
  var f=s?src.filter(function(sv){return sv.d.toLowerCase().includes(s)||(sv.c||'').toLowerCase().includes(s);}):src;
  var h='';
  f.slice(0,40).forEach(function(sv){

      else if(dtype==='date')h+='<input type="date" value="'+escAttr(due.date||'')+'" onchange="ofScheduleUpd('+i+',\'date\',this.value)" style="flex:1;min-width:130px;font-size:13px;padding:6px 8px;border:1px solid var(--border);border-radius:6px"/>';

function ofScheduleCustomize(){
  var grand=ofScheduleGrand();
  var besp=parseFloat(gSet().defaultBespeaking)||50000;if(besp>grand)besp=Math.max(0,grand);
  var bal=Math.max(0,grand-besp);
  var off=parseInt(gSet().balanceDueDays,10);if(isNaN(off))off=14;
  OF.draft.quoteSchedule={mode:'custom',installments:[
    {id:_sid(),label:'Bespeaking fee',amount:besp,due:{type:'confirmation'}},
    {id:_sid(),label:'Balance',amount:bal,due:{type:'beforeWedding',days:off}}
  ]};
  ofMark();renderOverviewForm();
}
function ofScheduleReset(){OF.draft.quoteSchedule=null;ofMark();renderOverviewForm();}
function ofScheduleAdd(){
  OF.draft.quoteSchedule=OF.draft.quoteSchedule||{mode:'custom',installments:[]};
  OF.draft.quoteSchedule.installments.push({id:_sid(),label:'Installment',amount:0,due:{type:'confirmation'}});
  ofMark();renderOverviewForm();
}
function ofScheduleDel(i){
  var sch=OF.draft.quoteSchedule;if(!sch||!sch.installments)return;
  sch.installments.splice(i,1);
  if(!sch.installments.length)OF.draft.quoteSchedule=null;
  ofMark();renderOverviewForm();
}
function ofScheduleUpd(i,field,val){
  var sch=OF.draft.quoteSchedule;if(!sch||!sch.installments||!sch.installments[i])return;
  var it=sch.installments[i];
  if(field==='dueType'){it.due=it.due||{};it.due.type=val;if(val==='confirmation'){delete it.due.days;delete it.due.date;}else if(val==='beforeWedding'){delete it.due.date;if(it.due.days==null)it.due.days=0;}else if(val==='date'){delete it.due.days;}}
  else if(field==='days'){it.due=it.due||{type:'beforeWedding'};it.due.days=val;}
  else if(field==='date'){it.due=it.due||{type:'date'};it.due.date=val;}
  else it[field]=val;
  ofMark();renderOverviewForm();
}

function rFinance(){
  var allI=[];
  // Iterate brides once (canonical source)
  Object.values(brides).forEach(function(b){
    Object.values(b.invoices||{}).forEach(function(inv){
      allI.push(Object.assign({},inv,{cn:b.name||'',brideId:b.id}));
    });
  });
  allI.sort(function(a,b){return new Date(b.date)-new Date(a.date);}); // newest first
  var tInvoiced=allI.reduce(function(s,i){return s+invInvoiced(brides[i.brideId],i);},0);
  var tCollected=allI.reduce(function(s,i){return s+invCollected(brides[i.brideId],i);},0);
  var tBalance=allI.reduce(function(s,i){return s+invOutstanding(brides[i.brideId],i);},0);
  var collectionRate=tInvoiced>0?Math.round((tCollected/tInvoiced)*100):0;
  var cnt=allI.length;
  
  // Window for Monthly Revenue (3/6/12 months) - state persisted in window
  var monthWin = window._finMonthWin || 3;
  
  // === Build sections ===
  var html = '';
  
  // ── SECTION 1: Overview Card ──
  // 2 stat cards side-by-side (Invoiced + Collected), then Outstanding progress bar below
  if(cnt === 0){
    html += '<div class="card" style="padding:40px 24px;text-align:center;margin-bottom:14px">'
      +'<div style="font-family:Cinzel,serif;font-size:14px;color:var(--muted);letter-spacing:1px;margin-bottom:8px">FINANCIAL OVERVIEW</div>'
      +'<div style="font-size:13px;color:var(--text2);font-style:italic">No invoices yet</div>'
      +'</div>';
  } else {
    html += '<div class="card" style="padding:20px;margin-bottom:14px;background:linear-gradient(135deg,var(--surf) 0%,#FAF6EE 100%)">';
    html += '<div style="font-family:Cinzel,serif;font-size:11px;color:var(--muted);letter-spacing:1.2px;font-weight:600;margin-bottom:4px;text-transform:uppercase">Financial Overview</div>';
    html += '<div style="font-size:11px;color:var(--muted);margin-bottom:18px">'+cnt+' invoice'+(cnt!==1?'s':'')+'</div>';
    
    // Two stat cards side-by-side
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">';
    // Invoiced
    html += '<div style="background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:14px">'
      +'<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:6px">Invoiced</div>'
      +'<div style="font-family:Cinzel,serif;font-size:22px;color:var(--gold);font-weight:600;line-height:1.1">'+fRshort(tInvoiced)+'</div>'
      +'</div>';
    // Collected with dot strip
    var collDots = '';
    var dotsFilled = Math.round(collectionRate / 10); // 10 dots = 100%
    for(var i = 0; i < 10; i++){
      collDots += '<span style="width:6px;height:6px;border-radius:50%;background:'+(i<dotsFilled?'var(--success)':'var(--border)')+';display:inline-block"></span>';
    }
    html += '<div style="background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:14px">'
      +'<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:6px">Collected</div>'
      +'<div style="font-family:Cinzel,serif;font-size:22px;color:var(--success);font-weight:600;line-height:1.1;margin-bottom:8px">'+fRshort(tCollected)+'</div>'
      +'<div style="display:flex;gap:3px;align-items:center;justify-content:flex-start">'+collDots+' <span style="font-size:10px;color:var(--success);margin-left:4px;font-weight:600">'+collectionRate+'%</span></div>'
      +'</div>';
    html += '</div>'; // end grid
    
    // Outstanding progress bar (full width)
    var outstandingPct = tInvoiced > 0 ? Math.round((tBalance/tInvoiced)*100) : 0;
    var oColor = tBalance > 0 ? 'var(--warn)' : 'var(--success)';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
      +'<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600">Outstanding</div>'
      +'<div style="font-family:Cinzel,serif;font-size:14px;color:'+oColor+';font-weight:600">'+fRshort(tBalance)+(tBalance>0?' · '+outstandingPct+'%':'')+'</div>'
      +'</div>';
    html += '<div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden;position:relative">'
      +'<div style="height:100%;width:'+collectionRate+'%;background:var(--success);border-radius:3px"></div>'
      +'</div>';
    html += '</div>'; // end card
  }
  
  // ── SECTION 2: Monthly Revenue (sparkline chart + summary stats) ──
  // Build month buckets for the last N months
  var now = new Date();
  var monthKeys = [];
  for(var i = monthWin - 1; i >= 0; i--){
    var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    monthKeys.push(d.toISOString().slice(0,7));
  }
  var monthData = {};
  monthKeys.forEach(function(m){ monthData[m] = {invoiced:0, collected:0, count:0}; });
  allI.forEach(function(inv){
    if(!inv.date) return;
    var m = inv.date.slice(0,7);
    if(monthData[m]){
      monthData[m].invoiced += invInvoiced(brides[inv.brideId],inv);
      monthData[m].collected += invCollected(brides[inv.brideId],inv);
      monthData[m].count++;
    }
  });
  var maxMonthVal = Math.max.apply(null, monthKeys.map(function(m){return monthData[m].invoiced;}).concat([1]));
  var thisMonth = monthKeys[monthKeys.length-1];
  var lastMonth = monthKeys[monthKeys.length-2];
  var thisMonthRev = monthData[thisMonth] ? monthData[thisMonth].invoiced : 0;
  var lastMonthRev = (lastMonth && monthData[lastMonth]) ? monthData[lastMonth].invoiced : 0;
  var trendTxt = '', trendColor = 'var(--muted)';

  else if(thisMonthRev > lastMonthRev){ var pct = Math.round((thisMonthRev/lastMonthRev - 1)*100); trendTxt = '↗ +'+pct+'%'; trendColor = 'var(--success)'; }
  else if(thisMonthRev < lastMonthRev){ var pct2 = Math.round((1 - thisMonthRev/lastMonthRev)*100); trendTxt = '↘ -'+pct2+'%'; trendColor = 'var(--danger)'; }
  else { trendTxt = '— flat'; trendColor = 'var(--muted)'; }
  
  html += '<div class="card" style="padding:18px 20px;margin-bottom:14px">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  html += '<div style="font-family:Cinzel,serif;font-size:13px;color:var(--navy);letter-spacing:1px;font-weight:600">Monthly Revenue</div>';
  // Window selector
  html += '<div style="display:flex;gap:4px;background:var(--bg);border-radius:6px;padding:3px">';
  [3,6,12].forEach(function(w){
    var active = monthWin === w;
    html += '<button onclick="setFinMonthWin('+w+')" style="border:none;background:'+(active?'var(--surf)':'transparent')+';color:'+(active?'var(--navy)':'var(--muted)')+';font-size:10px;font-weight:600;padding:4px 8px;border-radius:4px;cursor:pointer;box-shadow:'+(active?'0 1px 2px rgba(27,43,75,0.08)':'none')+'">'+w+'M</button>';
  });
  html += '</div>';
  html += '</div>';

function aGetRange(){
  // Returns {from, to, preset, label}
  var a = window._analytics || {};
  if(!a.preset){
    a.preset = '90d';
    a.to = new Date().toISOString().slice(0,10);
    var fromD = new Date();
    fromD.setDate(fromD.getDate() - 90);
    a.from = fromD.toISOString().slice(0,10);
    window._analytics = a;
  }
  return a;
}

function aSetPreset(preset){
  var a = window._analytics || {};
  a.preset = preset;
  var toD = new Date();
  var fromD = new Date();
  if(preset === '7d')fromD.setDate(fromD.getDate() - 7);
  else if(preset === '30d')fromD.setDate(fromD.getDate() - 30);
  else if(preset === '90d')fromD.setDate(fromD.getDate() - 90);
  else if(preset === '6m')fromD.setMonth(fromD.getMonth() - 6);
  else if(preset === '12m')fromD.setMonth(fromD.getMonth() - 12);
  else if(preset === 'all'){
    // Find earliest createdAt across brides
    var earliest = new Date();
    Object.values(brides).forEach(function(b){
      if(b.createdAt){
        var bd = new Date(b.createdAt);
        if(bd < earliest)earliest = bd;
      }
    });
    fromD = earliest;
  }
  a.from = fromD.toISOString().slice(0,10);
  a.to = toD.toISOString().slice(0,10);
  window._analytics = a;
  rAnalytics();
}

function aSetCustomDate(field, val){
  var a = window._analytics || {};
  a[field] = val;
  a.preset = 'custom';
  window._analytics = a;
  rAnalytics();
}

function aInRange(dateStr, from, to){
  if(!dateStr)return false;
  var d = dateStr.slice(0,10);
  return d >= from && d <= to;
}

// MODULE 1: Lead Source Performance
function aLeadSourcePerf(from, to){
  var sources = {};

  Object.values(brides).forEach(function(b){
    if(!aInRange(b.createdAt, from, to))return;
    var src = b.source || 'unknown';
    if(!sources[src])sources[src] = {leads:0, booked:0, revenue:0};
    sources[src].leads += 1;
    if(b.confirmed){
      sources[src].booked += 1;
      Object.values(b.invoices||{}).forEach(function(inv){

    // Header: source name + revenue
    html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px">';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="font-size:14px;font-weight:700;color:var(--navy)">'+escHtml(r.label)+'</div>';
    html += '<div style="font-size:10px;color:var(--muted);margin-top:2px">'+leadShare+'% of all leads</div>';
    html += '</div>';
    html += '<div style="text-align:right;flex-shrink:0">';
    html += '<div style="font-family:Cinzel,serif;font-size:15px;color:var(--gold);font-weight:600">'+fRshort(r.revenue)+'</div>';

// MODULE 2: Conversion Funnel
function aConversionFunnel(from, to){
  // Count brides that REACHED each stage (stage >= n) within date range
  var stages = ['New Lead','Contacted','Consult Booked','Consult Done','Quoted','Confirmed'];
  var counts = [0,0,0,0,0,0];
  
  Object.values(brides).forEach(function(b){
    if(!aInRange(b.createdAt, from, to))return;
    var st = Number(b.stage||0);
    for(var i = 0; i <= st; i++)counts[i] += 1;
    if(b.confirmed)counts[5] = (counts[5]||0); // already covered if stage 5
  });
  
  var max = counts[0] || 1;
  if(max === 0){
    return '<div class="empty" style="padding:30px;text-align:center;color:var(--muted)">No leads in this period</div>';
  }
  
  var html = '<div style="padding:4px 0">';
  stages.forEach(function(label, i){
    var ct = counts[i];
    var pct = Math.round((ct/max)*100);
    var dropFromPrev = i > 0 && counts[i-1] > 0 ? Math.round((1 - ct/counts[i-1]) * 100) : null;
    var color = i === 5 ? 'var(--success)' : i >= 4 ? 'var(--gold)' : 'var(--navy)';
    html += '<div style="margin-bottom:12px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:baseline;font-size:12px;margin-bottom:5px">';
    html += '<span style="font-weight:600;color:var(--navy)">'+label+'</span>';
    html += '<span style="display:flex;align-items:baseline;gap:6px"><strong style="font-family:Cinzel,serif;font-size:14px;color:var(--navy)">'+ct+'</strong> <span style="color:var(--muted);font-weight:500;font-size:10px">'+pct+'%</span>';
    if(dropFromPrev !== null && dropFromPrev > 0){
      html += ' <span style="color:var(--danger);font-size:10px;font-weight:600">↓'+dropFromPrev+'%</span>';
    }
    html += '</span></div>';
    html += '<div style="background:var(--bg);height:18px;border-radius:5px;overflow:hidden;border:1px solid var(--border)">';
    html += '<div style="background:'+color+';height:100%;width:'+pct+'%;transition:width .3s;border-radius:5px"></div>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// MODULE 3: Revenue Trends (by month + by event type)
function aRevenueTrends(from, to){
  var byMonth = {};
  var byEventType = {wedding:0, homecoming:0, goingAway:0, engagement:0, other:0};
  var totalRev = 0;
  
  Object.values(brides).forEach(function(b){
    Object.values(b.invoices||{}).forEach(function(inv){
      if(!aInRange(inv.date, from, to))return;
      var tot = qTot(inv.items||{});
      totalRev += tot;
      var ym = (inv.date||'').slice(0,7); // YYYY-MM
      byMonth[ym] = (byMonth[ym]||0) + tot;
      // Distribute revenue across event types based on items
      var items = inv.items||{};
      Object.values(items).forEach(function(it){
        var lt = it.linkedTo;
        var lineVal = (it.qty||1) * (it.unit||0) * (1 - (it.disc||0)/100);
        if(lt === 'wedding' || lt === 'bridesmaids' || lt === 'flowerGirls' || lt === 'littleMaids')byEventType.wedding += lineVal;
        else if(lt === 'homecoming' || lt === 'discount')byEventType.homecoming += lineVal;
        else if(lt === 'goingAway')byEventType.goingAway += lineVal;
        else if(lt === 'engagement')byEventType.engagement += lineVal;
        else byEventType.other += lineVal;
      });
    });

  if(totalRev === 0){

    html += '<div style="font-size:9px;font-weight:700;color:var(--navy);white-space:nowrap">'+fRshort(rev)+'</div>';
    html += '<div style="flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center"><div style="background:var(--gold);width:70%;height:'+hPct+'%;border-radius:3px 3px 0 0;min-height:3px;transition:height .3s"></div></div>';
    html += '<div style="font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase">'+ymLabel+'</div>';
    html += '</div>';
  });
  html += '</div>';
  
  // By event type
  html += '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;letter-spacing:.8px;margin-bottom:10px">By Event Type</div>';
  var typeLabels = {wedding:'Wedding',homecoming:'Homecoming',goingAway:'Going Away',engagement:'Engagement',other:'Other'};
  var typeColors = {wedding:'#C9A961',homecoming:'#0A1F44',goingAway:'#6B46C1',engagement:'#B0506A',other:'#6B7280'};
  var typeMax = Math.max.apply(null, Object.values(byEventType)) || 1;
  Object.keys(byEventType).forEach(function(t){
    var v = byEventType[t];
    if(v <= 0)return;
    var pct = Math.round((v/typeMax)*100);

    html += '<div style="background:var(--bg);height:10px;border-radius:5px;overflow:hidden"><div style="background:'+typeColors[t]+';height:100%;width:'+pct+'%;border-radius:5px;transition:width .3s"></div></div>';
    html += '</div>';
  });
  
  // Total — compact gradient card
  html += '<div style="background:linear-gradient(135deg,var(--navy) 0%,var(--navy-lt) 100%);color:#fff;border-radius:10px;padding:14px 16px;margin-top:18px;display:flex;align-items:center;justify-content:space-between;gap:10px">';
  html += '<div style="font-family:Cinzel,serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:.9">Total Revenue</div>';

// MODULE 4: Time-in-Stage Analysis
function aTimeInStage(from, to){
  // For each bride, compute time spent in each stage by analyzing _history
  // Simplification: use createdAt -> lastActivity as proxy when history is incomplete
  var stages = ['New Lead','Contacted','Consult Booked','Consult Done','Quoted'];
  var stageTimes = [[],[],[],[],[]]; // days spent in each stage
  var stagedCount = [0,0,0,0,0];
  
  Object.values(brides).forEach(function(b){
    if(!aInRange(b.createdAt, from, to))return;
    var hist = b._history || {};
    var historyEntries = Object.values(hist).sort(function(a,b){return new Date(a.at) - new Date(b.at);});
    var created = new Date(b.createdAt);
    var stageEntered = {0: created};
    
    historyEntries.forEach(function(h){
      if(h.details && typeof h.details.stage === 'number'){
        stageEntered[h.details.stage] = new Date(h.at);
      }
    });
    
    var curStage = Number(b.stage||0);
    // Time in each stage that bride PASSED THROUGH
    for(var s = 0; s < Math.min(curStage, 5); s++){
      var entry = stageEntered[s];
      var nextEntry = stageEntered[s+1];
      if(entry && nextEntry){
        var days = (nextEntry - entry) / 86400000;
        if(days >= 0)stageTimes[s].push(days);
      }
    }
    // Current stage if not Confirmed: time from entering to now
    if(curStage < 5 && stageEntered[curStage]){
      var nowDays = (new Date() - stageEntered[curStage]) / 86400000;
      stagedCount[curStage] = (stagedCount[curStage]||0) + 1;
    }
  });
  
  var hasData = stageTimes.some(function(arr){return arr.length > 0;});
  if(!hasData){
    return '<div class="empty" style="padding:30px;text-align:center;color:var(--muted)">Not enough stage transition history yet. This module will populate as leads progress through stages.</div>';
  }
  
  var html = '<div style="padding:4px 0">';
  stages.forEach(function(label, i){
    var times = stageTimes[i];
    var avg = times.length > 0 ? times.reduce(function(a,b){return a+b;},0) / times.length : 0;
    var stuck = stagedCount[i] || 0;
    var color = avg < 3 ? 'var(--success)' : avg < 7 ? 'var(--gold)' : 'var(--danger)';
    var mb = i < stages.length-1 ? 'margin-bottom:8px' : '';
    
    html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;'+mb+'">';
    
    // Left: label + meta
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="font-size:13px;font-weight:600;color:var(--navy)">'+label+'</div>';
    if(stuck > 0){
      html += '<span style="background:rgba(229,62,62,0.1);color:var(--danger);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px">'+stuck+' STUCK</span>';
    }
    html += '</div>';
    if(times.length > 0){
      html += '<div style="font-size:10px;color:var(--muted)">Based on '+times.length+' transition'+(times.length===1?'':'s')+'</div>';
    } else {
      html += '<div style="font-size:10px;color:var(--muted)">No data yet</div>';
    }
    html += '</div>';
    
    // Right: big avg number
    html += '<div style="text-align:right;flex-shrink:0">';
    if(times.length > 0){
      html += '<div style="font-family:Cinzel,serif;font-size:20px;font-weight:600;color:'+color+';line-height:1">'+avg.toFixed(1)+'</div>';
      html += '<div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-top:2px">days avg</div>';
    } else {
      html += '<div style="font-size:14px;color:var(--muted)">—</div>';
    }
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function rAnalytics(){
  var r = aGetRange();
  var presets = [
    {id:'7d',lbl:'7D'},
    {id:'30d',lbl:'30D'},
    {id:'90d',lbl:'90D'},
    {id:'6m',lbl:'6M'},
    {id:'12m',lbl:'12M'},
    {id:'all',lbl:'All'}
  ];
  var presetBtns = presets.map(function(p){
    var active = r.preset === p.id;
    return '<button onclick="aSetPreset(\''+p.id+'\')" style="background:'+(active?'var(--navy)':'transparent')+';color:'+(active?'#fff':'var(--text2)')+';border:none;border-radius:6px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.3px">'+p.lbl+'</button>';
  }).join('');
  
  var html = '';

async function backfillLeads(){
  var _cr = await showConfirm({title:'Backfill & repair leads',msg:'Create or repair lead records for customers with quotes/invoices.',yesText:'Run'});if(!_cr.ok)return;
  var created=0,repaired=0,skipped=0;
  try{
    var allCusts=cA();
    for(var i=0;i<allCusts.length;i++){
      var c=allCusts[i];
      var hasQuotes=Object.keys(c.quotes||{}).length>0;
      var hasInvoices=Object.keys(c.invoices||{}).length>0;
      if(!hasQuotes&&!hasInvoices){skipped++;continue;}
      var existingLead=lA().find(function(l){return l.phone&&c.phone&&l.phone===c.phone;});
      // Compute expected state
      var hasConvertedQuote=Object.values(c.quotes||{}).some(function(qt){return qt.convertedToInvoice;});
      var isConfirmed=hasInvoices||hasConvertedQuote;
      var totals=0;
      Object.values(c.invoices||{}).forEach(function(inv){totals+=qTot(inv.items);});
      var advances=0;
      Object.values(c.invoices||{}).forEach(function(inv){
        advances+=(inv.advance||0);
        Object.values(inv.payments||{}).forEach(function(p){advances+=(parseFloat(p.amount)||0);});
      });
      if(existingLead){
        // Repair the existing lead's stage/confirmed/payment state
        var repair={};
        if(existingLead.confirmed!==isConfirmed)repair.confirmed=isConfirmed;
        if(Number(existingLead.stage||0)!==(isConfirmed?5:4))repair.stage=isConfirmed?5:4;
        if((existingLead.advance||0)!==advances)repair.advance=advances;
        if((existingLead.balance||0)!==Math.max(0,totals-advances))repair.balance=Math.max(0,totals-advances);
        // Sync quotes/invoices references onto the lead so it shows in detail view
        if(hasQuotes&&!existingLead.quotations)repair.quotations=c.quotes||{};
        if(hasInvoices&&!existingLead.invoices)repair.invoices=c.invoices||{};
        if(Object.keys(repair).length>0){
          await fbP('/leads/'+existingLead.id,repair);
          Object.assign(existingLead,repair);
          repaired++;
        } else {
          skipped++;
        }
        continue;
      }
      var nid=uid();
      // hasConvertedQuote, isConfirmed, totals, advances already computed above
      var nl={
        id:nid,name:c.name,phone:c.phone||'',email:c.email||'',
        source:'walk-in',stage:isConfirmed?5:4,
        weddingDate:c.weddingDate||'',package:'Custom',
        notes:'Backfilled from customer profile',
        bridesmaids:c.bridesmaids||0,
        createdAt:c.createdAt||new Date().toISOString(),
        confirmed:isConfirmed,
        advance:advances,balance:Math.max(0,totals-advances),
        venue:c.venue||'',
        appointments:{},
        quotations:c.quotes||{},
        invoices:c.invoices||{}
      };
      await fbS('/leads/'+nid,nl);
      leads[nid]=nl;
      created++;
    }
    notif('Done: '+created+' created, '+repaired+' repaired, '+skipped+' skipped.');
    render();
  }catch(e){notif('Error: '+e.message);}
}

function _briefLastVisit(){
  var v = localStorage.getItem('biso_lastBriefVisit');
  if(!v) return null;
  try { var d = new Date(v); return isNaN(d.getTime()) ? null : d; } catch(e){ return null; }
}

function _humanAgo(date){
  if(!date) return '';
  var hrs = (Date.now() - date.getTime()) / 3600000;
  if(hrs < 1) return Math.round(hrs * 60) + ' min ago';
  if(hrs < 24) return Math.round(hrs) + 'h ago';
  var days = Math.round(hrs / 24);
  if(days < 7) return days + (days===1?' day ago':' days ago');
  return fmt(date.toISOString());
}

// Section 2: weddings in next 7 days (confirmed brides only)
function _briefWeddings(){
  var weddings = [];
  Object.values(brides).forEach(function(b){
    if(!b.confirmed || b.cancelled || b.lost) return;
    if(!b.weddingDate) return;
    var d = dU(b.weddingDate);
    if(d === null || d < 0 || d > 7) return;
    // Compute balance using shared invPaid helper
    var totalDue = 0, totalPaid = 0;
    Object.values(b.invoices||{}).forEach(function(inv){
      totalDue += qTot(inv.items);
      totalPaid += invPaid(inv);
    });
    var balance = totalDue - totalPaid;
    // Find final trial
    var trials = Object.values(b.appointments||{}).filter(function(a){
      return (a.reason==='Final Trial' || a.reason==='Trial') && !a.cancelled;
    });
    var finalTrial = null;
    if(trials.length > 0){
      // Prefer 'Final Trial' if exists, else latest 'Trial'
      var ft = trials.filter(function(a){return a.reason==='Final Trial';});
      if(ft.length > 0){
        ft.sort(function(a,b){return new Date(b.date) - new Date(a.date);});
        finalTrial = ft[0];
      }
    }
    var ev = b.events || {};
    var theme = (ev.wedding && ev.wedding.theme) || '';
    var bmCount = (ev.wedding && ev.wedding.bridesmaids) || 0;
    weddings.push({
      id:b.id, name:b.name||'(no name)',
      weddingDate:b.weddingDate, daysAway:d,
      balance:balance, paidInFull:balance<=0 && totalDue>0,
      finalTrial:finalTrial, finalTrialMissing:!finalTrial,
      theme:theme, bmCount:bmCount
    });
  });
  weddings.sort(function(a,b){return a.daysAway - b.daysAway;});
  return weddings;
}

// Section 3: all upcoming appointments in next 7 days
function _briefAppointments(){
  var now = new Date(); now.setHours(0,0,0,0);
  var weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate()+7);
  var weekEndStr = weekEnd.toISOString().slice(0,10);
  var todayStr = now.toISOString().slice(0,10);
  var appts = [];
  Object.values(brides).forEach(function(b){
    if(b.lost || b.cancelled) return;
    Object.values(b.appointments||{}).forEach(function(a){
      if(a.cancelled || a.done) return;
      if(!a.date) return;
      var d = a.date.slice(0,10);
      if(d >= todayStr && d < weekEndStr){
        appts.push({
          brideId:b.id, brideName:b.name||'(no name)',
          date:a.date, time:a.time||'',
          reason:a.reason||'Appointment'
        });
      }
    });
  });
  appts.sort(function(a,b){
    var da = a.date+'T'+(a.time||'00:00');
    var db = b.date+'T'+(b.time||'00:00');
    return da < db ? -1 : da > db ? 1 : 0;
  });
  return appts;
}

// Section 4: activity since last visit
function _briefSinceLastVisit(){
  var lastVisit = _briefLastVisit();
  // If never visited: show last 24h
  var since = lastVisit || new Date(Date.now() - 24*3600000);
  var sinceMs = since.getTime();
  var groups = {
    newLeads:[], consultations:[], quotes:[], payments:[],
    confirmations:[], lost:[], cancellations:[]
  };
  Object.values(brides).forEach(function(b){
    // New leads (createdAt within window)
    if(b.createdAt && new Date(b.createdAt).getTime() >= sinceMs){
      groups.newLeads.push({id:b.id, name:b.name||'(no name)', source:b.source||'', at:b.createdAt});
    }
    // Parse _history for events
    var hist = b._history || {};
    Object.values(hist).forEach(function(h){
      if(!h.at || new Date(h.at).getTime() < sinceMs) return;
      var action = h.action || '';
      if(action === 'contact-attempt' && h.details && h.details.outcome === 'consult_booked'){
        // Already handled separately below as appt-add for Consultation
      } else if(action === 'appt-done' && h.details && h.details.reason === 'Consultation'){
        groups.consultations.push({id:b.id, name:b.name, at:h.at});
      } else if(action === 'created' || action === 'updated'){
        // Skip - too noisy
      } else if(action === 'cancel-booking'){
        groups.cancellations.push({id:b.id, name:b.name, at:h.at, reason:h.details && h.details.reason});
      } else if(action === 'auto-lost' || (action === 'contact-attempt' && h.details && h.details.outcome === 'not_interested')){
        groups.lost.push({id:b.id, name:b.name, at:h.at, reason: h.details && (h.details.reason || h.details.outcome)});
      }
    });
    // Quotes created in window
    Object.values(b.quotes||{}).forEach(function(qt){
      if(qt.date){
        // qt.date is YYYY-MM-DD, not iso datetime — only show if today or future
        // Better: use _history for quote events. Skipping for now to avoid noise.
      }
    });
    // Payments received in window
    Object.values(b.invoices||{}).forEach(function(inv){
      Object.values(inv.payments||{}).forEach(function(p){
        if(p.createdAt && new Date(p.createdAt).getTime() >= sinceMs){
          groups.payments.push({id:b.id, name:b.name, amount:parseFloat(p.amount)||0, at:p.createdAt});
        }
      });
      // Confirmed = invoice exists with createdAt? Use _history for confirmations
    });
    // Confirmed brides: check stage-change history
    Object.values(hist).forEach(function(h){
      if(!h.at || new Date(h.at).getTime() < sinceMs) return;
      if(h.action === 'stage-change' && h.details && (h.details.to === 5 || h.details.stage === 5)){
        groups.confirmations.push({id:b.id, name:b.name, at:h.at});
      }
    });
  });
  return {groups:groups, since:since};
}

// Section 5: soft warnings — things that need attention this week but not today
function _briefNeedsAttention(){
  var warnings = [];
  Object.values(brides).forEach(function(b){
    if(b.lost || b.cancelled) return;
    // 1. Active leads with no next reminder scheduled (and not at end of pipeline)
    if(!b.confirmed && !b.remindersStopped && !b.nextReminderAt){
      var s = Number(b.stage||0);
      // Only care about stage 0-2 (early pipeline) - later stages have other workflows
      if(s <= 2){
        var atts = Object.values(b.contactAttempts||{});
        if(atts.length > 0){
          warnings.push({type:'no_reminder', id:b.id, name:b.name||'(no name)', text:'No follow-up scheduled'});
        }
      }
    }
    // 2. Confirmed brides with wedding in 7-21 days but no Final Trial booked
    if(b.confirmed && !b.cancelled && b.weddingDate){
      var d = dU(b.weddingDate);
      if(d !== null && d >= 7 && d <= 21){
        var hasFinalTrial = Object.values(b.appointments||{}).some(function(a){
          return a.reason === 'Final Trial' && !a.cancelled;
        });
        if(!hasFinalTrial){
          warnings.push({type:'no_final_trial', id:b.id, name:b.name||'(no name)', text:'Final trial not booked · wedding in '+d+'d'});
        }
      }
    }
    // 3. Quotes expiring soon (within 7 days) and not yet converted
    Object.values(b.quotes||{}).forEach(function(qt){
      if(qt.convertedToInvoice) return;
      if(!qt.expiry) return;
      var dE = dU(qt.expiry);
      if(dE !== null && dE >= 0 && dE <= 7){
        warnings.push({type:'quote_expiring', id:b.id, name:b.name||'(no name)', text:'Quote '+qt.id+' expires in '+dE+'d'});
      }
    });
    // 4. No-show appointments — need next-step decision
    Object.values(b.appointments||{}).forEach(function(a){
      if(!a.noShow || a.cancelled || a.done || a.rescheduled) return;
      var daysAgo = a.date ? Math.abs(dU(a.date) || 0) : 0;
      warnings.push({type:'noshow', id:b.id, name:b.name||'(no name)', text:'Missed '+(a.reason||'appointment')+' '+daysAgo+'d ago — decide next step'});
    });
  });
  return warnings;
}

  var fEnq = searching ? enquiries.filter(function(b){return _briefMatchesQ(b.name);}) : enquiries;
  if(fEnq.length > 0 && (f==='all'||f==='leads')) body += renderNewEnquiries(fEnq);

  if(pendingReqs.length > 0 && !searching && f==='all') body += renderApprovalRequests(pendingReqs);

  // --- Today's actions (filters internally on q; returns '' when nothing matches) ---
  var actionsHtml = renderTodaysActions(actions, f);

  // --- This week's weddings ---
  var fWed = searching ? weddings.filter(function(w){return _briefMatchesQ(w.name);}) : weddings;

    body += _briefSection('This week’s appointments', {count:fAppt.length}, _briefList(apptRows));

  // --- Since last visit (demoted metrics — compact activity digest) ---
  var g = sinceData.groups;
  function _sf(arr){ return searching ? arr.filter(function(x){return _briefMatchesQ(x.name);}) : arr; }
  var nl=_sf(g.newLeads), cs=_sf(g.consultations), pm=_sf(g.payments), cf=_sf(g.confirmations), ls=_sf(g.lost), cn=_sf(g.cancellations);
  var totalActivity = nl.length + cs.length + pm.length + cf.length + ls.length + cn.length;
  if(f==='all' && (!searching || totalActivity > 0)){

    var DL = '<div style="font-size:12.5px;color:var(--text2);padding:2px 0">', DLE = '</div>';
    var lines = [];
    if(nl.length){ var sources = nl.map(function(l){return l.source||'?';}).join(', '); lines.push(DL+'<strong style="color:var(--navy);font-weight:600">'+nl.length+'</strong> new lead'+(nl.length!==1?'s':'')+' <span style="color:var(--muted)">('+escHtml(sources)+')</span>'+DLE); }
    if(cs.length) lines.push(DL+'<strong style="color:var(--navy);font-weight:600">'+cs.length+'</strong> consultation'+(cs.length!==1?'s':'')+' completed'+DLE);
    if(pm.length){ var totalPay = pm.reduce(function(s,p){return s+p.amount;},0); lines.push(DL+'<strong style="color:var(--success);font-weight:600">'+pm.length+'</strong> payment'+(pm.length!==1?'s':'')+' received <span style="color:var(--muted)">('+fR(totalPay)+')</span>'+DLE); }
    if(cf.length) lines.push(DL+'<strong style="color:var(--navy);font-weight:600">'+cf.length+'</strong> booking'+(cf.length!==1?'s':'')+' confirmed'+DLE);
    if(ls.length) lines.push(DL+'<strong style="color:var(--text2);font-weight:600">'+ls.length+'</strong> lead'+(ls.length!==1?'s':'')+' closed-lost'+DLE);
    if(cn.length) lines.push(DL+'<strong style="color:var(--text2);font-weight:600">'+cn.length+'</strong> booking'+(cn.length!==1?'s':'')+' cancelled'+DLE);
    var digestBody = totalActivity > 0
      ? '<div style="padding:2px 2px">'+lines.join('')+'</div>'
      : _briefEmpty('No new activity');
    body += _briefSection('Since last visit', {meta:sinceLabel}, digestBody);
  }

  // --- Needs attention (amber, soft warnings) ---
  var fWarn = searching ? warnings.filter(function(w){return _briefMatchesQ(w.name);}) : warnings;
  if(fWarn.length > 0 && (f==='all'||f==='leads')){
