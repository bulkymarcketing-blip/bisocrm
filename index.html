// Phone normalization: takes any input, returns WhatsApp format (digits only, with country code).
// Default country code is +94 (Sri Lanka) if no country code detected.
function normPhone(raw,defaultCC){
  if(!raw)return '';
  defaultCC=defaultCC||'94';
  var digits=String(raw).replace(/\D/g,'');
  if(!digits)return '';
  // Already has country code (starts with non-zero, length 10+)
  if(digits.length>=11&&digits[0]!=='0')return digits;
  // Starts with 0 - strip and prepend default CC
  if(digits[0]==='0')return defaultCC+digits.slice(1);
  // 9 digits without 0 - prepend default CC
  if(digits.length===9)return defaultCC+digits;
  return digits;
}
function fmtPhone(p){
  if(!p)return '';
  // Show as +94 77 123 4567
  var s=String(p).replace(/\D/g,'');
  if(s.length>=11&&s.slice(0,2)==='94')return '+94 '+s.slice(2,4)+' '+s.slice(4,7)+' '+s.slice(7);
  return '+'+s;
}

// Brides storage - canonical
var brides={};

// Migrate leads+customers into brides keyed by normalized phone
function migrateToBrides(leadsObj,custsObj){
  var out={};
  var byPhone={};
  // Process customers first (they often have more info)
  Object.values(custsObj||{}).forEach(function(c){
    var ph=normPhone(c.phone);
    if(!ph)ph='_nocust_'+c.id;
    var b=out[ph]||{};
    Object.assign(b,{
      id:b.id||c.id,
      name:b.name||c.name,
      phone:ph,
      email:b.email||c.email||'',
      weddingDate:b.weddingDate||c.weddingDate||'',
      venue:b.venue||c.venue||'',
      bridesmaids:b.bridesmaids||c.bridesmaids||0,
      notes:b.notes||c.notes||'',
      anniversary:b.anniversary||c.anniversary||'',
      createdAt:b.createdAt||c.createdAt||new Date().toISOString(),
      quotes:Object.assign({},c.quotes||{},b.quotes||{}),
      invoices:Object.assign({},c.invoices||{},b.invoices||{}),
      _customerId:c.id
    });
    out[ph]=b;
    byPhone[ph]=b;
  });
  // Process leads - merge into existing by phone OR add new
  Object.values(leadsObj||{}).forEach(function(l){
    var ph=normPhone(l.phone)||('_nolead_'+l.id);
    var b=out[ph];
    if(!b){
      b={
        id:l.id,
        phone:ph,
        createdAt:l.createdAt||new Date().toISOString(),
        quotes:{},invoices:{}
      };
      out[ph]=b;
    }
    // Merge lead fields - lead takes priority on stage/pipeline fields
    b.id=b.id||l.id;
    b.name=l.name||b.name;
    b.email=l.email||b.email||'';
    b.source=l.source||b.source||'whatsapp';
    b.stage=Number(l.stage||0);
    b.confirmed=!!l.confirmed;
    b.cancelled=!!l.cancelled;
    b.cancelledAt=l.cancelledAt||b.cancelledAt||'';
    b.cancelReason=l.cancelReason||b.cancelReason||'';
    b.refundAmount=l.refundAmount||b.refundAmount||0;
    b.weddingDate=l.weddingDate||b.weddingDate||'';
    b.venue=l.venue||b.venue||'';
    b.bridesmaids=l.bridesmaids||b.bridesmaids||0;
    b.notes=l.notes||b.notes||'';
    b.advance=l.advance||b.advance||0;
    b.balance=l.balance||b.balance||0;
    b.events=l.events||b.events||{};
    b.appointments=Object.assign({},b.appointments||{},l.appointments||{});
    b.quotations=Object.assign({},l.quotations||{});
    // Merge quotes/invoices from lead too
    b.quotes=Object.assign({},b.quotes||{},l.quotations||{});
    b.invoices=Object.assign({},b.invoices||{},l.invoices||{});
    b.notesLog=Object.assign({},b.notesLog||{},l.notesLog||{});
    b.documents=Object.assign({},b.documents||{},l.documents||{});
    b._history=Object.assign({},b._history||{},l._history||{});
    b.lastActivity=l.lastActivity||b.lastActivity||l.createdAt;
    b._leadId=l.id;
  });
  // Ensure defaults
  Object.values(out).forEach(function(b){
    if(!b.id)b.id='bride-'+Math.random().toString(36).slice(2,10);
    if(b.confirmed===undefined)b.confirmed=false;
    if(b.cancelled===undefined)b.cancelled=false;
    if(b.stage===undefined)b.stage=0;
    if(!b.events)b.events={};
    if(!b.quotes)b.quotes={};
    if(!b.invoices)b.invoices={};
    if(!b.appointments)b.appointments={};
    if(!b.notesLog)b.notesLog={};
    if(!b.documents)b.documents={};
  });
  return out;
}

function currentRole(){

  return 'owner';

// Load role from /roles/<uid> after auth succeeds. Roles are seeded manually in
// Firebase Console (Phase 1C). A user with no role record defaults to manager.
async function loadRole(){
  if(!window._auth||!window._auth.enabled||!window._auth.user){
    window._auth&&(window._auth.role='owner');
    window._auth&&(window._auth.roleResolved=true);
    return;
  }
  var uid=window._auth.user.uid;
  console.log('[role] loadRole start for uid:',uid);
  try{
    var existing=await fbG('/roles/'+uid);
    console.log('[role] existing role record:',existing);
    if(existing&&typeof existing==='string'){
      window._auth.role=existing==='owner'?'owner':'manager';
      window._auth.name='';
      window._auth.roleResolved=true;
      console.log('[role] resolved to:',window._auth.role,'(legacy string)');
      return;
    }
    if(existing&&existing.role){
      window._auth.role=existing.role==='owner'?'owner':'manager';
      window._auth.name=existing.name||'';
      window._auth.roleResolved=true;
      console.log('[role] resolved to:',window._auth.role);
      return;
    }
    // Phase 1C: no auto-bootstrap. Roles are seeded manually in Firebase Console.
    // A logged-in user with no role record defaults to manager (operational access only).
    // This is a CONFIRMED read (record genuinely absent), so it counts as resolved.
    window._auth.role='manager';
    window._auth.name='';
    window._auth.roleResolved=true;
    console.log('[role] No role record for uid, defaulting to manager:',window._auth.user.email);
  }catch(e){
    // On error we DON'T know the role. Use manager for safe gating but leave
    // roleResolved=false so startAfterAuth retries instead of locking it in.
    console.error('[role] loadRole failed (will retry):',e.message);
    window._auth.role='manager';
    window._auth.name='';
    window._auth.roleResolved=false;
    throw e; // propagate so startAfterAuth knows it failed
  }
}

// Execute the action for an approved request. Each type has its own executor.
async function executeRequest(req){
  if(!req||!req.type)throw new Error('Invalid request');
  if(req.type==='delete_bride'){
    // Target path is /brides/<id> (or legacy /leads/<id>)
    var id=req.targetPath.split('/').pop();
    await fbD('/brides/'+id);
    if(typeof leads!=='undefined'&&leads[id])delete leads[id];
    if(typeof custs!=='undefined'&&custs[id])delete custs[id];
    if(typeof brides!=='undefined'&&brides[id])delete brides[id];
    return;
  }
  if(req.type==='delete_payment'){
    // payload: {sId, iId, pid, src, amount, leadAdvanceBefore, leadBalanceBefore}
    var p=req.payload||{};
    var path=p.src==='lead'?'/leads/'+p.sId+'/invoices/'+p.iId+'/payments/'+p.pid:'/customers/'+p.sId+'/invoices/'+p.iId+'/payments/'+p.pid;
    await fbD(path);
    var obj=p.src==='lead'?leads[p.sId]:custs[p.sId];
    if(obj&&obj.invoices&&obj.invoices[p.iId]&&obj.invoices[p.iId].payments){
      delete obj.invoices[p.iId].payments[p.pid];
    }
    if(p.src==='lead'&&leads[p.sId]){
      var amt=p.amount||0;
      var newAdv=Math.max(0,(leads[p.sId].advance||0)-amt);
      var newBal=(leads[p.sId].balance||0)+amt;
      await fbP('/leads/'+p.sId,{advance:newAdv,balance:newBal});
      leads[p.sId].advance=newAdv;leads[p.sId].balance=newBal;
    }
    return;
  }
  if(req.type==='refund'){
    // payload: {leadId, refund, reason}
    var p2=req.payload||{};
    var lid=p2.leadId;var refund=p2.refund||0;var reason=p2.reason||'';
    var l=leads[lid];if(!l)throw new Error('Bride not found');
    var maxR=netHeld(l);
    if(refund>maxR){throw new Error('Refund '+fR(refund)+' now exceeds amount held ('+fR(maxR)+'). Reject and re-request.');}
    var now=new Date().toISOString();
    var patch={cancelled:true,cancelledAt:now,cancelReason:reason,refundAmount:refund};
    var firstInv=Object.values(l.invoices||{})[0];
    if(refund>0&&firstInv){
      var pid='p-'+uid();
      var pay={id:pid,amount:-refund,date:now.slice(0,10),method:'Refund',note:'Cancellation refund: '+reason,createdAt:now};
      var pp={};pp[pid]=pay;
      await fbP('/leads/'+lid+'/invoices/'+firstInv.id+'/payments',pp);
      l.invoices[firstInv.id].payments=l.invoices[firstInv.id].payments||{};
      l.invoices[firstInv.id].payments[pid]=pay;
      patch.advance=Math.max(0,(l.advance||0)-refund);
      patch.balance=(l.balance||0)+refund;
    }
    await fbP('/leads/'+lid,patch);
    Object.assign(l,patch);
    if(typeof logHistory==='function')await logHistory(lid,'cancel-booking',{reason:reason,refund:refund});
    return;
  }
  throw new Error('Unknown request type: '+req.type);
}

// Friendly description of a request, used in UI
function describeRequest(req){
  if(!req)return '';
  if(req.type==='delete_bride'){
    var bid=(req.targetPath||'').split('/').pop();
    var br=(typeof brides!=='undefined'?brides[bid]:null)||(typeof leads!=='undefined'?leads[bid]:null)||(typeof custs!=='undefined'?custs[bid]:null)||(req.snapshot||{});
    var nm=(br&&br.name)||(req.snapshot&&req.snapshot.name)||'(unknown)';
    return 'Delete bride: '+nm;
  }
  if(req.type==='delete_payment'){
    var p=req.payload||{};
    var amt=p.amount||0;
    var isRefund=amt<0;
    return (isRefund?'Delete refund of ':'Delete payment of ')+fR(Math.abs(amt))+' on invoice';
  }
  if(req.type==='refund'){
    var p2=req.payload||{};
    var l=leads[p2.leadId]||{};
    return 'Cancel booking + refund '+fR(p2.refund||0)+' for '+(l.name||'(unknown)');
  }
  return req.type;
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmt(s){if(!s)return '—';return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function fR(n){return 'Rs '+Number(n||0).toLocaleString();}
function parseMoney(v){var n=parseFloat(String(v==null?'':v).replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n;}
function groupMoney(v){if(v===''||v==null)return '';var n=parseMoney(v);if(!isFinite(n))return '';var neg=n<0;n=Math.abs(n);var p=String(n).split('.');p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');return (neg?'-':'')+p.join('.');}
function onMoneyBlur(el){if(el)el.value=groupMoney(el.value);}
function dU(s){if(!s)return null;var t=new Date(s);t.setHours(0,0,0,0);var n=new Date();n.setHours(0,0,0,0);return Math.round((t-n)/86400000);}
function dS(s){if(!s)return 0;var t=new Date(s);t.setHours(0,0,0,0);var n=new Date();n.setHours(0,0,0,0);return Math.round((n-t)/86400000);}
function qTot(items){return Object.values(items||{}).reduce(function(s,it){return s+cLine(it);},0);}
function cLine(it){return(it.qty||1)*(it.unit||0)*(1-(it.disc||0)/100);}
// invPaid: TRUE amount paid on an invoice = bespeaking advance + sum of all payments
// Use this everywhere Finance/Analytics/dashboards report "Collected" or compute "Balance Due".
function invPaid(inv){
  if(!inv)return 0;
  var adv=parseFloat(inv.advance||0)||0;
  var pays=Object.values(inv.payments||{}).reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);
  return adv+pays;
}
// Net amount still held for a bride across all invoices = sum of invPaid (refunds already
// netted out, since refunds are stored as negative payments). This is the max refundable.
function netHeld(l){
  if(!l)return 0;
  return Object.values(l.invoices||{}).reduce(function(s,inv){return s+invPaid(inv);},0);
}
// CANCELLED-AWARE financial figures for one invoice belonging to a given bride.
// Rule (agreed): a cancelled booking counts as exactly what was retained (netHeld) for BOTH
// invoiced and collected, and ZERO outstanding. Covers full-refund (=0) and partial/none (=kept).
// A live (non-cancelled) booking behaves normally.
function invInvoiced(b,inv){
  if(b&&b.cancelled)return Math.max(0,invPaid(inv)); // retained amount only
  return qTot(inv.items);
}
function invCollected(b,inv){
  if(b&&b.cancelled)return Math.max(0,invPaid(inv));
  return invPaid(inv);
}
function invOutstanding(b,inv){
  if(b&&b.cancelled)return 0; // cancelled bookings owe nothing
  return Math.max(0,qTot(inv.items)-invPaid(inv));
}
// P0-2: bride-level rollups across all invoices (cancelled-aware). Resolve the canonical
// bride via brides[] so a lead/customer projection (or a raw bride) all yield correct
// cancelled-aware figures. These REPLACE the denormalized b.advance/b.balance for DISPLAY.
function _canon(o){return (o&&o.id&&brides[o.id])?brides[o.id]:o;}
function brideTotal(o){var b=_canon(o);return Object.values((b&&b.invoices)||{}).reduce(function(s,inv){return s+invInvoiced(b,inv);},0);}
function brideCollected(o){var b=_canon(o);return Object.values((b&&b.invoices)||{}).reduce(function(s,inv){return s+invCollected(b,inv);},0);}

// P0-1: sequential document numbering. Counters at /counters/invoiceSeq + /counters/quoteSeq
// climb continuously and never reset; the year in the prefix only marks WHEN issued, so no
// single number reveals how many have been issued. Real numbers are minted at SAVE (inside the
// save lock); previews show a DRAFT placeholder so cancelled previews never burn a number.
var _INV_SEED=1247,_QUOTE_SEED=3061,_RC_SEED=1000;
var _DOC_PREFIX={invoice:'BI',quote:'BQ',receipt:'RC'};
var _DOC_PATH={invoice:'/counters/invoiceSeq',quote:'/counters/quoteSeq',receipt:'/counters/receiptSeq'};
var _DOC_SEED={invoice:_INV_SEED,quote:_QUOTE_SEED,receipt:_RC_SEED};
function docDraft(kind){return (_DOC_PREFIX[kind]||'DOC')+'-'+(new Date().getFullYear())+'-DRAFT';}
function docFmt(kind,n){return (_DOC_PREFIX[kind]||'DOC')+'-'+(new Date().getFullYear())+'-'+String(n).padStart(4,'0');}
async function mintDocNum(kind){
  var path=_DOC_PATH[kind]||'/counters/invoiceSeq';
  var seed=_DOC_SEED[kind]||1;
  var cur=await fbG(path);
  var n=(typeof cur==='number'&&cur>=seed)?cur+1:seed;
  await fbS(path,n);
  return docFmt(kind,n);
}

  return new Promise(function(resolve){

      } else if(opts.money){

        inpNum.onblur=function(){onMoneyBlur(this);};
        inpNum.style.display='';

      } else {
        inpNum.type='number';
        inpNum.style.display='';
        inpNum.value = opts.inputDefault!==undefined ? opts.inputDefault : '';
      }
    } else {
      iw.style.display = 'none';

async function showRequestApprovalConfirm(opts){

// Wedding-date-weighted SLA calculation
function slaThreshold(stage,daysToWed){
  // Base thresholds in hours: 12h, 3d=72h, 2d=48h, 7d=168h
  var base=[12,72,72,48,168];
  var hrs=base[stage]||72;
  if(daysToWed!==null){
    if(daysToWed<14)return hrs*0.1; // always urgent
    if(daysToWed<30)return hrs*0.25;
    if(daysToWed<90)return hrs*0.5;
  }
  return hrs;
}
function isLeadOverdue(l){
  var s=Number(l.stage||0);
  if(s>=5||l.confirmed)return false;
  var lastAct=new Date(l.lastActivity||l.createdAt||0).getTime();
  var hoursSince=(Date.now()-lastAct)/3600000;
  var dw=dU(l.weddingDate);
  return hoursSince>slaThreshold(s,dw);
}
// Wedding-date sort key for pipeline ordering (soonest wedding first; no/invalid date sinks to bottom)
function leadWedTs(l){
  if(!l||!l.weddingDate)return Infinity;
  var t=new Date(l.weddingDate).getTime();
  return isNaN(t)?Infinity:t;
}
// Human explanation of WHY a lead is overdue (shown when an overdue card is expanded).
// Derived from the SAME logic as isLeadOverdue/slaThreshold so the reason always matches the tag.
function overdueReason(l){
  var s=Number(l.stage||0);
  if(s>=5||l.confirmed)return '';
  var lastAct=new Date(l.lastActivity||l.createdAt||0).getTime();
  var hoursSince=(Date.now()-lastAct)/3600000;
  var dw=dU(l.weddingDate);
  var thr=slaThreshold(s,dw);
  if(hoursSince<=thr)return '';
  var what=['Awaiting first contact','Consultation not yet booked','Consultation not yet completed','Quote not yet sent','Quote follow-up due'][s]||'Action overdue';
  var target=['contact within 12h','book consultation within 3 days','complete consultation within 3 days','send quote within 2 days','follow up within 7 days'][s]||'';
  var sinceTxt=hoursSince<24?Math.round(hoursSince)+'h':Math.round(hoursSince/24)+'d';
  var urg='';
  if(dw!==null){
    if(dw<0)urg=' — wedding date has passed';
    else if(dw<14)urg=' — wedding in '+dw+'d, SLA tightened';
    else if(dw<30)urg=' — wedding in '+dw+'d';
  }
  return what+': '+sinceTxt+' since last activity (target: '+target+')'+urg+'.';
}

// =========================================================
// Pipeline metrics for the top 6-card widget
// =========================================================
function pipelineMetrics(){
  var all = lA();
  var now = Date.now();
  var weekMs = 7*86400000;
  // 1. New inquiries this week vs last week
  var thisWeek = all.filter(function(l){
    var t = new Date(l.createdAt||0).getTime();
    return t > now - weekMs;
  }).length;
  var lastWeek = all.filter(function(l){
    var t = new Date(l.createdAt||0).getTime();
    return t > now - 2*weekMs && t <= now - weekMs;
  }).length;
  var weekDelta = lastWeek===0 ? (thisWeek>0?100:0) : Math.round(((thisWeek-lastWeek)/lastWeek)*100);
  // 2. Inquiry-to-booking conversion rate
  var leadsWithFinalOutcome = all.filter(function(l){return l.confirmed || l.cancelled || Number(l.stage||0)>=4;});
  var booked = all.filter(function(l){return l.confirmed && !l.cancelled;}).length;
  var convRate = all.length===0 ? 0 : Math.round((booked/all.length)*100);
  // 3. Average response time (hours from createdAt to first stage change/contact)
  var respTimes = [];
  all.forEach(function(l){
    if(Number(l.stage||0)>=1 && l.lastActivity && l.createdAt){
      var hrs = (new Date(l.lastActivity)-new Date(l.createdAt))/3600000;
      if(hrs>=0 && hrs<24*30) respTimes.push(hrs);
    }
  });
  var avgResp = respTimes.length===0 ? null : Math.round(respTimes.reduce(function(a,b){return a+b;},0)/respTimes.length);
  // 4. Average booking value (from invoices on confirmed brides) — uses qTot/cLine (qty/unit/disc)
  var confirmedTotals = [];
  all.filter(function(l){return l.confirmed && !l.cancelled;}).forEach(function(l){
    var inv = Object.values(l.invoices||{})[0];
    if(inv){
      var t = qTot(inv.items);
      if(t>0)confirmedTotals.push(t);
    }
  });
  var avgValue = confirmedTotals.length===0 ? 0 : Math.round(confirmedTotals.reduce(function(a,b){return a+b;},0)/confirmedTotals.length);
  // 5. Pipeline value (sum of all open quotes not yet invoiced) — uses qTot, reads b.quotes directly
  var pipelineValue = 0;
  all.filter(function(l){return !l.confirmed && !l.cancelled;}).forEach(function(l){
    // Read both quotes (canonical) and quotations (legacy projection alias) to be safe
    var qts = l.quotes || l.quotations || {};
    Object.values(qts).forEach(function(qt){
      if(qt.convertedToInvoice)return;
      pipelineValue += qTot(qt.items);
    });
  });
  // 6. Upcoming weddings in next 90 days
  var ninetyMs = 90*86400000;
  var upcoming = all.filter(function(l){
    if(!l.confirmed||l.cancelled||!l.weddingDate)return false;
    var t = new Date(l.weddingDate).getTime();
    return t >= now && t <= now + ninetyMs;
  }).length;
  
  return {
    thisWeek: thisWeek,
    weekDelta: weekDelta,
    convRate: convRate,
    bookedCount: booked,
    leadCount: all.length,
    avgResp: avgResp,
    avgValue: avgValue,
    pipelineValue: pipelineValue,
    upcoming90: upcoming
  };
}

function lCard(l){
  var age=dS(l.createdAt);
  var src=SRC[l.source]||SRC.form;var tc=src[0];var tl=src[1];
  var overdue=isLeadOverdue(l);
  var idle=dS(l.lastActivity||l.createdAt);
  // Idle/age: quiet text top-right, amber (--warn) when idle/overdue — not a red pill.
  var idleWarn=overdue||idle>7;
  var idleTxt=overdue?(idle+'d idle'):(age>7?(age+'d old'):(age+'d'));
  var idleEl='<span class="lidle'+(idleWarn?' warn':'')+'">'+_icoClock+idleTxt+'</span>';
  // Quiet neutral chips (Quoted / Wedding-in).
  var qt=Object.keys(l.quotations||{}).length>0?'<span class="lchip">Quoted</span>':'';
  var dw=dU(l.weddingDate);
  var dwTag=dw!==null&&dw<60?'<span class="lchip">Wedding in '+dw+'d</span>':'';
  // Reminder badge: RED only act-now (Overdue/Today), amber Tomorrow, neutral later. Text, no emoji.
  var remTag='';
  if(l.nextReminderAt && !l.remindersStopped && !l.lost){
    var rDays=dU(l.nextReminderAt.slice(0,10));
    if(rDays!==null){
      var rTxt,rCls;
      if(rDays<0){rTxt='Overdue '+Math.abs(rDays)+'d';rCls='tu';}
      else if(rDays===0){rTxt='Reminder today';rCls='tu';}
      else if(rDays===1){rTxt='Reminder tomorrow';rCls='tq';}
      else {rTxt='Reminder in '+rDays+'d';rCls='td';}
      remTag='<span class="tag '+rCls+'">'+rTxt+'</span>';
    }
  }
  // Quoted amount line (concept .amt).
  var amtEl='';
  var openQ=Object.values(l.quotations||{}).find(function(x){return !x.convertedToInvoice;});
  if(openQ){var qv=qTot(openQ.items);if(qv>0)amtEl='<div class="lamt">Rs '+Math.round(qv).toLocaleString()+' quoted</div>';}
  // Expanded detail (attempt count lives here now; line icons / text, no emoji).
  var expanded=_expandedCards[l.id];
  var summary='';
  if(expanded){
    var ev=l.events||{};
    var bits=[];
    if(ev.engagement&&ev.engagement.enabled)bits.push('Engagement '+(ev.engagement.date?fmt(ev.engagement.date):'(date TBD)'));
    if(ev.wedding&&ev.wedding.enabled)bits.push('Wedding '+(ev.wedding.date?fmt(ev.wedding.date):'(date TBD)'));
    if(ev.homecoming&&ev.homecoming.enabled)bits.push('Homecoming '+(ev.homecoming.date?fmt(ev.homecoming.date):'(date TBD)'));
    if(ev.goingAway&&ev.goingAway.enabled)bits.push('Going Away '+(ev.goingAway.date?fmt(ev.goingAway.date):'(date TBD)'));
    if(!bits.length&&l.weddingDate)bits.push('Wedding '+fmt(l.weddingDate));
    var atts=Object.values(l.contactAttempts||{});
    var attLine='';
    if(atts.length>0){
      var lastAtt=atts.slice().sort(function(a,b){return new Date(b.at)-new Date(a.at);})[0];
      var lastDays=dS(lastAtt.at);
      var lastTxt=lastDays===0?'today':lastDays===1?'1d ago':lastDays+'d ago';
      attLine=atts.length+' attempt'+(atts.length!==1?'s':'')+' · last '+lastTxt;
    }
    var odBlock='';
    if(overdue){
      var odr=overdueReason(l);
      if(odr)odBlock='<div style="padding-top:10px;margin-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--danger);font-weight:600;line-height:1.5">'+_icoAlert+' Overdue — '+odr+'</div>';
    }
    var lines=[];
    if(bits.length)lines.push(bits.map(function(b){return '• '+b;}).join('<br/>'));
    else lines.push('<em>No events yet</em>');
    if(attLine)lines.push(attLine);
    if(l.phone)lines.push(_icoCall+' '+fmtPhone(l.phone));
    if(l.email)lines.push(_icoMail+' '+escHtml(l.email));
    if(l.notes)lines.push('<em style="color:var(--muted)">'+escHtml(l.notes.length>120?l.notes.slice(0,120)+'…':l.notes)+'</em>');
    summary=odBlock+'<div style="padding-top:10px;margin-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);line-height:1.6">'+lines.join('<br/>')+'</div>';
  }
  return '<div class="lcard" onclick="toggleLeadCard(\''+l.id+'\')">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'
    +'<div style="flex:1;min-width:0">'
    +'<div class="lname">'+escHtml(l.name)+'</div>'
    +'<div class="ldate">'+(l.weddingDate?'Wedding: '+fmt(l.weddingDate):'Date TBD')+'</div>'
    +'<div class="ltags"><span class="tag '+tc+'">'+tl+'</span>'+qt+dwTag+remTag+'</div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0">'
    +idleEl
    +'<div class="lcard-icons" onclick="event.stopPropagation()">'+cardIcons(l)+'</div>'
    +'</div>'
    +'</div>'
    +amtEl
    +cardCTA(l)
    +summary
    +'</div>';
}

  }
  return '';
}

}

function rSchedule(){
  // Collect ALL upcoming events: wedding dates, homecoming dates, going-away dates, appointments
  // Skip anniversaries entirely. Skip cancelled appointments.
  // Schedule modes (window._schedMode): 'appts' (default) | 'followups' | 'both'
  var mode = window._schedMode || 'appts';
  var allEvents = [];
  var now = new Date();now.setHours(0,0,0,0);
  
  // Color and label per event type
  var typeMeta = {
    'Wedding': {color:'#C8A55B', bg:'#FAF4E5', label:'Wedding'},
    'Homecoming': {color:'#1A2B4A', bg:'#E8ECF3', label:'Homecoming'},
    'Going Away': {color:'#6B4FA0', bg:'#EFE9F7', label:'Going Away'},
    'Engagement': {color:'#B0506A', bg:'#F9E8EE', label:'Engagement'},
    'Consultation': {color:'#2563EB', bg:'#E0EBFE', label:'Consultation'},
    'Trial': {color:'#EA580C', bg:'#FFEDD5', label:'Trial'},
    'Final Trial': {color:'#DC2626', bg:'#FEE2E2', label:'Final Trial'},
    'Fabric Appointment': {color:'#0D9488', bg:'#CCFBF1', label:'Fabric'},
    'Pickup': {color:'#6B7280', bg:'#F3F4F6', label:'Pickup'},
    'Other': {color:'#6B7280', bg:'#F3F4F6', label:'Other'},
    'Follow-up': {color:'#D69E2E', bg:'#FEF7E5', label:'Follow-up'}
  };
  
  // Collect appointment-style events (skipped when mode === 'followups')
  if(mode !== 'followups'){
    lA().forEach(function(b){
      if(b.cancelled)return; // skip cancelled bookings
      if(q && !(b.name||'').toLowerCase().includes(q))return;
      var ev = b.events || {};
      // Rule 3: Wedding/Homecoming/Going Away only show if bride has an invoice (advance paid)
      var hasInvoice = b.invoices && Object.keys(b.invoices).length > 0;
      var weddingDate = hasInvoice ? ((ev.wedding && ev.wedding.date) || b.weddingDate || '') : '';
      var homecomingDate = hasInvoice && ev.homecoming && ev.homecoming.enabled ? ev.homecoming.date : '';
      var goingAwayDate = hasInvoice && ev.goingAway && ev.goingAway.enabled ? ev.goingAway.date : '';
      var engagementDate = hasInvoice && ev.engagement && ev.engagement.enabled ? ev.engagement.date : '';
      // Wedding + Homecoming on same day for same bride -> group as one card
      // For now: each ceremony is a separate card unless same date
      if(weddingDate){
        var d = new Date(weddingDate); d.setHours(0,0,0,0);
        if(d>=now){
          allEvents.push({
            brideId: b.id, brideName: b.name||'(no name)',
            type: 'Wedding',
            date: weddingDate,
            time: (ev.wedding && ev.wedding.startTime) || '',
            venue: (ev.wedding && ev.wedding.venue) || b.venue || '',
            theme: (ev.wedding && ev.wedding.theme) || '',
            extra: {homecomingDate:homecomingDate, goingAwayDate:goingAwayDate}
          });
        }
      }
      if(homecomingDate && homecomingDate !== weddingDate){
        var d = new Date(homecomingDate); d.setHours(0,0,0,0);
        if(d>=now){
          allEvents.push({
            brideId: b.id, brideName: b.name||'(no name)',
            type: 'Homecoming', date: homecomingDate,
            time: ev.homecoming.startTime || '', venue: ev.homecoming.venue || '',
            theme: ev.homecoming.theme || ''
          });
        }
      }
      if(goingAwayDate){
        var d = new Date(goingAwayDate); d.setHours(0,0,0,0);
        if(d>=now){
          allEvents.push({
            brideId: b.id, brideName: b.name||'(no name)',
            type: 'Going Away', date: goingAwayDate,
            time: ev.goingAway.startTime || '', venue: ev.goingAway.venue || '',
            theme: ''
          });
        }
      }
      if(engagementDate){
        var d = new Date(engagementDate); d.setHours(0,0,0,0);
        if(d>=now){
          allEvents.push({
            brideId: b.id, brideName: b.name||'(no name)',
            type: 'Engagement', date: engagementDate,
            time: ev.engagement.startTime || '', venue: ev.engagement.venue || '',
            theme: ''
          });
        }
      }
      // Appointments
      Object.values(b.appointments||{}).forEach(function(a){
        if(a.cancelled || a.done || a.rescheduled || !a.date)return;
        var d = new Date(a.date); d.setHours(0,0,0,0);
        // Show future appointments AND no-show appointments (even if past) - manager needs to action no-shows
        var isFutureOrToday = d >= now;
        var isNoShow = !!a.noShow;
        if(isFutureOrToday || isNoShow){
          var t = a.reason || 'Other';
          if(!typeMeta[t])t='Other';
          allEvents.push({
            brideId: b.id, brideName: b.name||'(no name)',
            type: t, date: a.date, time: a.time||'',
            venue: '', note: a.note||'',
            noShow: isNoShow,
            apptKey: a.key
          });
        }
      });
    });
  }
  
  // Collect follow-up reminders (shown when mode === 'followups' or 'both')
  if(mode !== 'appts'){
    Object.values(brides).forEach(function(b){
      if(b.confirmed || b.cancelled || b.lost || b.remindersStopped) return;
      if(!b.nextReminderAt) return;
      if(q && !(b.name||'').toLowerCase().includes(q)) return;
      var rd = new Date(b.nextReminderAt); 
      var rDay = new Date(rd); rDay.setHours(0,0,0,0);
      // Include past-due reminders too (they need attention NOW)
      // For sort: keep the actual reminder timestamp; for the day-grouping, use the day
      allEvents.push({
        brideId: b.id, brideName: b.name||'(no name)',
        type: 'Follow-up',
        date: rd.toISOString().slice(0,10),
        time: rd.toTimeString().slice(0,5),
        venue: '',
        note: 'Follow-up reminder',
        isFollowUp: true,
        overdue: rd < new Date()
      });
    });
  }
  
  // Sort all events ascending by date+time
  allEvents.sort(function(a,b){
    var da = new Date(a.date + 'T' + (a.time||'00:00'));
    var db = new Date(b.date + 'T' + (b.time||'00:00'));
    return da - db;
  });
  
  // Group into: This Week / This Month / Later
  var weekEnd = new Date(now); weekEnd.setDate(weekEnd.getDate()+7);
  var monthEnd = new Date(now); monthEnd.setMonth(monthEnd.getMonth()+1);
  var weekly = [], monthly = [], later = [];
  allEvents.forEach(function(e){
    var d = new Date(e.date); d.setHours(0,0,0,0);
    if(d < weekEnd) weekly.push(e);
    else if(d < monthEnd) monthly.push(e);
    else later.push(e);
  });
  
  function eventCard(e){
    var meta = typeMeta[e.type] || typeMeta['Other'];
    var d = new Date(e.date);
    d.setHours(0,0,0,0);
    var dateLabel = d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
    // Round to nearest day to avoid timezone/time-of-day issues
    var daysAway = Math.round((d - now) / 86400000);
    var dayBadge;
    if(daysAway === 0) dayBadge = 'Today';
    else if(daysAway === 1) dayBadge = 'Tomorrow';
    else if(daysAway > 1 && daysAway < 7) dayBadge = 'in '+daysAway+'d';
    else if(daysAway < 0) dayBadge = Math.abs(daysAway)+'d overdue';
    else dayBadge = '';
    var dayBadgeColor = (e.isFollowUp && e.overdue) ? 'var(--danger)' : e.noShow ? 'var(--warn)' : 'var(--gold)';
    var timeLabel = e.time ? ' · '+e.time : '';
    var venueLabel = e.venue ? '<div style="font-size:11px;color:var(--muted);margin-top:2px">📍 '+escHtml(e.venue)+'</div>' : '';
    var themeLabel = e.theme ? '<span style="display:inline-block;background:rgba(0,0,0,0.06);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;color:var(--text2);margin-left:6px">'+escHtml(e.theme)+'</span>' : '';
    // No-show badge takes precedence visually
    var noShowBadge = e.noShow ? '<span style="display:inline-block;background:var(--warn);color:#fff;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.5px;margin-right:4px">NO-SHOW</span>' : '';
    var extraLabel = '';
    if(e.extra){
      var extras = [];
      if(e.extra.homecomingDate && e.extra.homecomingDate!==e.date){
        var hd = new Date(e.extra.homecomingDate);
        extras.push('Homecoming '+hd.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}));
      }
      if(e.extra.goingAwayDate){
        var gd = new Date(e.extra.goingAwayDate);
        extras.push('Going Away '+gd.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}));
      }
      if(extras.length) extraLabel = '<div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic">+ '+extras.join(' · ')+'</div>';
    }
    // Follow-up cards get a small "📞 Log Attempt" CTA so the manager can act from Schedule
    var followUpCta = '';
    if(e.isFollowUp){
      followUpCta = '<button onclick="event.stopPropagation();openDisp(\''+e.brideId+'\')" style="background:var(--navy);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;margin-top:6px">📞 Log Attempt</button>';
    }
    // No-show cards get reschedule + done quick actions
    var noShowCta = '';
    if(e.noShow && e.apptKey){
      noShowCta = '<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">'
        +'<button onclick="event.stopPropagation();openResched(\''+e.brideId+'\',\''+e.apptKey+'\')" style="background:var(--navy);color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer">↻ Reschedule</button>'
        +'<button onclick="event.stopPropagation();markApptDone(\''+e.brideId+'\',\''+e.apptKey+'\')" style="background:transparent;color:var(--success);border:1.5px solid var(--success);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer">✓ Did come</button>'
        +'</div>';
    }
    // Dashed border for follow-ups; warn border for no-shows
    var cardBorder = e.isFollowUp ? '1.5px dashed '+meta.color : e.noShow ? '1.5px solid var(--warn)' : '1.5px solid var(--border)';
    var cardBg = e.noShow ? '#FEF7E5' : '#fff';
    return '<div onclick="openDetail(\'' + e.brideId + '\')" style="background:'+cardBg+';border:'+cardBorder+';border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:flex-start;gap:12px;transition:transform .1s">'
      +'<div style="width:8px;align-self:stretch;background:'+(e.noShow?'var(--warn)':meta.color)+';border-radius:4px;flex-shrink:0"></div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">'+noShowBadge+'<span style="display:inline-block;background:'+meta.bg+';color:'+meta.color+';padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase">'+meta.label+'</span>'+(dayBadge?'<span style="font-size:10px;color:'+dayBadgeColor+';font-weight:700">'+dayBadge+'</span>':'')+themeLabel+'</div>'
      +'<div style="font-weight:700;color:var(--navy);font-size:15px;margin-bottom:2px">'+escHtml(e.brideName)+'</div>'
      +'<div style="font-size:12px;color:var(--text2)">'+dateLabel+timeLabel+'</div>'
      +venueLabel
      +extraLabel
      +(e.note && !e.isFollowUp?'<div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic">'+escHtml(e.note)+'</div>':'')
      +followUpCta
      +noShowCta
      +'</div>'
      +'</div>';
  }
  
  function section(title, list, sub){
    if(!list.length) return '';
    var subtxt = sub ? '<span style="font-size:11px;color:var(--muted);font-weight:500;margin-left:8px;letter-spacing:0;text-transform:none">'+sub+'</span>' : '';
    return '<div style="margin-bottom:24px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1.5px solid var(--border)"><div style="font-family:Cinzel,serif;font-size:14px;letter-spacing:1.5px;color:var(--navy);font-weight:600;text-transform:uppercase">'+title+'</div>'+subtxt+'<div style="margin-left:auto;font-size:11px;color:var(--muted);font-weight:600">'+list.length+'</div></div>'+list.map(eventCard).join('')+'</div>';
  }
  
  // Mode toggle pill bar

async function markSent(src,sId,qId){
  var path=src==='lead'?'/leads/'+sId+'/quotations/'+qId:'/customers/'+sId+'/quotes/'+qId;
  try{
    await fbP(path,{sent:true});
    if(src==='lead'&&leads[sId]&&(leads[sId].quotations||{})[qId])leads[sId].quotations[qId].sent=true;
    if(src==='cust'&&custs[sId]&&(custs[sId].quotes||{})[qId])custs[sId].quotes[qId].sent=true;
    // Advance stage to Quoted (4) when quote is marked as sent
    if(src==='lead'&&leads[sId]&&Number(leads[sId].stage||0)<4){
      await fbP('/leads/'+sId,{stage:4,lastActivity:new Date().toISOString()});

      try{await logHistory(sId,'stage-change',{to:4,reason:'quote-sent'});}catch(e){}
    }
    notif('Marked as sent. Lead moved to Quoted.');CM('doc-modal');render();
  }catch(e){notif('Error: '+e.message);}

async function addPay(src,sId,iId){
  if(window._busy)return; window._busy=true;
  try{
  var objC=src==='lead'?leads[sId]:custs[sId];
  if(objC&&objC.cancelled){notif('This booking is cancelled. No payments or refunds can be added \u2014 the refund was set during cancellation.');return;}
  var amt=parseMoney((document.getElementById('pay-amt')||{}).value);
  if(amt<=0){notif('Enter a valid amount.');return;}
  // C3: warn if payment exceeds remaining balance
  var obj0=src==='lead'?leads[sId]:custs[sId];
  if(obj0&&obj0.invoices&&obj0.invoices[iId]){
    var inv0=obj0.invoices[iId];
    var tot0=qTot(inv0.items);
    var paid0=(inv0.advance||0)+Object.values(inv0.payments||{}).reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);
    var rem0=tot0-paid0;
    if(amt>rem0+0.01){
      var over=amt-rem0;
      var _r=await showConfirm({title:'Payment exceeds balance',msg:'This payment is Rs '+Math.round(over).toLocaleString()+' more than the remaining balance of Rs '+Math.round(Math.max(0,rem0)).toLocaleString()+'. The invoice will be overpaid. Continue anyway?',yesText:'Yes, record it',noText:'Cancel',dangerous:true});
      if(!_r.ok)return;
    }
  }
  var date=(document.getElementById('pay-date')||{}).value||new Date().toISOString().slice(0,10);
  var method=(document.getElementById('pay-method')||{}).value||'';
  var note=(document.getElementById('pay-note')||{}).value||'';
  var pid='p-'+uid();
  var receiptNo='';try{receiptNo=await mintDocNum('receipt');}catch(e){receiptNo='';}
  var pay={id:pid,amount:amt,date:date,method:method,note:note,receiptNo:receiptNo,createdAt:new Date().toISOString()};
  var path=src==='lead'?'/leads/'+sId+'/invoices/'+iId+'/payments':'/customers/'+sId+'/invoices/'+iId+'/payments';
  try{
    await fbP(path,{[pid]:pay});
    var obj=src==='lead'?leads[sId]:custs[sId];
    if(obj&&obj.invoices&&obj.invoices[iId]){
      obj.invoices[iId].payments=obj.invoices[iId].payments||{};
      obj.invoices[iId].payments[pid]=pay;
    }
    // Update lead balance if lead-attached
    if(src==='lead'&&leads[sId]){
      var newBal=Math.max(0,(leads[sId].balance||0)-amt);
      var newAdv=(leads[sId].advance||0)+amt;
      await fbP('/leads/'+sId,{advance:newAdv,balance:newBal});
      leads[sId].advance=newAdv;leads[sId].balance=newBal;
    }
    CM('pay-modal');notif('Payment recorded!');openIDoc(src,sId,iId);render();
  }catch(e){notif('Error: '+e.message);}
  }finally{window._busy=false;}
}
async function delPay(src,sId,iId,pid){
  var obj=src==='lead'?leads[sId]:custs[sId];if(!obj||!obj.invoices||!obj.invoices[iId])return;
  var pay=(obj.invoices[iId].payments||{})[pid];if(!pay)return;
  var amt=parseFloat(pay.amount)||0;
  var isRefund=amt<0;
  var displayAmt=fR(Math.abs(amt));
  var kind=isRefund?'refund':'payment';
  // Cancelled bookings have frozen financial history — deleting a payment or refund here
  // would rewrite the record and desync the retained-amount math. Block it.
  if(obj.cancelled){notif('This booking is cancelled — its '+kind+' history is locked and cannot be deleted.');return;}
  if(needsApproval('delete_payment')){
    var rr=await showRequestApprovalConfirm({
      title:isRefund?'Request: Delete refund':'Request: Delete payment',
      msg:'You are asking the owner to delete this '+kind+' of '+displayAmt+'. This will adjust the bride\u2019s balance. Add a reason.',
      reasonRequired:true
    });
    if(!rr.ok)return;
    try{
      await createRequest({
        type:'delete_payment',
        targetPath:(src==='lead'?'/leads/':'/customers/')+sId+'/invoices/'+iId+'/payments/'+pid,
        payload:{src:src,sId:sId,iId:iId,pid:pid,amount:amt},
        snapshot:pay,

function dMoney(n){return 'Rs '+Math.round(Number(n)||0).toLocaleString();}
var _CEREMONY_LABELS={wedding:'Wedding Day',homecoming:'Homecoming',goingAway:'Going Away',engagement:'Engagement'};
var _CEREMONY_ORDER=['wedding','homecoming','goingAway','engagement','additional'];
function docSectionFor(it,itemsObj){
  // Package PARENT: pinned to ONE ceremony via pkgCeremony (deliberately NOT linkedTo,
  // so the untouched event-binding helpers that key off linkedTo never see a package).
  if(it.isPackage){
    var c=it.pkgCeremony;
    return (c==='wedding'||c==='homecoming'||c==='goingAway'||c==='engagement')?c:'additional';
  }
  // Package CHILD: grouped under its parent's ceremony.
  if(it.parentKey&&itemsObj&&itemsObj[it.parentKey])return docSectionFor(itemsObj[it.parentKey],itemsObj);
  var lt=it.linkedTo;
  if(lt==='wedding'||lt==='bridesmaids'||lt==='flowerGirls'||lt==='littleMaids')return 'wedding';
  if(lt==='homecoming')return 'homecoming';
  if(lt==='goingAway')return 'goingAway';
  if(lt==='engagement')return 'engagement';
  return 'additional';
}
function docSections(itemsObj){
  var items=Object.values(itemsObj||{});
  var groups={};var discountAmt=0;
  items.forEach(function(it){
    if(it.isPackage)return; // parent header carries no price; rendered inside its ceremony group
    var line=cLine(it);
    if(it.linkedTo==='discount'||it.auto||line<0){discountAmt+=Math.abs(line);return;}
    var sec=docSectionFor(it,itemsObj);(groups[sec]=groups[sec]||[]).push(it);
  });
  var subtotal=0;var html='';
  _CEREMONY_ORDER.forEach(function(sec){
    var arr=groups[sec];if(!arr||!arr.length)return;
    var label=sec==='additional'?'Additional Services':_CEREMONY_LABELS[sec];
    var secTot=0;var rows='';
    // Standalone lines render inline (legacy behaviour); package children collect under their parent.
    var byPkg={};var pkgOrder=[];
    arr.forEach(function(it){
      if(it.parentKey&&itemsObj[it.parentKey]&&itemsObj[it.parentKey].isPackage){
        if(!byPkg[it.parentKey]){byPkg[it.parentKey]=[];pkgOrder.push(it.parentKey);}
        byPkg[it.parentKey].push(it);
        return;
      }
      var line=cLine(it);secTot+=line;
      var qty=Number(it.qty)||1;var unit=Number(it.unit)||0;
      var sub=qty>1?'<span class="q">'+qty+' × '+dMoney(unit)+' each</span>':'';
      rows+='<div class="item"><div class="d">'+escHtml(it.desc||'')+sub+'</div><div class="a">'+dMoney(line)+'</div></div>';
    });
    pkgOrder.forEach(function(pk){
      var parent=itemsObj[pk];var kids=byPkg[pk];var krows='';
      kids.forEach(function(it){
        var line=cLine(it);secTot+=line;
        var qty=Number(it.qty)||1;var unit=Number(it.unit)||0;
        var sub=qty>1?'<span class="q">'+qty+' × '+dMoney(unit)+' each</span>':'';
        krows+='<div class="item pkgsub"><div class="d">'+escHtml(it.desc||'')+sub+'</div><div class="a">'+dMoney(line)+'</div></div>';
      });
      rows+='<div class="pkg"><div class="pkglabel">'+escHtml(parent.desc||'Package')+'</div>'+krows+'</div>';
    });
    subtotal+=secTot;
    html+='<div class="sechead">'+escHtml(label)+'</div>'+rows+'<div class="subtot"><span class="lbl2">Subtotal</span><span>'+dMoney(secTot)+'</span></div>';
  });
  return {html:html,subtotal:subtotal,discountAmt:discountAmt};
}
function docTotals(subtotal,discountAmt,paid){
  var grand=subtotal-discountAmt;
  var h='<div class="totals"><div class="trow"><span>Subtotal</span><span>'+dMoney(subtotal)+'</span></div>';
  if(discountAmt>0)h+='<div class="trow"><span>Package discount</span><span>\u2212 '+dMoney(discountAmt)+'</span></div>';
  h+='<div class="trow grand"><span class="cz lq">Total</span><span class="cz vq">'+dMoney(grand)+'</span></div>';

    h+='<div class="trow"><span>Balance due</span><span style="color:#1B2B4B;font-weight:500">'+dMoney(bal)+'</span></div>';

function _docResolveDue(due,weddingDate,offset){
  if(!due)return {desc:'',date:''};
  if(due.type==='confirmation')return {desc:'Due on confirmation',date:''};
  if(due.type==='date'&&due.date)return {desc:'Due by '+fmt(due.date),date:due.date};
  if(due.type==='beforeWedding'){
    var n=Number(due.days)||0;var dd='';
    if(weddingDate){var wd=new Date(weddingDate);if(!isNaN(wd.getTime())){wd.setDate(wd.getDate()-n);dd=wd.toISOString().slice(0,10);}}
    return {desc:dd?('Due by '+fmt(dd)+' · '+n+' days before the wedding'):(n+' days before the wedding'),date:dd};
  }
  return {desc:'',date:''};
}
function _docCustomSchedule(insts,weddingDate,offset,paid){
  var isInv=(paid!=null);var remaining=Number(paid)||0;var today=new Date().toISOString().slice(0,10);
  function badge(t,c){return '<span class="pbadge" style="color:'+c+';border-color:'+c+'">'+t+'</span>';}
  var rows='';
  insts.forEach(function(it){
    var amt=Math.max(0,Number(it.amount)||0);
    var due=_docResolveDue(it.due,weddingDate,offset);
    var b='';var desc=due.desc;
    if(isInv){
      var covered=Math.min(remaining,amt);remaining=Math.max(0,remaining-covered);
      if(amt>0&&covered>=amt){b=' '+badge('Paid','#38A169');}
      else if(covered>0){b=' '+badge('Partial','#A8862E');desc=(desc?desc+' · ':'')+dMoney(amt-covered)+' remaining';}
      else{var od=due.date&&today>due.date;b=' '+badge(od?'Overdue':'Due',od?'#E53E3E':'#A8862E');}
    }
    rows+='<div class="payrow"><div><div class="pl">'+escHtml(it.label||'Installment')+b+'</div><div class="pd">'+escHtml(desc)+'</div></div><div class="pa">'+dMoney(amt)+'</div></div>';
  });
  return '<div class="pay"><div class="payhead">Payment Schedule</div>'+rows+'</div>';
}
function docSchedule(total,deposit,weddingDate,paid,schedule){
  var s=gSet();var offset=parseInt(s.balanceDueDays,10);if(isNaN(offset))offset=14;
  if(schedule&&schedule.mode==='custom'&&schedule.installments&&schedule.installments.length){
    return _docCustomSchedule(schedule.installments,weddingDate,offset,paid);
  }
  deposit=Math.max(0,Number(deposit)||0);total=Number(total)||0;
  var balance=Math.max(0,total-deposit);var dueDate='';
  if(weddingDate){var wd=new Date(weddingDate);if(!isNaN(wd.getTime())){wd.setDate(wd.getDate()-offset);dueDate=wd.toISOString().slice(0,10);}}
  var isInv=(paid!=null);var p=Number(paid)||0;var today=new Date().toISOString().slice(0,10);
  function badge(t,c){return '<span class="pbadge" style="color:'+c+';border-color:'+c+'">'+t+'</span>';}
  var depB=isInv?(p>=deposit&&deposit>0?badge('Paid','#38A169'):badge('Due','#A8862E')):'';
  var rows='<div class="payrow"><div><div class="pl">Bespeaking fee'+(isInv?' '+depB:'')+'</div><div class="pd">'+(isInv?'Received on confirmation':'Due on confirmation')+' · non-refundable, deducted from the final bill</div></div><div class="pa">'+dMoney(deposit)+'</div></div>';
  var balB='',balDesc='';
  if(isInv){
    var rem=Math.max(0,total-p);
    if(rem<=0){balB=badge('Paid','#38A169');balDesc='Settled in full';}
    else{var od=dueDate&&today>dueDate;balB=od?badge('Overdue','#E53E3E'):badge('Due','#A8862E');balDesc=(dueDate?'Due by '+fmt(dueDate):'Due before the wedding')+(rem<balance?' · '+dMoney(rem)+' remaining':'');}
  }else{balDesc=dueDate?'Due '+offset+' days before — by '+fmt(dueDate):'Due before the wedding day';}
  rows+='<div class="payrow"><div><div class="pl">Balance'+(isInv?' '+balB:'')+'</div><div class="pd">'+balDesc+'</div></div><div class="pa">'+dMoney(balance)+'</div></div>';
  return '<div class="pay"><div class="payhead">Payment Schedule</div>'+rows+'</div>';
}

async function viewReceipt(src,sId,iId,pid){
  var obj=src==='lead'?leads[sId]:custs[sId];if(!obj)return;
  var inv=(obj.invoices||{})[iId];if(!inv)return;
  var pay=(inv.payments||{})[pid];if(!pay)return;
  if(Number(pay.amount)<=0){notif('Receipts are only for payments received.');return;}
  if(!pay.receiptNo){
    try{
      var rn=await mintDocNum('receipt');
      var path=(src==='lead'?'/leads/':'/customers/')+sId+'/invoices/'+iId+'/payments/'+pid;
      await fbP(path,{receiptNo:rn});
      pay.receiptNo=rn;if(inv.payments&&inv.payments[pid])inv.payments[pid].receiptNo=rn;
    }catch(e){}
  }
  buildReceipt({name:obj.name,phone:obj.phone||''},inv,pay);
}

function openDetail(id){
  var l=leads[id];if(!l)return;
  var cancelled=!!l.cancelled;
  // Header
  document.getElementById('dm-n').textContent=l.name+(cancelled?' (Cancelled)':'');
  var d=dU(l.weddingDate);
  var subText='';
  if(cancelled){subText='Booking cancelled · '+(l.cancelReason||'No reason given');}
  else if(l.confirmed){subText='Wedding '+fmt(l.weddingDate)+(d!==null?' · '+d+' days away':'');}
  else{var nxt=nextActionLabel(l);subText=nxt;}
  document.getElementById('dm-s').textContent=subText;
  // Compute totals
  var tot=brideTotal(l);
  var pct=tot>0?Math.round((brideCollected(l)/tot)*100):0;
  var quots=Object.values(l.quotations||{});
  var invs=Object.values(l.invoices||{});
  var appts=Object.values(l.appointments||{});
  var notes=Object.values(l.notesLog||{});
  var docs=Object.values(l.documents||{});
  var events=l.events||{wedding:{enabled:true}};
  // Tabs
  // Tab visibility rules:
  // Appointments tab: stage >= 2 (Consultation Booked) OR any appointment exists OR confirmed
  // Payment tab: any quotation/invoice exists OR confirmed
  var showAppt = l.confirmed || Number(l.stage||0) >= 2 || appts.length > 0;
  var showPay = l.confirmed || quots.length > 0 || invs.length > 0;
  var cTabs = '';
  if(showPay) cTabs += '<div class="tab" onclick="stab(this,\'tb-pay\')">Payment</div>';
  if(showAppt) cTabs += '<div class="tab" onclick="stab(this,\'tb-appt\')">Appts</div>';
  // ===== Overview Tab =====
  var ovTab=buildOverviewTab(id,l,cancelled);
  // ===== Payment Tab =====
  var payTab=showPay?buildPaymentTab(id,l,cancelled,quots,invs):'';
  // ===== Appointments Tab =====
  var apptTab=showAppt?buildApptTab(id,l,cancelled,appts):'';
  // ===== Notes Tab =====
  var notesTab=buildNotesTab(id,l,cancelled,notes);
  // ===== Documents Tab =====
  var docsTab=buildDocsTab(id,l,cancelled,docs);
  // Stage CTA (context-sensitive)
  var stageCta=cancelled?'':buildStageCta(id,l);
  document.getElementById('dm-b').innerHTML=
    '<div class="tabs"><div class="tab active" onclick="stab(this,\'tb-ov\')">Overview</div>'+cTabs+'<div class="tab" onclick="stab(this,\'tb-notes\')">Notes</div><div class="tab" onclick="stab(this,\'tb-docs\')">Documents</div></div>'
    +ovTab+payTab+apptTab+notesTab+docsTab;
  // Footer: back button left, delete/cancel + close + stage CTA right
  var leftBtn='<button class="btn btn-ghost btn-sm" onclick="CM(\'detail-modal\')">‹ Back</button>';
  var rightBtns='';
  if(!cancelled){
    if(l.confirmed)rightBtns+='<button class="btn btn-danger btn-sm" onclick="openCancelBooking(\''+id+'\')">Cancel Booking</button>';
    else rightBtns+='<button class="btn btn-danger btn-sm" onclick="delLead(\''+id+'\')">Delete</button>';
  }
  rightBtns+='<button class="btn btn-ghost" onclick="CM(\'detail-modal\')">Close</button>';
  if(stageCta)rightBtns+=stageCta;
  document.getElementById('dm-f').innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;width:100%;gap:8px;flex-wrap:wrap"><div>'+leftBtn+'</div><div style="display:flex;gap:8px;flex-wrap:wrap">'+rightBtns+'</div></div>';
  OM('detail-modal');
}

function buildPaymentTab(id,l,cancelled,quots,invs){
  // Attention cards
  var attention='';
  // Find final trial appointment
  var appts=Object.values(l.appointments||{}).filter(function(a){return !a.cancelled;});
  var ft=appts.find(function(a){return a.reason==='Final Trial';});
  var balance=brideOutstanding(l);
  var dToWed=dU(l.weddingDate);
  // Final payment red card: 14 days before wedding date OR if balance > 0 and ft is scheduled within 14 days
  if(!cancelled&&balance>0&&dToWed!==null&&dToWed<=14){
    var bg='#FEF2F2',bd='#FECACA',col='var(--danger)',label='URGENT';
    if(dToWed<=7){bg='#FEF2F2';bd='#FCA5A5';col='var(--danger)';label='OVERDUE - PAY NOW';}
    else if(dToWed<=14){bg='#FFF7ED';bd='#FED7AA';col='#C2410C';label='DUE SOON';}
    attention+='<div style="background:'+bg+';border:1.5px solid '+bd+';border-radius:10px;padding:14px;margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:'+col+';letter-spacing:1px;margin-bottom:4px">'+label+'</div><div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:3px">Final payment due</div><div style="font-size:13px;color:var(--text2)">Balance of '+fR(balance)+' is due on or before the final trial date. Wedding is '+dToWed+' days away.</div></div>';
  } else if(!cancelled&&balance>0&&ft&&ft.date){
    var dToFt=dU(ft.date);
    if(dToFt!==null&&dToFt<=14){
      attention+='<div style="background:#FFF7ED;border:1.5px solid #FED7AA;border-radius:10px;padding:14px;margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#C2410C;letter-spacing:1px;margin-bottom:4px">FINAL TRIAL IN '+dToFt+' DAYS</div><div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:3px">Collect final payment</div><div style="font-size:13px;color:var(--text2)">Balance '+fR(balance)+' is due on or before '+fmt(ft.date)+'.</div></div>';
    }
  }
  // Payment summary
  var tot=brideTotal(l);
  var coll=brideCollected(l);
  var bal=brideOutstanding(l);
  var pct=tot>0?Math.round((coll/tot)*100):0;
  var summary='<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase">Total</div><div style="font-size:18px;font-weight:700;color:var(--navy)">'+fR(tot)+'</div></div><div style="text-align:right"><div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase">Balance</div><div style="font-size:18px;font-weight:700;color:'+(bal>0?'var(--warn)':'var(--success)')+'">'+fR(bal)+'</div></div></div><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:var(--muted)">Paid '+pct+'%</span><span style="color:var(--success);font-weight:600">'+fR(coll)+' collected</span></div><div class="pb"><div class="pf" style="width:'+pct+'%"></div></div></div>';
  // Quotation & Invoice section (moved here from Documents)
  var qiHtml='<div class="stitle">Quotation & Invoice</div>';
  var qRows='';
  quots.forEach(function(qt){
    var badge=qt.convertedToInvoice?'<span class="badge bi">Invoiced</span>':'<span class="badge bo">Open</span>';
    qRows+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px" onclick="openQDoc(\'lead\',\''+id+'\',\''+qt.id+'\')"><div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+qt.id+'</div><div style="font-size:11px;color:var(--muted)">'+fmt(qt.date)+' · '+fR(qTot(qt.items))+'</div></div><div>'+badge+'</div></div>';
  });
  if(!qRows)qRows='<div style="font-size:12px;color:var(--muted);font-style:italic;margin-bottom:10px">No quotations</div>';
  qiHtml+=qRows;
  var iRows='';
  invs.forEach(function(inv){
    var t=qTot(inv.items);
    var pSum=(inv.advance||0)+Object.values(inv.payments||{}).reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);
    var b=t-pSum;
    var st=b<=0?'PAID':pSum>0?'PARTIAL':'UNPAID';
    var stc=b<=0?'var(--success)':pSum>0?'var(--warn)':'var(--danger)';
    iRows+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px" onclick="openIDoc(\'lead\',\''+id+'\',\''+inv.id+'\')"><div><div style="font-size:13px;font-weight:600;color:var(--navy)">'+inv.id+'</div><div style="font-size:11px;color:var(--muted)">'+fmt(inv.date)+' · '+fR(t)+' · Bal '+fR(Math.max(0,b))+'</div></div><div><span class="badge" style="background:'+stc+'22;color:'+stc+'">'+st+'</span></div></div>';
  });
  if(!iRows)iRows='<div style="font-size:12px;color:var(--muted);font-style:italic">No invoices</div>';
  qiHtml+=iRows;
  // Quick action: add payment opens the first invoice
  var qa='';
  if(invs.length>0&&!cancelled){
    qa='<button class="btn btn-primary btn-sm" style="margin-bottom:14px;width:100%" onclick="openAddPay(\'lead\',\''+id+'\',\''+invs[0].id+'\')">+ Add Payment</button>';
  }
  return '<div id="tb-pay" style="display:none">'+attention+summary+qa+qiHtml+'</div>';
}

function buildApptTab(id,l,cancelled,appts){
  // Sort: scheduled first by date asc, then no-show by date desc, then cancelled by cancelledAt desc, then rescheduled-source separately
  // States: scheduled (live), noShow (date passed without action), done, cancelled, rescheduled (moved to new appt)
  var scheduled=appts.filter(function(a){return !a.cancelled && !a.done && !a.noShow && !a.rescheduled;}).sort(function(a,b){return new Date(a.date+'T'+(a.time||'00:00'))-new Date(b.date+'T'+(b.time||'00:00'));});
  var noShowA=appts.filter(function(a){return a.noShow && !a.cancelled && !a.done && !a.rescheduled;}).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  var doneA=appts.filter(function(a){return a.done && !a.cancelled;}).sort(function(a,b){return new Date(b.doneAt||0)-new Date(a.doneAt||0);});
  var cancelledA=appts.filter(function(a){return a.cancelled;}).sort(function(a,b){return new Date(b.cancelledAt||0)-new Date(a.cancelledAt||0);});
  var rescheduledA=appts.filter(function(a){return a.rescheduled && !a.cancelled;}).sort(function(a,b){return new Date(b.rescheduledAt||0)-new Date(a.rescheduledAt||0);});
  
  // Upcoming scheduled appointments
  var schHtml='';
  scheduled.forEach(function(a){
    var dToA=dU(a.date);var dCol=dToA!==null&&dToA<=3?'var(--danger)':dToA!==null&&dToA<=7?'var(--warn)':'var(--text2)';
    schHtml+='<div style="background:var(--surf);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'
      +'<div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--navy)">'+escHtml(a.reason||'Appointment')+'</div>'
      +'<div style="font-size:12px;color:'+dCol+';margin-top:2px">'+fmt(a.date)+(a.time?' at '+a.time:'')+(dToA!==null?' · in '+dToA+'d':'')+'</div>'
      +(a.note?'<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic">'+escHtml(a.note)+'</div>':'')
      +'</div>'
      +(cancelled?'':'<div style="display:flex;flex-direction:column;gap:4px"><button class="btn btn-outline btn-xs" onclick="markApptDone(\''+id+'\',\''+a.key+'\')" style="font-size:11px;padding:4px 8px;color:var(--success);border-color:var(--success)">✓ Complete</button><button class="btn btn-ghost btn-xs" onclick="openResched(\''+id+'\',\''+a.key+'\')" style="font-size:11px;padding:4px 8px;color:var(--navy)">↻ Reschedule</button><button class="btn btn-ghost btn-xs" onclick="markApptNoShow(\''+id+'\',\''+a.key+'\')" style="font-size:11px;padding:4px 8px;color:var(--warn)">⚠ No-show</button><button class="btn btn-ghost btn-xs" onclick="cancelAppt(\''+id+'\',\''+a.key+'\')" style="font-size:11px;padding:4px 8px">Cancel</button></div>')
      +'</div></div>';
  });
  if(!schHtml)schHtml='<div style="font-size:12px;color:var(--muted);font-style:italic;padding:8px">No upcoming appointments</div>';
  
  // No-show appointments (need attention)
  var noShowHtml='';
  noShowA.forEach(function(a){
    var daysAgo=dU(a.date);
    var daysAgoTxt=daysAgo!==null?(daysAgo<0?Math.abs(daysAgo)+'d ago':daysAgo===0?'today':daysAgo+'d away'):'';
    noShowHtml+='<div style="background:#FEF7E5;border:1.5px solid var(--warn);border-radius:8px;padding:10px 12px;margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'
      +'<div style="flex:1"><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="background:var(--warn);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px">NO-SHOW</span><div style="font-size:13px;font-weight:700;color:var(--navy)">'+escHtml(a.reason||'Appointment')+'</div></div>'
      +'<div style="font-size:12px;color:var(--warn);margin-top:2px">'+fmt(a.date)+(a.time?' at '+a.time:'')+' · '+daysAgoTxt+'</div>'
      +(a.note?'<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic">'+escHtml(a.note)+'</div>':'')
      +'</div>'
      +(cancelled?'':'<div style="display:flex;flex-direction:column;gap:4px"><button class="btn btn-outline btn-xs" onclick="openResched(\''+id+'\',\''+a.key+'\')" style="font-size:11px;padding:4px 8px;color:var(--navy)">↻ Reschedule</button><button class="btn btn-outline btn-xs" onclick="markApptDone(\''+id+'\',\''+a.key+'\')" style="font-size:11px;padding:4px 8px;color:var(--success);border-color:var(--success)">✓ Did come</button><button class="btn btn-ghost btn-xs" onclick="cancelAppt(\''+id+'\',\''+a.key+'\')" style="font-size:11px;padding:4px 8px;color:var(--danger)">Close</button></div>')
      +'</div></div>';
  });
  
  // Completed appointments
  var doneHtml='';
  doneA.forEach(function(a){
    doneHtml+='<div style="background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:8px;padding:10px 12px;margin-bottom:8px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">'
      +'<div><div style="font-size:13px;font-weight:600;color:var(--navy)">✓ '+escHtml(a.reason||'Appointment')+' · '+fmt(a.date)+(a.time?' at '+a.time:'')+'</div>'
      +'<div style="font-size:11px;color:var(--success);margin-top:2px">Completed '+(a.doneAt?fmt(a.doneAt):'')+'</div>'
      +(a.note?'<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic">'+escHtml(a.note)+'</div>':'')
      +'</div></div>'
      +'</div>';
  });
  
  // Rescheduled (source) appointments — show with arrow to new date
  var reschHtml='';
  rescheduledA.forEach(function(a){
    var newKey=a.rescheduledTo;
    var newAppt=newKey && leads[id].appointments ? leads[id].appointments[newKey] : null;
    var newTxt = newAppt ? 'Moved to '+fmt(newAppt.date)+(newAppt.time?' at '+newAppt.time:'') : 'Moved';
    reschHtml+='<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;opacity:.75">'
      +'<div style="font-size:13px;font-weight:600;color:var(--muted);text-decoration:line-through">'+escHtml(a.reason||'Appointment')+' · '+fmt(a.date)+(a.time?' at '+a.time:'')+'</div>'
      +'<div style="font-size:11px;color:var(--navy);margin-top:2px">↻ '+newTxt+(a.rescheduleReason?' · '+escHtml(a.rescheduleReason):'')+'</div>'
      +'</div>';
  });
  
  // Cancelled
  var canHtml='';
  cancelledA.forEach(function(a){
    canHtml+='<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;opacity:.7">'
      +'<div style="font-size:13px;font-weight:600;color:var(--muted);text-decoration:line-through">'+escHtml(a.reason||'Appointment')+' · '+fmt(a.date)+(a.time?' at '+a.time:'')+'</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:2px">Cancelled '+(a.cancelledAt?fmt(a.cancelledAt):'')+(a.cancelReason?' · '+escHtml(a.cancelReason):'')+'</div>'
      +'</div>';
  });
  // Add appointment form
  var addForm='';
  if(!cancelled){
    addForm='<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px">'
      +'<div style="font-size:12px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Schedule Appointment</div>'
      +'<div class="fg">'
      +'<div class="fi"><label>Date</label><input type="date" id="ap-d-'+id+'"/></div>'
      +'<div class="fi"><label>Time</label><input type="time" id="ap-t-'+id+'"/></div>'
      +'<div class="fi s2"><label>Reason</label><select id="ap-r-'+id+'"><option value="">— Select reason —</option><option>Consultation</option><option>Trial</option><option>Final Trial</option><option>Fabric Appointment</option><option>Pickup</option><option>Other</option></select></div>'
      +'<div class="fi s2"><label>Note (optional)</label><input type="text" id="ap-n-'+id+'" placeholder="Comments"/></div>'
      +'</div>'
      +'<button class="btn btn-primary btn-sm" style="margin-top:10px;width:100%" onclick="addAppt2(\''+id+'\')">+ Add Appointment</button>'
      +'</div>';
  }
  return '<div id="tb-appt" style="display:none">'+addForm
    +(noShowHtml?'<div class="stitle" style="color:var(--warn)">Needs Attention</div>'+noShowHtml:'')
    +'<div class="stitle"'+(noShowHtml?' style="margin-top:14px"':'')+'>Upcoming</div>'+schHtml
    +(doneHtml?'<div class="stitle" style="margin-top:14px">Completed</div>'+doneHtml:'')
    +(reschHtml?'<div class="stitle" style="margin-top:14px">Rescheduled</div>'+reschHtml:'')
    +(canHtml?'<div class="stitle" style="margin-top:14px">Cancelled (record kept)</div>'+canHtml:'')
    +'</div>';
}

function buildStageCta(id,l){
  var s=Number(l.stage||0);
  if(l.confirmed)return '';
  if(s===0){
    var ph=(l.phone||'').replace(/[^0-9]/g,'');
    var btns='';
    if(ph)btns+='<button class="btn btn-gold btn-sm" onclick="window.open(\'https://wa.me/'+ph+'\',\'_blank\');advStage(\''+id+'\',1)">WhatsApp</button>';
    if(ph)btns+='<button class="btn btn-outline btn-sm" onclick="window.open(\'tel:+'+ph+'\');advStage(\''+id+'\',1)">Call</button>';
    if(l.email)btns+='<button class="btn btn-outline btn-sm" onclick="window.open(\'mailto:'+escAttr(l.email)+'\');advStage(\''+id+'\',1)">Email</button>';
    return btns||'<button class="btn btn-primary btn-sm" onclick="advStage(\''+id+'\',1)">Mark Contacted</button>';
  }
  if(s===1)return '<button class="btn btn-primary btn-sm" onclick="advStage(\''+id+'\',2)">Book Consultation</button>';
  if(s===2)return '<button class="btn btn-primary btn-sm" onclick="advStage(\''+id+'\',3)">Mark Consultation Done</button>';
  if(s===3)return '<button class="btn btn-primary btn-sm" onclick="CM(\'detail-modal\');openOverviewForm(\''+id+'\',{intent:\'quote\'})">Create Quotation</button>';
  if(s===4){
    var q=Object.values(l.quotations||{}).find(function(qt){return !qt.convertedToInvoice;});
    if(q)return '<button class="btn btn-primary btn-sm" onclick="CM(\'detail-modal\');openAdv(\'lead\',\''+id+'\',\''+q.id+'\')">Convert to Invoice</button>';
  }
  return '';
}

// ---------- Event helpers ----------
async function toggleEvent(id,k,checked){
  var l=leads[id];if(!l)return;
  l.events=l.events||{};
  l.events[k]=l.events[k]||{};
  l.events[k].enabled=checked;
  if(checked&&k==='wedding'&&!l.events.wedding.date)l.events.wedding.date=l.weddingDate||'';
  try{
    await fbP('/leads/'+id+'/events/'+k,l.events[k]);
    await logHistory(id,'event-toggle',{event:k,enabled:checked});
    openDetail(id);
  }catch(e){notif('Error: '+e.message);}
}
async function updEvent(id,k,field,value){
  var l=leads[id];if(!l)return;
  l.events=l.events||{};l.events[k]=l.events[k]||{};
  var oldVal=l.events[k][field];
  l.events[k][field]=value;
  try{
    var p={};p[field]=value;
    await fbP('/leads/'+id+'/events/'+k,p);
    // If wedding date changed, also update top-level weddingDate for compatibility
    if(k==='wedding'&&field==='date'){
      await fbP('/leads/'+id,{weddingDate:value});
      l.weddingDate=value;
    }
    await logHistory(id,'event-edit',{event:k,field:field,from:oldVal,to:value});
    render();
  }catch(e){notif('Error: '+e.message);}
}

// ---------- Appointments ----------
async function addAppt2(id){
  var d=document.getElementById('ap-d-'+id);
  var t=document.getElementById('ap-t-'+id);
  var r=document.getElementById('ap-r-'+id);
  var n=document.getElementById('ap-n-'+id);
  if(!d||!d.value){notif('Please pick a date.');return;}
  if(!r||!r.value){notif('Please choose a reason.');return;}
  var key=uid();
  var appt={key:key,date:d.value,time:(t&&t.value)||'',reason:r.value,note:(n&&n.value)||'',cancelled:false,createdAt:new Date().toISOString()};
  try{
    var p={};p[key]=appt;
    await fbP('/leads/'+id+'/appointments',p);
    leads[id].appointments=leads[id].appointments||{};leads[id].appointments[key]=appt;
    await logHistory(id,'appt-add',{reason:r.value,date:d.value});
    openDetail(id);
  }catch(e){notif('Error: '+e.message);}
}
async function markApptDone(id,key){
  var appt=(leads[id]&&leads[id].appointments)?leads[id].appointments[key]:null;
  if(!appt)return;
  var r=await showConfirm({
    title:'Mark appointment complete',
    msg:'Mark "'+(appt.reason||'Appointment')+'" on '+fmt(appt.date)+(appt.time?' at '+appt.time:'')+' as completed?',
    yesText:'Mark Complete'
  });
  if(!r.ok)return;
  var doneAt=new Date().toISOString();
  window._saving=true;
  try{
    await fbP('/brides/'+id+'/appointments/'+key,{done:true,doneAt:doneAt});
    if(!brides[id]){
      try{var fresh=await fbG('/brides/'+id);if(fresh)brides[id]=fresh;}catch(fe){}
    }
    if(brides[id]){
      brides[id].appointments=brides[id].appointments||{};
      brides[id].appointments[key]=Object.assign({},brides[id].appointments[key]||{},{done:true,doneAt:doneAt});
    }
    if(leads[id]){
      leads[id].appointments=leads[id].appointments||{};

// RESCHEDULE — move an appointment to a new date/time
// Creates new appt, links bidirectionally to original via rescheduledTo/rescheduledFrom
// ============================================================
var RESCH = {brideId:null, apptKey:null};

function openResched(brideId, apptKey){

    +'<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px">'
    +'<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:3px">Original</div>'
    +'<div style="font-size:13px;font-weight:600;color:var(--navy)">'+escHtml(appt.reason||'Appointment')+'</div>'
    +'<div style="font-size:12px;color:var(--text2);margin-top:2px">'+fmt(appt.date)+(appt.time?' at '+escHtml(appt.time):'')+'</div>'
    +'</div>'
    +'<div class="fg" style="margin-bottom:14px">'
    +'<div class="fi"><label>New Date *</label><input type="date" id="resched-date" value="'+escHtml(defDate)+'"/></div>'
    +'<div class="fi"><label>New Time</label><input type="time" id="resched-time" value="'+escHtml(appt.time||'')+'"/></div>'
    +'</div>'
    +'<div class="fi"><label>Reason (optional)</label><input type="text" id="resched-reason" placeholder="Why is it being moved?"/></div>';
  document.getElementById('resched-body').innerHTML = body;
  document.getElementById('resched-footer').innerHTML = 
    '<button class="btn btn-ghost" onclick="closeResched()">Cancel</button>'
    +'<button class="btn btn-primary" onclick="saveResched()">Reschedule</button>';
  OM('resched-modal');
}

function closeResched(){
  RESCH = {brideId:null, apptKey:null};
  CM('resched-modal');
}

async function saveResched(){
  var brideId = RESCH.brideId, apptKey = RESCH.apptKey;
  var l = leads[brideId]; if(!l) return;
  var oldAppt = (l.appointments||{})[apptKey]; if(!oldAppt) return;
  var newDate = (document.getElementById('resched-date')||{}).value;
  var newTime = (document.getElementById('resched-time')||{}).value || '';
  var reason = (document.getElementById('resched-reason')||{}).value || '';
  if(!newDate){notif('Please pick a new date.');return;}
  // Sanity: new date should be different from old
  if(newDate === oldAppt.date && newTime === (oldAppt.time||'')){
    notif('New date/time same as original.');return;
  }
  var nowIso = new Date().toISOString();
  var newKey = 'a-'+uid();
  var newAppt = {
    key: newKey,
    date: newDate,
    time: newTime,
    reason: oldAppt.reason,
    note: oldAppt.note || '',
    cancelled: false,
    done: false,
    createdAt: nowIso,
    rescheduledFrom: apptKey
  };
  // Patch: create new appointment + update old with rescheduled flag
  // CRITICAL: No overlapping Firebase paths (audit rule from sim9)
  var patch = {};
  patch['appointments/'+newKey] = newAppt;
  patch['appointments/'+apptKey+'/rescheduled'] = true;
  patch['appointments/'+apptKey+'/rescheduledAt'] = nowIso;
  patch['appointments/'+apptKey+'/rescheduledTo'] = newKey;
  patch['appointments/'+apptKey+'/rescheduleReason'] = reason;
  // Note: patch['appointments/X'] would overlap with patch['appointments/X/rescheduled'] — DO NOT add a top-level appointments/X key
  window._saving = true;
  try {
    await fbP('/brides/'+brideId, patch);
    // Update local
    if(!brides[brideId]) brides[brideId] = {};
    brides[brideId].appointments = brides[brideId].appointments || {};
    brides[brideId].appointments[newKey] = newAppt;
    var oldRef = brides[brideId].appointments[apptKey] || {};
    brides[brideId].appointments[apptKey] = Object.assign({}, oldRef, {rescheduled:true, rescheduledAt:nowIso, rescheduledTo:newKey, rescheduleReason:reason});
    projectViews();
    try { await logHistory(brideId, 'appt-reschedule', {from:oldAppt.date, to:newDate, reason:oldAppt.reason}); } catch(e){}
    notif('Rescheduled to '+fmt(newDate)+(newTime?' at '+newTime:''));
    closeResched();
    if(view==='schedule') rSchedule();
    else openDetail(brideId);
  } catch(e) {
    notif('Error: '+e.message);
  } finally {
    window._saving = false;
  }
}

// Auto-detect: any appointment whose date is 3+ days past, still scheduled, gets flagged as no-show
// Throttled to once per day via localStorage (same pattern as checkAutoLost)
async function checkNoShows(){
  var todayKey = new Date().toISOString().slice(0,10);
  var lastRun = localStorage.getItem('biso_autoNoShowLastRun');
  if(lastRun === todayKey) return;
  var now = new Date(); now.setHours(0,0,0,0);
  var threshold = new Date(now); threshold.setDate(threshold.getDate()-3); // 3+ days past
  var flagged = 0;
  var brideIds = Object.keys(brides);
  for(var i = 0; i < brideIds.length; i++){
    var b = brides[brideIds[i]];
    if(!b || !b.appointments || b.cancelled || b.lost) continue;
    var apptKeys = Object.keys(b.appointments);
    for(var j = 0; j < apptKeys.length; j++){
      var k = apptKeys[j];
      var a = b.appointments[k];
      if(!a || !a.date) continue;
      if(a.done || a.cancelled || a.rescheduled || a.noShow) continue;
      var aDate = new Date(a.date); aDate.setHours(0,0,0,0);
      if(aDate <= threshold){
        // Auto-flag
        try {
          var nowIso = new Date().toISOString();
          await fbP('/brides/'+b.id+'/appointments/'+k, {noShow:true, noShowAt:nowIso, noShowAuto:true});
          b.appointments[k] = Object.assign({}, a, {noShow:true, noShowAt:nowIso, noShowAuto:true});
          try { await logHistory(b.id, 'appt-noshow', {reason:a.reason, date:a.date, manual:false}); } catch(le){}
          flagged++;
        } catch(e){ /* skip on error */ }
      }
    }
  }
  localStorage.setItem('biso_autoNoShowLastRun', todayKey);
  if(flagged > 0){
    projectViews();
    notif('Auto-flagged '+flagged+' no-show appointment'+(flagged!==1?'s':'')+'.');
    if(view === 'pipeline' || view === 'dailyBrief' || view === 'schedule') render();
  }
}

      notif('Document uploaded.');
      inp.value='';

  };
  reader.readAsDataURL(f);
